  author: jdllt
  severity: high
  description: 金山终端安全系统是一款为企业提供终端防护的安全产品，针对恶意软件、病毒和外部攻击提供防范措施，帮助维护企业数据和网络，金山终端安全系统V9存在SQL注入。
