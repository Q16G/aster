id: yihuarenliziyuan-default-weak
info:
  name: yihuarenliziyuan-default-weak
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        GET /filemanage/file/default.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:99.0) Gecko/20100101 Firefox/99.0
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - '200'
      - type: word
        part: body
        words:
          - '文件名'
