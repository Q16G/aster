
id: lxtj-GetTokey-info

info:
  name: msk-template
  author: msk
  severity: high



http:
  - raw:
      - |
        GET /ws/GetTokey.asmx HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        Content-Type: text/xml; charset=utf-8
        Soapaction: "http://tempuri.org/UserInfo"


    matchers:
      - type: dsl
        dsl:
          - status_code==200 && contains_all(body,"/ws/GetTokey.asmx?disco")