id: powershell-universal-default-login

info:
  name: PowerShell Universal Default Login
  author: ap3r
  severity: high
  description: PowerShell Universal default admin credentials were discovered.
  reference:
    - https://ironmansoftware.com/powershell-universal
  metadata:
    max-request: 1
  tags: default-login

http:
  - raw:
      - |
        POST /api/v1/signin HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json, text/plain, */*
        Accept-Encoding: gzip, deflate
        Content-Type: application/json
        
        {"username":"{{username}}","password":"{{password}}"}

    payloads:
      username:
        - admin
      password:
        - admin
        - password
        - powershell
    attack: clusterbomb

    matchers-condition: and
    matchers:

      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - 'Set-Cookie'
