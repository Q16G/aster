id: SeaCMS-dmku-sqli
info:
  name: SeaCMS-dmku-sqli
  author: apple
  severity: high
  description: SeaCMS海洋影视管理系统dmku存在SQL注入漏洞
  reference:
    - https://github.com/wy876/POC/blob/main/SeaCMS%E6%B5%B7%E6%B4%8B%E5%BD%B1%E8%A7%86%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9Fdmku%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
