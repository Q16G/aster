id: lrkj-queryPolicyUseConditionDetail-rce
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 联软IT安全运维管理软件，在 PolicySetDetailController 中 的queryPolicyUseConditionDetail 方法在对输入参数进行处理的过程中进行了反序列化操作，可使用 Commons-Beanutils 反序列化链进行RCE。攻击者可利用该漏洞执行任意代码，在服务器上执行命令、打入内存马等操作，获取服务器权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/L7-1%E8%81%94%E8%BD%AF-IT%E5%AE%89%E5%85%A8%E8%BF%90%E7%BB%B4%E7%AE%A1%E7%90%86%E8%BD%AF%E4%BB%B6-%E5%8F%8D%E5%BA%8F%E5%88%97%E5%8C%96RCE?id=l7-1%e8%81%94%e8%bd%af-it%e5%ae%89%e5%85%a8%e8%bf%90%e7%bb%b4%e7%ae%a1%e7%90%86%e8%bd%af%e4%bb%b6-%e5%8f%8d%e5%ba%8f%e5%88%97%e5%8c%96rce
  tags: tags
