id: CNVD-2023-96945
info:
  name: CNVD-2023-96945
  author: apple
  severity: high
  description: 江苏麦维智能科技有限公司是一家专注于软件产品定制化开发的软件技术服务商。 江苏麦维智能科技有限公司安全生产数字化管理平台存在文件上传漏洞，攻击者可利用该漏洞获取服务器权限。
  reference:
    - https://blog.csdn.net/weixin_42628854/article/details/136036109?spm=1001.2014.3001.5501
  tags: tags
http:
  - raw:
      - |+
        GET //Content/Plugins/uploader/FileChoose.html HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - '200'
      - type: word
        part: body
        words:
          - 选择文件
