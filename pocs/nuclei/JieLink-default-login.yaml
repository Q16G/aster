        Origin: http://{{Hostname}}
        Connection: close
        Referer: http://{{Hostname}}/
        Cookie: ASP.NET_SessionId=lehcvbygmdndhtcbtweeokda; DefaultSystem=JieLink
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

        returnUrl=http%3A%2F%2F{{Hostname}}%2Fhome%2Fmain&username=9999&password=123456
