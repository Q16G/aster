id: landray-oa-sysUiComponent-upload
info:
  name: landray-oa-sysUiComponent-upload
  author: apple
  severity: critical
  description: 蓝凌OA sysUiComponent接口处存在任意文件上传漏洞，未经过身份认证的攻击者可通过构造压缩文件上传恶意后门文件，远程命令执行，获取服务器权限。
  reference:
    - https://blog.csdn.net/qq_41904294/article/details/134448183
    - https://github.com/wy876/POC/blob/main/%E8%93%9D%E5%87%8CKEP%E5%89%8D%E5%8F%B0RCE%E6%BC%8F%E6%B4%9E.md
  tags: landray
http:
  - raw:
      - |+
        GET /sys/ui/sys_ui_component/sysUiComponent.do?method=upload HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

    matchers:
      - type: word
        part: body
        words:
          - '添加部件包'
