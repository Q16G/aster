id: weaver-e-cology-ShowDocsImageServlet-sqli
info:
  name: weaver-e-cology-ShowDocsImageServlet-sqli
  author: apple
  severity: high
  description: ShowDocsImageServlet主要功能是通过图片的id在数据中查询出图片内容并返回，但是查询语句时图片id存在拼接情况.
  reference:
    - https://cn-sec.com/archives/1803545.html
  tags: weaver
http:
  - raw:
      - |-
        GET /weaver/weaver.docs.docs.ShowDocsImageServlet?docId=1 HTTP/1.1
         Host: {{Hostname}}
         User-Agent: python-requests/2.28.2
         Accept-Encoding: gzip, deflate
         Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
         Connection: close
         Accept-Language: zh-CN,zh;q=0.9
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - image
      - type: word
        part: header
        words:
          - '200'
