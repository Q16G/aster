id: fanwei-eoffice-infoleak-E-mobile_user_page

info:
  name: fanwei-eoffice-infoleak-E-mobile_user_page
  author: fanwei-eoffice-infoleak-E-mobile_user_page
  severity: low

http:
  - raw:
      - |+
        GET /E-mobile/user_page.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_8_3) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/54.0.2866.71 Safari/537.36
        Connection: close
        Accept: */*
        Accept-Language: en
        Accept-Encoding: gzip

    matchers:
      - type: dsl
        dsl:
          - "contains_all(body, '/E-mobile/images/tel/phone.png','/E-mobile/images/tel/sms.png') && status_code==200"