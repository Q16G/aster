id: HP-LaserJet-M402n-admin

info:
  name: HP LaserJet Pro M402n Administrator password not set. 
  author: crose
  severity: High
  description: The admin password has not been set. This allows anyone to view and/or change printer settings without authenticating. 
  reference:
    - https://
  tags: nwrt,admin,HP

http:
  - raw:
      - |-
        GET /set_config_password.html?tab=System&menu=Passwd HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        condition: and
        part: body
        words:
          - 'Administrator'
      - type: status
        status:
          - 200