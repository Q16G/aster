id: skzy-manager-infolink

info:
  name: 时空智友企业流程化管控系统存在敏感信息泄露
  author: m0be1
  severity: medium
  description: 时空智友企业流程化管控系统index.jsp敏感信息泄露,攻击者可通过此漏洞获取敏感信息。
  
  reference:
    - https://
  metadata: 
    fofa-query: body="企业流程化管控系统"
    verified: true
    max-request: 1

http:
  - raw:
      - |
        GET /manage/index.jsp HTTP/1.1
        Host: {{Hostname}}


    matchers:
      - type: dsl
        dsl:
          - 'status_code==200 && contains_all(body,"管理首页")'
