id: pkpmbs-operaFile-fileread
info:
  name: Template Name
  author: wangzong
  severity: high
  description: Pkpmbs建设工程质量监督系统Ajax_operaFile.aspx接口处存在文件读取漏洞，恶意攻击者可能会利用此漏洞读取敏感文件，对系统造成危害
