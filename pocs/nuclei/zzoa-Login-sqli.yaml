id: zzoa-Login-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 众智OA办公系统Login存在SQL注入漏洞，允许攻击者通过恶意构造的SQL语句操控数据库，从而导致数据泄露、篡改或破坏，严重威胁系统安全。
  reference:
    - https://github.com/wy876/POC/blob/main/%E4%BC%97%E6%99%BAOA/%E4%BC%97%E6%99%BAOA%E5%8A%9E%E5%85%AC%E7%B3%BB%E7%BB%9FLogin%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
