id: smartbi-address-auth-bypass

info:
  name: Smartbi 权限绕过漏洞
  author: xpoc,ultimaste
  severity: high
  description: Smartbi是一款商业智能应用，提供了数据集成、分析、可视化等功能，帮助用户理解和使用他们的数据进行决策。在Smartbi受影响版本中存在权限绕过问题，未授权的攻击者可以通过 RMI 的方式调用 getPassword 接口获取管理员token信息。获取管理员权限后，可进入后台实现任意命令执行，进而对目标系统造成破坏或篡改窃取敏感信息。
  reference:
    - https://mp.weixin.qq.com/s/qwTzdnncx1rsswX04uFxCQ
    - https://mp.weixin.qq.com/s/Bqzk2i-zTABcNLvS7EnW3Q
    - https://stack.chaitin.com/techblog/detail?id=142
  tags: smartbi,bypass
http:
  - raw:
      - |-
        POST /smartbi/smartbix/api/monitor/setEngineAddress HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 5.1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/35.0.2117.157 Safari/537.36
        Content-Length: 51
        Content-Type: application/x-www-form-urlencoded
        Accept-Encoding: gzip, deflate
        Connection: close

        className=UserService&methodName=isLogged&params=[]
      - |-
        POST /smartbix/api/monitor/setEngineAddress HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 5.1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/35.0.2117.157 Safari/537.36
        Content-Length: 51
        Content-Type: application/x-www-form-urlencoded
        Accept-Encoding: gzip, deflate
        Connection: close

        className=UserService&methodName=isLogged&params=[]
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - 'smartbix.SmartbiXException'
      - type: word
        part: body
        words:
          - 'smartbix.SmartbiXException'
