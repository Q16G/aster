id: hongjing-report_collect-sqli

info:
  name: Template Name
  author: apple
  severity: high
  description: 宏景eHR-report_org_collect_tree.jsp存在SQL注入漏洞
  reference:
    - https://github.com/wy876/POC/blob/main/%E5%AE%8F%E6%99%AFeHR-report_org_collect_tree.jsp%E5%AD%98%E5%9C%A8SQL%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md#%E5%AE%8F%E6%99%AFehr-report_org_collect_treejsp%E5%AD%98%E5%9C%A8sql%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E
