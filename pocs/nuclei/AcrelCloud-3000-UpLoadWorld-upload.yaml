id: AcrelCloud-3000-UpLoadWorld-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 安科瑞-智能环保云平台 uploadworld 存在任意文件上传漏洞
  reference:
    - https://
  tags: tags
variables:
