id: zzcms-index-sqli

info:
  name: zzcms-ad_list-sqli
  author: wangzong
  severity: high
  description: ZZCMS 2023 is a rapid site building system, product investment template program source code, can quickly build product investment network. For example, medical investment, health products investment, cosmetics investment, agricultural investment, pregnancy and child investment, alcohol and non-staple food.
  reference:
    - https://github.com/En0t5/vul/blob/main/zzcms/zzcms-add_list-sql-inject.md
