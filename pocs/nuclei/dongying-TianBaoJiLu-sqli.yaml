id: dongying-TianBaoJiLu-sqli
info:
  name: dongying-TianBaoJiLu-sqli
  author: apple
  severity: high
  description: 金石工程项目管理系统TianBaoJiLu.aspx存在SQL注入漏洞.
  reference:
    - https://
  tags: tags
http:
