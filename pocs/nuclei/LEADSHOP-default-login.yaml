id: LEADSHOP-default-login
info:
  name: LEADSHOP-default-login
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /index.php?q=/api/leadmall/login HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: application/json, text/plain, */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/json
        Qm-App-Type: undefined
        Qm-App-Id: 98c08c25f8136d590c
        Qm-App-Secret: 3AYpU16dZ1CY7ejqvrE39B351vanLJVD
        Content-Length: 44
        Origin: https://{{Hostname}}
        Referer: https://{{Hostname}}/index.php?r=admin%2Findex
        Sec-Fetch-Dest: empty
        Sec-Fetch-Mode: cors
        Sec-Fetch-Site: same-origin
        Te: trailers
        Connection: close

        {"mobile":"18888888888","password":"123456"}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"id":1'
      - type: word
        part: body
        words:
          - 'access_token'