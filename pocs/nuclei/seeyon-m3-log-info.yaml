id: seeyon-m3-log-info
info:
  name: Template Name
  author: apple
  severity: info
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        GET //mobile_portal/logs/autoLogin.log HTTP/1.1 HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9
      - |-
        GET /mobile_portal/logs/app.log HTTP/1.1 HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9
      - |-
        GET /mobile_portal/logs/requset.log HTTP/1.1 HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
        Accept-Encoding: gzip, deflate, br, zstd
        Accept-Language: zh-CN,zh;q=0.9
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - 'AUTOLOGIN.transLogin'
      - type: word
        part: body
        words:
          - 'M3 HTTP CLIENT REQUEST'
