id: yapi-NoSQL-sqli
info:
  name: YApi从NoSQL注入到RCE远程命令执行
  author: apple
  severity: critical
  description: YApi是一个可本地部署的、打通前后端及QA的、可视化的接口管理平台。可以从NoSQL注入到RCE远程命令执行
  reference:
    - http://zeo.cool/2023/03/05/YApi%E5%88%86%E6%9E%90%E4%BB%8ENoSQL%E6%B3%A8%E5%85%A5%E5%88%B0RCE%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C.md/
    - https://github.com/Threekiii/Vulhub-Reproduce/blob/master/YApi%20NoSQL%E6%B3%A8%E5%85%A5%E5%AF%BC%E8%87%B4%E8%BF%9C%E7%A8%8B%E5%91%BD%E4%BB%A4%E6%89%A7%E8%A1%8C%E6%BC%8F%E6%B4%9E.md
  tags: yapi
  
