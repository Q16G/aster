id: fe-uploadFile-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: FE 办公协作平台是实现应用开发、运行、管理、维护的信息管理平台。飞企互联 FE 业务协作平台存在文件读取漏洞，攻击者可通过该漏洞读取系统重要文件获取大量敏感信息。
  reference:
    - http://kpanda.wiki/#/Vulnhub/F1-3%E9%A3%9E%E4%BC%81%E4%BA%92%E8%81%94-FE%E4%BC%81%E4%B8%9A%E8%BF%90%E8%90%A5%E7%AE%A1%E7%90%86%E5%B9%B3%E5%8F%B0-%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0?id=f1-3%e9%a3%9e%e4%bc%81%e4%ba%92%e8%81%94-fe%e4%bc%81%e4%b8%9a%e8%bf%90%e8%90%a5%e7%ae%a1%e7%90%86%e5%b9%b3%e5%8f%b0-%e6%96%87%e4%bb%b6%e4%b8%8a%e4%bc%a0
  tags: tags
variables:
