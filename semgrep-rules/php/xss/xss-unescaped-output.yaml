rules:
  - id: php-xss-unescaped-output
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-79
      owasp: "A03:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      Cross-site scripting (XSS) via direct output of a variable assigned
      from user input ($_GET, $_POST, $_REQUEST, $_COOKIE, $_SERVER).
      The variable is echoed without sanitization. Use htmlspecialchars()
      with ENT_QUOTES and UTF-8 encoding before outputting user data.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
    pattern-sinks:
      - pattern: echo $X;
      - pattern: print($X);
      - pattern: print $X;
    pattern-sanitizers:
      - pattern: htmlspecialchars(...)
      - pattern: htmlentities(...)
      - pattern: strip_tags(...)
      - pattern: intval(...)
