rules:
  - id: php-xss-echo-print
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-79
      owasp: "A03:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      Cross-site scripting (XSS) via echo or print of unsanitized
      superglobal ($_GET, $_POST, $_REQUEST). User input is output
      directly without HTML encoding. Use htmlspecialchars($input,
      ENT_QUOTES, 'UTF-8') to properly escape output.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
    pattern-sinks:
      - pattern: echo $X;
      - pattern: print($X);
      - pattern: print $X;
      - pattern: printf($FMT, ..., $X, ...);
    pattern-sanitizers:
      - pattern: htmlspecialchars(...)
      - pattern: htmlentities(...)
      - pattern: strip_tags(...)
      - pattern: intval(...)
      - pattern: (int)$X
