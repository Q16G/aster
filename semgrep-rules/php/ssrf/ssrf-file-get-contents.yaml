rules:
  - id: php-ssrf-file-get-contents
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-918
      owasp: "A10:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      Server-side request forgery (SSRF) via file_get_contents() with
      user-controlled URL. When allow_url_fopen is enabled (default),
      file_get_contents() can fetch remote URLs. An attacker may access
      internal services or cloud metadata endpoints. Validate URLs
      against an allowlist of permitted hosts and disable
      allow_url_fopen if remote file access is not needed.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
    pattern-sinks:
      - pattern: file_get_contents($X)
    pattern-sanitizers:
      - pattern: filter_var(..., FILTER_VALIDATE_URL)
      - pattern: parse_url(...)
