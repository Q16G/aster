rules:
  - id: php-ssrf-curl
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-918
      owasp: "A10:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      Server-side request forgery (SSRF) via cURL with user-controlled
      URL. An attacker may force the server to make requests to internal
      services, cloud metadata endpoints (169.254.169.254), or other
      unintended destinations. Validate URLs against an allowlist of
      permitted hosts and schemes, and block private/internal IP ranges.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
    pattern-sinks:
      - pattern: curl_setopt($CH, CURLOPT_URL, $X)
      - pattern: curl_init($X)
    pattern-sanitizers:
      - pattern: filter_var(..., FILTER_VALIDATE_URL)
