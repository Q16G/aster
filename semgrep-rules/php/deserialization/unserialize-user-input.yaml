rules:
  - id: php-deserialization-unserialize-user-input
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-502
      owasp: "A08:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      Insecure deserialization via unserialize() with user-controlled
      input. An attacker can craft a malicious serialized payload to
      achieve remote code execution through PHP magic methods (__wakeup,
      __destruct, __toString). Use json_decode() for data interchange,
      or if unserialize is required, use the allowed_classes option
      (PHP 7.0+) to restrict instantiable classes.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: file_get_contents("php://input")
    pattern-sinks:
      - pattern: unserialize($X)
    pattern-sanitizers:
      - pattern: json_decode(...)
