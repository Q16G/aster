rules:
  - id: php-deserialization-phar-deserialization
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-502
      owasp: "A08:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      Phar deserialization vulnerability. File operations on phar://
      streams with user-controlled paths trigger automatic
      deserialization of the phar manifest metadata. An attacker can
      supply a crafted phar file to achieve remote code execution.
      Validate and restrict file paths, avoid phar:// with user input,
      and set phar.readonly=1 in php.ini.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_FILES
      - pattern: file_get_contents("php://input")
    pattern-sinks:
      - pattern: file_get_contents($X)
      - pattern: file_exists($X)
      - pattern: is_file($X)
      - pattern: is_dir($X)
      - pattern: fopen($X, ...)
      - pattern: include($X)
      - pattern: require($X)
      - pattern: include_once($X)
      - pattern: require_once($X)
    pattern-sanitizers:
      - pattern: basename(...)
      - pattern: realpath(...)
