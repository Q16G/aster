rules:
  - id: php-ssti-twig
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-1336
      owasp: "A03:2021"
      confidence: HIGH
      needs_dataflow_confirmation: true
    message: >
      Twig server-side template injection. Creating templates from user
      input via createTemplate() or ArrayLoader allows execution of Twig
      expressions and filters. With sandbox disabled (default), attackers
      can call arbitrary PHP functions. Load templates from trusted files
      only and use Twig sandbox extension if dynamic templates are
      unavoidable.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: file_get_contents("php://input")
    pattern-sinks:
      - pattern: $TWIG->createTemplate($X)
      - pattern: new \Twig\Loader\ArrayLoader($X)
      - pattern: new Twig_Loader_Array($X)
    pattern-sanitizers:
      - pattern: htmlspecialchars(...)
      - pattern: strip_tags(...)
