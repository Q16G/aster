rules:
  - id: php-sql-injection-mysqli
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-089
      owasp: "A03:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      SQL injection via mysqli query methods. Passing user-controlled
      input directly to mysqli_query() or $mysqli->query() without
      parameterization enables SQL injection. Use prepared statements:
      $stmt = $mysqli->prepare('SELECT * FROM t WHERE id = ?');
      $stmt->bind_param('i', $id); $stmt->execute();
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
    pattern-sinks:
      - pattern: $MYSQLI->query($X)
      - pattern: $MYSQLI->multi_query($X)
      - pattern: mysqli_query($CONN, $X)
      - pattern: mysqli_multi_query($CONN, $X)
    pattern-sanitizers:
      - pattern: $MYSQLI->prepare(...)
      - pattern: mysqli_prepare(...)
      - pattern: $MYSQLI->real_escape_string(...)
      - pattern: mysqli_real_escape_string(...)
      - pattern: intval(...)
      - pattern: (int)$X
