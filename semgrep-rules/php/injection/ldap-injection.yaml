rules:
  - id: php-injection-ldap-injection
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-90
      owasp: "A03:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      LDAP injection via ldap_search(), ldap_list(), or ldap_read() with
      unsanitized filter input. An attacker may manipulate the LDAP query
      filter to bypass authentication or access unauthorized data. Use
      ldap_escape() (PHP 5.6+) to sanitize user input before embedding
      it in LDAP filters.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
    pattern-sinks:
      - pattern: ldap_search($CONN, $BASE, $X)
      - pattern: ldap_search($CONN, $BASE, $X, ...)
      - pattern: ldap_list($CONN, $BASE, $X)
      - pattern: ldap_list($CONN, $BASE, $X, ...)
      - pattern: ldap_read($CONN, $BASE, $X)
      - pattern: ldap_read($CONN, $BASE, $X, ...)
    pattern-sanitizers:
      - pattern: ldap_escape(...)
