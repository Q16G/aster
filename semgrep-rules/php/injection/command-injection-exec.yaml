rules:
  - id: php-injection-command-injection-exec
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-78
      owasp: "A03:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      OS command injection via exec(), system(), passthru(), shell_exec(),
      popen(), or proc_open() with user-controlled input. An attacker may
      inject arbitrary commands. Use escapeshellarg() or escapeshellcmd()
      to sanitize user input, or avoid shell commands entirely.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: file_get_contents("php://input")
    pattern-sinks:
      - pattern: exec($X)
      - pattern: exec($X, ...)
      - pattern: system($X)
      - pattern: system($X, ...)
      - pattern: passthru($X)
      - pattern: passthru($X, ...)
      - pattern: shell_exec($X)
      - pattern: popen($X, ...)
      - pattern: proc_open($X, ...)
    pattern-sanitizers:
      - pattern: escapeshellarg(...)
      - pattern: escapeshellcmd(...)
      - pattern: intval(...)
      - pattern: (int)$X
