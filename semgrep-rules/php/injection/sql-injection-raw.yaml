rules:
  - id: php-injection-sql-injection-raw
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-89
      owasp: "A03:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      SQL injection via mysqli_query() or mysql_query() with
      user-controlled input. Use prepared statements with parameterized
      queries (mysqli_prepare / bind_param) instead of string
      concatenation or interpolation.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: file_get_contents("php://input")
    pattern-sinks:
      - pattern: mysqli_query($CONN, $X)
      - pattern: mysqli_multi_query($CONN, $X)
      - pattern: mysql_query($X)
      - pattern: mysql_query($X, ...)
    pattern-sanitizers:
      - pattern: mysqli_real_escape_string(...)
      - pattern: mysql_real_escape_string(...)
      - pattern: intval(...)
      - pattern: (int)$X
      - pattern: addslashes(...)
