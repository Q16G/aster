rules:
  - id: php-hardcoded-password
    severity: ERROR
    languages: [php]
    metadata:
      cwe:
        - CWE-798
        - CWE-259
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      Hardcoded password or secret (CWE-798). Credentials embedded in
      source code can be extracted by anyone with access to the
      repository. Store secrets in environment variables or a secrets
      manager.
    pattern-either:
      - patterns:
          - pattern: $password = "...";
          - pattern-not: $password = "";
      - patterns:
          - pattern: $secret = "...";
          - pattern-not: $secret = "";
      - patterns:
          - pattern: $api_key = "...";
          - pattern-not: $api_key = "";
      - patterns:
          - pattern: $apiKey = "...";
          - pattern-not: $apiKey = "";
      - patterns:
          - pattern: $secret_key = "...";
          - pattern-not: $secret_key = "";
      - patterns:
          - pattern: $jwt_secret = "...";
          - pattern-not: $jwt_secret = "";
      - patterns:
          - pattern: $jwtSecret = "...";
          - pattern-not: $jwtSecret = "";
      - patterns:
          - pattern: $private_key = "...";
          - pattern-not: $private_key = "";
      - patterns:
          - pattern: $auth_token = "...";
          - pattern-not: $auth_token = "";
      - patterns:
          - pattern: $db_password = "...";
          - pattern-not: $db_password = "";
      - patterns:
          - pattern: $dbPassword = "...";
          - pattern-not: $dbPassword = "";

  - id: php-hardcoded-db-credentials
    severity: ERROR
    languages: [php]
    metadata:
      cwe:
        - CWE-798
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      Hardcoded database credentials in connection string or config.
      Store credentials in environment variables or .env files excluded
      from version control.
    patterns:
      - pattern-either:
          - pattern: new PDO("...", "...", $PASS)
          - pattern: new mysqli("...", "...", $PASS, ...)
          - pattern: mysqli_connect("...", "...", $PASS, ...)
      - metavariable-regex:
          metavariable: $PASS
          regex: '^"[^"]{1,}"$'
      - pattern-not: new PDO("...", "...", "")
      - pattern-not: new mysqli("...", "...", "", ...)
