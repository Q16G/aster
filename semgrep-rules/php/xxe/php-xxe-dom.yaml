rules:
  - id: php-xxe-dom
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-611
      owasp: "A05:2021"
      confidence: HIGH
      needs_dataflow_confirmation: true
    message: >
      XXE injection via DOMDocument. Loading user-controlled XML without
      disabling external entity resolution allows file disclosure, SSRF,
      and DoS via billion-laughs attack. Call
      libxml_disable_entity_loader(true) (PHP < 8.0), or pass
      LIBXML_NONET flag to loadXML/load.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: file_get_contents("php://input")
    pattern-sinks:
      - pattern: $DOC->loadXML($X)
      - pattern: $DOC->loadXML($X, ...)
      - pattern: $DOC->load($X)
      - pattern: $DOC->load($X, ...)
    pattern-sanitizers:
      - pattern: libxml_disable_entity_loader(true)
