rules:
  - id: php-misc-open-redirect
    mode: taint
    severity: WARNING
    languages: [php]
    metadata:
      cwe: CWE-601
      owasp: "A01:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: >
      Open redirect via header("Location: ...") with user-controlled
      URL. An attacker can craft a link that redirects users to a
      malicious site, enabling phishing attacks. Validate the redirect
      URL against an allowlist of trusted domains, or use only relative
      paths for redirects.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
    pattern-sinks:
      - pattern: header($X)
    pattern-sanitizers:
      - pattern: filter_var(..., FILTER_VALIDATE_URL)
      - pattern: parse_url(...)
