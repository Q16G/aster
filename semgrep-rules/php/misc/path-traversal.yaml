rules:
  - id: php-misc-path-traversal
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-22
      owasp: "A01:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      Path traversal via include, require, fopen, or readfile with
      user-controlled path. An attacker can use ../ sequences to read
      arbitrary files (Local File Inclusion) or, with allow_url_include
      enabled, load remote code (Remote File Inclusion). Validate paths
      against an allowlist, use basename() to strip directory components,
      and verify the resolved path with realpath().
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
    pattern-sinks:
      - pattern: include($X)
      - pattern: include_once($X)
      - pattern: require($X)
      - pattern: require_once($X)
      - pattern: fopen($X, ...)
      - pattern: readfile($X)
      - pattern: file_get_contents($X)
      - pattern: file($X)
    pattern-sanitizers:
      - pattern: basename(...)
      - pattern: realpath(...)
