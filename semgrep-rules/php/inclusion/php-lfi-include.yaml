rules:
  - id: php-lfi-include
    mode: taint
    severity: ERROR
    languages: [php]
    metadata:
      cwe: CWE-098
      owasp: "A03:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: >
      Local file inclusion (LFI) via dynamic include/require. Passing
      user-controlled input to include/require allows reading arbitrary
      files (e.g. /etc/passwd via path traversal) or executing uploaded
      malicious PHP files. Use a whitelist of allowed file paths, or
      map user input to an array of known safe paths.
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
    pattern-sinks:
      - pattern: include($X);
      - pattern: include_once($X);
      - pattern: require($X);
      - pattern: require_once($X);
    pattern-sanitizers:
      - pattern: basename(...)
      - pattern: realpath(...)
      - pattern: intval(...)
