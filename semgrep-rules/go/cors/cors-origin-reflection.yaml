rules:
  - id: go-cors-origin-reflection
    message: >
      CORS origin reflection: the response Access-Control-Allow-Origin header
      is set directly from the request Origin header. This allows any origin
      to make credentialed cross-origin requests, effectively bypassing the
      same-origin policy. Use a strict allowlist of trusted origins instead
      of reflecting the request origin.
    metadata:
      cwe: CWE-942
      owasp:
        - A05:2021 - Security Misconfiguration
        - A01:2021 - Broken Access Control
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: |
              $ORIGIN := $R.Header.Get("Origin")
              ...
              $W.Header().Set("Access-Control-Allow-Origin", $ORIGIN)
          - pattern: $W.Header().Set("Access-Control-Allow-Origin", $R.Header.Get("Origin"))
          - pattern: |
              $ORIGIN := $CTX.GetHeader("Origin")
              ...
              $CTX.Header("Access-Control-Allow-Origin", $ORIGIN)
          - pattern: $CTX.Header("Access-Control-Allow-Origin", $CTX.GetHeader("Origin"))
