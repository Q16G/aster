rules:
  - id: go-misc-unhandled-error
    patterns:
      - pattern-either:
          - pattern: |
              $FILE, _ := os.Open(...)
          - pattern: |
              $FILE, _ = os.Open(...)
          - pattern: |
              $DATA, _ := os.ReadFile(...)
          - pattern: |
              $DATA, _ = os.ReadFile(...)
          - pattern: |
              $DATA, _ := ioutil.ReadFile(...)
          - pattern: |
              $DATA, _ = ioutil.ReadFile(...)
          - pattern: |
              $CONN, _ := net.Dial(...)
          - pattern: |
              $CONN, _ = net.Dial(...)
          - pattern: |
              $RESP, _ := http.Get(...)
          - pattern: |
              $RESP, _ = http.Get(...)
          - pattern: |
              $FILE, _ := os.Create(...)
          - pattern: |
              $FILE, _ = os.Create(...)
    message: >
      Error return value is discarded. Ignoring errors from I/O and
      network operations can lead to silent failures, data corruption,
      or security issues (e.g., operating on a nil file handle). Always
      check and handle error return values.
    metadata:
      cwe: CWE-252
      owasp: "A04:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [go]
