rules:
  - id: python-jwt-missing-claim-validation
    severity: WARNING
    languages: [python]
    metadata:
      cwe:
        - CWE-345
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: |
      JWT claim validation appears incomplete (CWE-345): jwt.decode is
      called without issuer / audience constraints. PyJWT verifies the
      signature and exp by default, but iss / aud are only checked when
      explicitly configured. Tokens issued for another tenant or service
      could be accepted.

      Mitigation:
        * Pass issuer / audience to jwt.decode:
            jwt.decode(token, key, algorithms=["RS256"],
                       issuer="https://issuer/", audience="my-api")
        * Or set options={"require": ["exp", "iss", "aud"]} (PyJWT 2.x).
    patterns:
      - pattern-either:
          - pattern: jwt.decode($T, $K, algorithms=[...])
          - pattern: jose.jwt.decode($T, $K, algorithms=[...])
      - pattern-not: jwt.decode($T, $K, ..., issuer=$I, ...)
      - pattern-not: jwt.decode($T, $K, ..., audience=$A, ...)
      - pattern-not: jose.jwt.decode($T, $K, ..., issuer=$I, ...)
      - pattern-not: jose.jwt.decode($T, $K, ..., audience=$A, ...)
