rules:
  - id: python-jwt-weak-secret
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - CWE-326
        - CWE-521
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: |
      Weak JWT signing secret: a string literal shorter than 32 chars
      is used as the HMAC key for jwt.encode / jwt.decode. RFC 7518
      recommends keys at least the size of the HMAC output (32 bytes
      for HS256). Short secrets are easily brute-forced offline from a
      single captured token.

      Mitigation:
        * Generate a 256-bit secret, store it in env / secrets manager:
            import secrets; secrets.token_urlsafe(32)
        * Prefer asymmetric algorithms (RS256 / ES256) where possible.
    patterns:
      - pattern-either:
          - pattern: jwt.encode($P, $S, ...)
          - pattern: jwt.decode($T, $S, ...)
          - pattern: jose.jwt.encode($P, $S, ...)
          - pattern: jose.jwt.decode($T, $S, ...)
      - metavariable-regex:
          metavariable: $S
          regex: "^['\"][^'\"]{1,31}['\"]$"
