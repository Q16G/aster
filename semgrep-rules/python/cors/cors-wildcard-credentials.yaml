rules:
  - id: python-cors-wildcard-credentials
    message: >
      Insecure CORS configuration: Flask-CORS allows wildcard or default
      origins together with credentialed requests. Use an explicit allowlist of
      trusted origins and avoid `supports_credentials=True` with `origins="*"`.
    metadata:
      cwe: CWE-942
      owasp:
        - A05:2021 - Security Misconfiguration
        - A02:2025 - Security Misconfiguration
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: flask_cors.CORS($APP, origins="*", supports_credentials=True, ...)
          - pattern: CORS($APP, origins="*", supports_credentials=True, ...)
          - pattern: flask_cors.CORS($APP, supports_credentials=True, ...)
          - pattern: CORS($APP, supports_credentials=True, ...)
      - pattern-not: flask_cors.CORS($APP, origins=$ORIGINS, supports_credentials=True, ...)
      - pattern-not: CORS($APP, origins=$ORIGINS, supports_credentials=True, ...)
