rules:
  - id: python-hardcoded-secret-key
    message: >
      Hardcoded application or JWT secret detected. Secrets must not be stored
      in source code; load them from environment variables or a secret manager.
    metadata:
      cwe: CWE-798
      owasp:
        - A07:2021 - Identification and Authentication Failures
        - A07:2025 - Authentication Failures
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: SECRET_KEY = "..."
          - pattern: $APP.secret_key = "..."
          - pattern: $APP.config["SECRET_KEY"] = "..."
          - pattern: $APP.config['SECRET_KEY'] = "..."
          - pattern: jwt.encode($PAYLOAD, "...", ...)
          - pattern: jwt.decode($TOKEN, "...", ...)
