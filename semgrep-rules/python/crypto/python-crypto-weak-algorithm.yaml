rules:
  - id: python-crypto-weak-algorithm
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - CWE-327
        - CWE-328
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: |
      Weak cryptographic algorithm (CWE-327): DES, ARC4, Blowfish, MD5,
      or SHA1 is used in a security-sensitive context. These algorithms
      are broken or deprecated.

      Mitigation:
        * Encryption: use AES-GCM (cryptography.fernet or
          Cipher(algorithms.AES(key), modes.GCM(nonce))).
        * Hashing: use SHA-256+ (hashlib.sha256).
        * Password hashing: use bcrypt / argon2-cffi / passlib.
    patterns:
      - pattern-either:
          # PyCryptodome / PyCrypto
          - pattern: DES.new(...)
          - pattern: DES3.new(...)
          - pattern: ARC4.new(...)
          - pattern: Blowfish.new(...)
          - pattern: Crypto.Cipher.DES.new(...)
          - pattern: Crypto.Cipher.DES3.new(...)
          - pattern: Crypto.Cipher.ARC4.new(...)
          - pattern: Crypto.Cipher.Blowfish.new(...)
          # hashlib
          - pattern: hashlib.md5(...)
          - pattern: hashlib.sha1(...)
          - pattern: hashlib.new("md5", ...)
          - pattern: hashlib.new("sha1", ...)
          # cryptography
          - pattern: algorithms.TripleDES(...)
          - pattern: algorithms.Blowfish(...)
          - pattern: algorithms.ARC4(...)

  - id: python-crypto-insecure-random
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - CWE-330
        - CWE-338
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: |
      Insecure random number generator (CWE-338): the random module is
      not cryptographically secure. Using it to generate tokens, keys,
      or session IDs allows attackers to predict values.

      Mitigation:
        * Use secrets.token_hex / secrets.token_urlsafe / secrets.randbelow
          for all security-sensitive random values.
    patterns:
      - pattern-either:
          - pattern: random.randint(...)
          - pattern: random.random()
          - pattern: random.choice(...)
          - pattern: random.choices(...)
          - pattern: random.getrandbits(...)
          - pattern: random.sample(...)
          - pattern: random.uniform(...)
      # 注：此规则可能在测试代码中产生噪声，建议通过 .semgrepignore
      # 或 nosemgrep 注释排除测试文件。

  - id: python-crypto-tls-unverified
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - CWE-295
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: |
      TLS certificate verification disabled (CWE-295): verify=False or
      ssl._create_unverified_context disables server certificate
      validation, enabling man-in-the-middle attacks.

      Mitigation:
        * Remove verify=False; requests verifies by default.
        * For self-signed certs, pass verify="/path/to/ca-bundle.crt".
    patterns:
      - pattern-either:
          - pattern: requests.get(..., verify=False, ...)
          - pattern: requests.post(..., verify=False, ...)
          - pattern: requests.put(..., verify=False, ...)
          - pattern: requests.delete(..., verify=False, ...)
          - pattern: requests.patch(..., verify=False, ...)
          - pattern: requests.head(..., verify=False, ...)
          - pattern: requests.request(..., verify=False, ...)
          - pattern: httpx.get(..., verify=False, ...)
          - pattern: httpx.post(..., verify=False, ...)
          - pattern: httpx.Client(..., verify=False, ...)
          - pattern: httpx.AsyncClient(..., verify=False, ...)
          - pattern: urllib3.PoolManager(..., cert_reqs="CERT_NONE", ...)
          - pattern: ssl._create_unverified_context(...)
