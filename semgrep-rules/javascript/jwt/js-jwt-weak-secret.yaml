rules:
  - id: js-jwt-weak-secret
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe:
        - CWE-326
        - CWE-521
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      needs_dataflow_confirmation: false
    message: |
      Weak JWT signing secret: a string literal shorter than 32 chars
      is used as the HMAC key for jwt.sign / jwt.verify. RFC 7518
      recommends keys with at least the size of the HMAC output (32
      bytes for HS256). Short secrets are easily brute-forced offline
      from any captured token.

      Mitigation:
        * Generate a 256-bit (32 bytes) random secret with
          crypto.randomBytes(32).toString('base64') and load it from
          a secret manager / env var.
        * Prefer asymmetric algorithms (RS256 / ES256) when feasible.
    patterns:
      - pattern-either:
          - pattern: jwt.sign($P, $S, ...)
          - pattern: jwt.verify($T, $S, ...)
          - pattern: jsonwebtoken.sign($P, $S, ...)
          - pattern: jsonwebtoken.verify($T, $S, ...)
      - metavariable-regex:
          metavariable: $S
          # 仅当 $S 是 < 32 字符的字符串字面量（含引号）时报告
          regex: "^['\"][^'\"]{1,31}['\"]$"
