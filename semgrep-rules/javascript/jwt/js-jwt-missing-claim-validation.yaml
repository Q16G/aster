rules:
  - id: js-jwt-missing-claim-validation
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe:
        - CWE-345
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    message: |
      JWT claim validation appears incomplete (CWE-345): jwt.verify is
      called without issuer / audience constraints. node-jsonwebtoken
      verifies signature and exp by default, but iss / aud are only
      checked when explicitly configured. Tokens issued for another
      service or tenant could be accepted.

      Mitigation:
        * Pass issuer / audience options to jwt.verify:
            jwt.verify(token, key, { issuer: 'https://issuer/',
                                     audience: 'my-api' })
        * Always set maxAge or rely on the exp claim being present.
    patterns:
      - pattern-either:
          - pattern: jwt.verify($T, $K, $OPT)
          - pattern: jsonwebtoken.verify($T, $K, $OPT)
      - metavariable-pattern:
          metavariable: $OPT
          patterns:
            - pattern-either:
                - pattern: "{...}"
            - pattern-not: "{..., issuer: $X, ...}"
            - pattern-not: "{..., audience: $X, ...}"
