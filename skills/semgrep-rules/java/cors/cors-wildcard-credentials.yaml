rules:
  - id: java-cors-wildcard-credentials
    message: >
      Insecure CORS configuration: wildcard origins are combined with
      credentials in Spring CORS configuration. Browsers reject some cases, but
      origin reflection or permissive configuration here can still create a
      dangerous cross-origin trust model. Use an explicit allowlist of trusted
      origins.
    metadata:
      cwe: CWE-942
      owasp:
        - A05:2021 - Security Misconfiguration
        - A02:2025 - Security Misconfiguration
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: '@CrossOrigin(origins = "*", allowCredentials = "true")'
          - pattern: |
              $CFG = new CorsConfiguration();
              ...
              $CFG.addAllowedOrigin("*");
              ...
              $CFG.setAllowCredentials(true);
          - pattern: |
              $CFG = new CorsConfiguration();
              ...
              $CFG.setAllowedOrigins(java.util.Arrays.asList("*"));
              ...
              $CFG.setAllowCredentials(true);
