rules:
  - id: java-misc-missing-checklogin-sensitive-controller
    message: >
      Sensitive controller method appears to lack any authentication or
      authorization check. No @PreAuthorize, @Secured, @RolesAllowed
      annotation and no call to getSession(), SecurityContextHolder, or
      custom login check found. Verify that access control is enforced
      upstream (e.g. via a filter or interceptor).
    metadata:
      cwe: CWE-306
      owasp:
        - A01:2021 - Broken Access Control
        - A07:2021 - Identification and Authentication Failures
      confidence: LOW
      needs_dataflow_confirmation: false
      review_classification: Semantic review required
    severity: WARNING
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: |
              @$MAPPING("...")
              $RET $FUNC(...) {
                ...
              }
      - pattern-not-inside: |
          @PreAuthorize(...)
          $RET $FUNC(...) { ... }
      - pattern-not-inside: |
          @Secured(...)
          $RET $FUNC(...) { ... }
      - pattern-not-inside: |
          @RolesAllowed(...)
          $RET $FUNC(...) { ... }
      - pattern-not-inside: |
          @RequiresAuthentication
          $RET $FUNC(...) { ... }
      - pattern-not-inside: |
          @RequiresRoles(...)
          $RET $FUNC(...) { ... }
      - pattern-not: |
          @$MAPPING("...")
          $RET $FUNC(...) {
            ...
            $REQ.getSession(...);
            ...
          }
      - pattern-not: |
          @$MAPPING("...")
          $RET $FUNC(...) {
            ...
            SecurityContextHolder.getContext();
            ...
          }
      - metavariable-regex:
          metavariable: $MAPPING
          regex: (RequestMapping|GetMapping|PostMapping|PutMapping|DeleteMapping|PatchMapping)
      - metavariable-regex:
          metavariable: $FUNC
          regex: (?i).*(create|delete|update|modify|add|remove|import|export|admin|manage|config|batch|approve|reject|transfer|assign).*
