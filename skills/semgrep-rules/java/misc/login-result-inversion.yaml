rules:
  - id: java-misc-login-result-inversion
    message: >
      Suspicious authentication success/failure inversion: the login method
      appears to return a failure result when a user record exists, or a
      success result when the record is absent. Review the authentication
      branches carefully.
    metadata:
      cwe: CWE-287
      owasp:
        - A07:2021 - Identification and Authentication Failures
        - A07:2025 - Identification and Authentication Failures
      confidence: LOW
      needs_dataflow_confirmation: false
      review_classification: Semantic review required
    severity: WARNING
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($USER != null) {
                  return false;
                } else {
                  return true;
                }
                ...
              }
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($USER == null) {
                  return true;
                } else {
                  return false;
                }
                ...
              }
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($USER != null && !$USER.$FIELD().equals("")) {
                  return false;
                } else {
                  return true;
                }
                ...
              }
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($USER != null) {
                  return $RESULT.error(...);
                }
                ...
              }
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($USER != null) {
                  throw new $EXCEPTION(...);
                }
                ...
              }
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($LIST.isEmpty()) {
                  return true;
                }
                ...
              }
          - pattern: |
              $RET $FUNC(...) {
                ...
                if ($LIST.size() == 0) {
                  return true;
                }
                ...
              }
      - metavariable-regex:
          metavariable: $FUNC
          regex: (?i).*(login|signin|signIn|auth|authenticate|doLogin|processLogin|handleLogin|checkPassword|verifyCredentials).*
