rules:
  - id: java-auth-csrf-disabled
    patterns:
      - pattern-either:
          - pattern: $HTTP.csrf().disable()
          - pattern: $HTTP.csrf($X -> $X.disable())
          - pattern: |
              http.csrf(csrf -> csrf.disable());
    message: >
      CSRF protection is explicitly disabled. Disabling CSRF protection
      makes the application vulnerable to cross-site request forgery
      attacks. Only disable CSRF for stateless API endpoints that use
      token-based authentication (e.g., JWT). For session-based apps,
      keep CSRF protection enabled.
    metadata:
      cwe: CWE-352
      owasp: "A01:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [java]
