rules:
  - id: java-hardcoded-jwt-secret
    message: >
      Hardcoded JWT secret detected. Signing or verifying tokens with a secret
      embedded in source code makes credential rotation difficult and exposes
      the key to anyone with code access. Load signing keys from secure
      configuration or a secret manager.
    metadata:
      cwe: CWE-798
      owasp:
        - A07:2021 - Identification and Authentication Failures
        - A07:2025 - Authentication Failures
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: io.jsonwebtoken.security.Keys.hmacShaKeyFor("...".getBytes(...))
          - pattern: io.jsonwebtoken.security.Keys.hmacShaKeyFor("...".getBytes())
          - pattern: com.auth0.jwt.algorithms.Algorithm.HMAC256("...")
          - pattern: com.auth0.jwt.algorithms.Algorithm.HMAC512("...")
          - pattern: $PARSER.setSigningKey("...")
          - pattern: $PARSER.setSigningKey("...".getBytes(...))
