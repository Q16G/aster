rules:
  - id: java-crypto-ecb-mode
    patterns:
      - pattern-either:
          - pattern: Cipher.getInstance("AES/ECB/...")
          - pattern: Cipher.getInstance("AES/ECB/PKCS5Padding")
          - pattern: Cipher.getInstance("AES/ECB/NoPadding")
          - pattern: Cipher.getInstance("AES")
    message: >
      ECB mode detected or implied. AES in ECB mode does not provide
      semantic security because identical plaintext blocks produce
      identical ciphertext blocks. Use AES/GCM/NoPadding for
      authenticated encryption or AES/CBC/PKCS5Padding with a random IV
      and separate HMAC.
    metadata:
      cwe: CWE-327
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [java]
