rules:
  - id: java-crypto-weak-cipher-des-rc4
    patterns:
      - pattern-either:
          - pattern: Cipher.getInstance("DES")
          - pattern: Cipher.getInstance("DES/...")
          - pattern: Cipher.getInstance("DESede")
          - pattern: Cipher.getInstance("DESede/...")
          - pattern: Cipher.getInstance("RC4")
          - pattern: Cipher.getInstance("RC2")
          - pattern: Cipher.getInstance("RC2/...")
          - pattern: Cipher.getInstance("ARCFOUR")
          - pattern: Cipher.getInstance("Blowfish")
          - pattern: Cipher.getInstance("Blowfish/...")
    message: >
      Weak cipher algorithm detected. DES, 3DES, RC2, RC4, and Blowfish
      are considered insecure. Use AES with a secure mode (GCM or CBC
      with HMAC) and a key size of at least 128 bits.
    metadata:
      cwe: CWE-327
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [java]
