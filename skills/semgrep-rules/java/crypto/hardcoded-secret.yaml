rules:
  - id: java-crypto-hardcoded-secret
    patterns:
      - pattern-either:
          - pattern: String $PASSWORD = "...";
          - pattern: String $SECRET = "...";
          - pattern: String $API_KEY = "...";
          - pattern: String $APIKEY = "...";
          - pattern: String $TOKEN = "...";
          - pattern: String $PRIVATE_KEY = "...";
          - pattern: String $CREDENTIAL = "...";
          - pattern: String $CREDENTIALS = "...";
      - metavariable-regex:
          metavariable: $PASSWORD
          regex: (?i).*(password|passwd|pwd|secret|api_key|apikey|token|private_key|credential).*
    message: >
      Hardcoded secret detected. A string literal is assigned to a
      variable whose name suggests it is a secret (password, secret,
      key, token, credential). Store secrets in environment variables,
      a secrets manager, or a secure vault instead.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [java]
