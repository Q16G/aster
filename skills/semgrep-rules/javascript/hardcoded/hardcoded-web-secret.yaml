rules:
  - id: javascript-hardcoded-web-secret
    message: >
      Hardcoded secret detected in JWT signing/verifying or session
      configuration. Secrets must not be embedded in source code; load them from
      environment variables or a secret manager.
    metadata:
      cwe: CWE-798
      owasp:
        - A07:2021 - Identification and Authentication Failures
        - A07:2025 - Authentication Failures
      confidence: HIGH
      needs_dataflow_confirmation: false
      references:
        - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "...", ...)
          - pattern: jwt.verify($TOKEN, "...", ...)
          - pattern: jsonwebtoken.sign($PAYLOAD, "...", ...)
          - pattern: jsonwebtoken.verify($TOKEN, "...", ...)
          - pattern: 'expressSession({..., secret: "...", ...})'
          - pattern: 'session({..., secret: "...", ...})'
      - pattern-not: jwt.sign($PAYLOAD, process.env.$SECRET, ...)
      - pattern-not: jwt.verify($TOKEN, process.env.$SECRET, ...)
