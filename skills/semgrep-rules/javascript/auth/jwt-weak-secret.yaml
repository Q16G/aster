rules:
  - id: javascript-auth-jwt-weak-secret
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "...", ...)
          - pattern: jwt.sign($PAYLOAD, '...', ...)
          - pattern: jwt.verify($TOKEN, "...", ...)
          - pattern: jwt.verify($TOKEN, '...', ...)
          - pattern: |
              $SECRET = "..."
              ...
              jwt.sign($PAYLOAD, $SECRET, ...)
          - pattern: |
              const $SECRET = "..."
              ...
              jwt.sign($PAYLOAD, $SECRET, ...)
    message: >
      JWT signed or verified with a hardcoded secret. Hardcoded secrets in source
      code can be extracted by anyone with repository access. Use environment
      variables (process.env.JWT_SECRET) or a secrets manager for JWT signing
      keys. Consider using asymmetric algorithms (RS256) for better key management.
    metadata:
      cwe: CWE-798
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [javascript, typescript]
