rules:
  - id: javascript-auth-cors-permissive
    patterns:
      - pattern-either:
          - pattern: |
              $RES.setHeader("Access-Control-Allow-Origin", "*")
          - pattern: |
              $RES.header("Access-Control-Allow-Origin", "*")
          - pattern: |
              $RES.set("Access-Control-Allow-Origin", "*")
          - pattern: |
              cors({..., origin: true, ...})
          - pattern: |
              cors({..., origin: "*", ...})
          - pattern: |
              $RES.setHeader("Access-Control-Allow-Origin", $REQ.headers.origin)
          - pattern: |
              $RES.header("Access-Control-Allow-Origin", $REQ.headers.origin)
    message: >
      Overly permissive CORS configuration. Setting Access-Control-Allow-Origin
      to "*" or reflecting the request origin allows any website to make
      cross-origin requests to this API, potentially enabling data theft.
      Restrict allowed origins to a specific allowlist of trusted domains.
    metadata:
      cwe: CWE-942
      owasp: "A05:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [javascript, typescript]
