rules:
  - id: javascript-auth-cookie-no-flags
    patterns:
      - pattern-either:
          - pattern: |
              $RES.cookie($NAME, $VALUE, {})
          - pattern: |
              $RES.cookie($NAME, $VALUE)
          - pattern: |
              $RES.cookie($NAME, $VALUE, {..., secure: false, ...})
          - pattern: |
              $RES.cookie($NAME, $VALUE, {..., httpOnly: false, ...})
    message: >
      Cookie set without security flags. Cookies should be set with the Secure
      flag (transmitted only over HTTPS), HttpOnly flag (not accessible via
      JavaScript), and SameSite attribute (CSRF protection). Example:
      res.cookie(name, value, { secure: true, httpOnly: true, sameSite: "strict" }).
    metadata:
      cwe: CWE-614
      owasp: "A05:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [javascript, typescript]
