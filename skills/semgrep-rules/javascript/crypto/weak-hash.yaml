rules:
  - id: javascript-crypto-weak-hash
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("md5")
          - pattern: crypto.createHash("sha1")
          - pattern: crypto.createHash('md5')
          - pattern: crypto.createHash('sha1')
          - pattern: CryptoJS.MD5(...)
          - pattern: CryptoJS.SHA1(...)
    message: >
      Use of weak hash algorithm (MD5 or SHA-1). These algorithms are
      cryptographically broken and must not be used for security purposes such
      as password hashing, digital signatures, or integrity verification. Use
      crypto.createHash("sha256") or crypto.createHash("sha3-256") instead.
      For passwords, use bcrypt, scrypt, or argon2.
    metadata:
      cwe: CWE-328
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [javascript, typescript]
