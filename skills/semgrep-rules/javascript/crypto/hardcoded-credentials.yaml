rules:
  - id: javascript-crypto-hardcoded-credentials
    pattern-either:
      - pattern: |
          const password = "..."
      - pattern: |
          const secret = "..."
      - pattern: |
          const apiKey = "..."
      - pattern: |
          const api_key = "..."
      - pattern: |
          const token = "..."
      - pattern: |
          const privateKey = "..."
      - pattern: |
          const private_key = "..."
      - pattern: |
          const accessKey = "..."
      - pattern: |
          const secretKey = "..."
      - pattern: |
          let password = "..."
      - pattern: |
          let secret = "..."
      - pattern: |
          let apiKey = "..."
      - pattern: |
          let token = "..."
      - pattern: |
          var password = "..."
      - pattern: |
          var secret = "..."
      - pattern: |
          var apiKey = "..."
      - pattern: |
          var token = "..."
    message: >
      Hardcoded credential detected. A string literal is assigned to a variable
      named password, secret, apiKey, token, or similar. Store secrets in
      environment variables (process.env.SECRET) or a secrets manager, never
      in source code.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [javascript, typescript]
