rules:
  - id: javascript-crypto-weak-cipher
    patterns:
      - pattern-either:
          - pattern: crypto.createCipher("des", ...)
          - pattern: crypto.createCipher("des-ede", ...)
          - pattern: crypto.createCipher("des-ede3", ...)
          - pattern: crypto.createCipher("rc4", ...)
          - pattern: crypto.createCipher("rc2", ...)
          - pattern: crypto.createCipheriv("des", ...)
          - pattern: crypto.createCipheriv("des-ede", ...)
          - pattern: crypto.createCipheriv("des-ede3", ...)
          - pattern: crypto.createCipheriv("rc4", ...)
          - pattern: crypto.createCipheriv("rc2", ...)
          - pattern: crypto.createCipher('des', ...)
          - pattern: crypto.createCipher('rc4', ...)
          - pattern: crypto.createCipheriv('des', ...)
          - pattern: crypto.createCipheriv('rc4', ...)
          - pattern: CryptoJS.DES.encrypt(...)
          - pattern: CryptoJS.TripleDES.encrypt(...)
          - pattern: CryptoJS.RC4.encrypt(...)
          - pattern: CryptoJS.Rabbit.encrypt(...)
    message: >
      Use of weak or deprecated cipher algorithm (DES, 3DES, RC4, RC2). These
      ciphers have known vulnerabilities and insufficient key lengths for modern
      security. Use AES-256-GCM or ChaCha20-Poly1305 instead:
      crypto.createCipheriv("aes-256-gcm", key, iv).
    metadata:
      cwe: CWE-327
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [javascript, typescript]
