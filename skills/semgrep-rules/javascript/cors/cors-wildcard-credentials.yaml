rules:
  - id: javascript-cors-wildcard-credentials
    message: >
      Insecure CORS configuration: wildcard or reflected origins are combined
      with credentials. This can allow authenticated cross-origin requests from
      untrusted origins. Use a strict allowlist of trusted origins and avoid
      `credentials: true` with `origin: "*" | true`.
    metadata:
      cwe: CWE-942
      owasp:
        - A05:2021 - Security Misconfiguration
        - A02:2025 - Security Misconfiguration
      confidence: HIGH
      needs_dataflow_confirmation: false
      references:
        - https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: 'cors({..., origin: "*", ..., credentials: true, ...})'
          - pattern: 'cors({..., origin: true, ..., credentials: true, ...})'
          - pattern: |
              $RES.set("Access-Control-Allow-Origin", "*");
              ...
              $RES.set("Access-Control-Allow-Credentials", "true");
          - pattern: |
              $RES.setHeader("Access-Control-Allow-Origin", "*");
              ...
              $RES.setHeader("Access-Control-Allow-Credentials", "true");
