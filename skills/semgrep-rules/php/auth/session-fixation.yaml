rules:
  - id: php-auth-session-fixation
    patterns:
      - pattern: |
          $_SESSION[$AUTH] = true;
      - pattern-not-inside: |
          session_regenerate_id(...);
          ...
          $_SESSION[$AUTH] = true;
      - pattern-not-inside: |
          ...
          session_regenerate_id(...);
          ...
          $_SESSION[$AUTH] = true;
      - metavariable-regex:
          metavariable: $AUTH
          regex: (?i).*(logged_in|authenticated|is_admin|auth|login|user_id|is_logged).*
    message: >
      Potential session fixation vulnerability. A session variable
      indicating successful authentication is set without first calling
      session_regenerate_id(). An attacker who knows or sets a victim's
      session ID before login can hijack the session after
      authentication. Call session_regenerate_id(true) immediately
      before or after setting authentication session variables.
    metadata:
      cwe: CWE-384
      owasp: "A07:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    severity: WARNING
    languages: [php]
