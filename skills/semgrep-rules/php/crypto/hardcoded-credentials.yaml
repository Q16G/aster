rules:
  - id: php-crypto-hardcoded-credentials
    patterns:
      - pattern: $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)\$.*(password|passwd|pwd|secret|api_key|apikey|api_secret|token|private_key|db_password|mysql_password|aws_secret|auth_token|access_key).*
      - pattern-not: $VAR = "";
    message: >
      Hardcoded credential detected. Passwords, API keys, secrets, and
      tokens should not be stored as string literals in source code. They
      can be extracted from compiled code or version control history.
      Use environment variables, a secrets manager, or a configuration
      file excluded from version control.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [php]
