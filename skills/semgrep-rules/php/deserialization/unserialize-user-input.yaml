rules:
  - id: php-deserialization-unserialize-user-input
    patterns:
      - pattern-either:
          - pattern: unserialize($_GET[$KEY]);
          - pattern: unserialize($_POST[$KEY]);
          - pattern: unserialize($_REQUEST[$KEY]);
          - pattern: unserialize($_COOKIE[$KEY]);
          - pattern: |
              $DATA = $_GET[$KEY];
              ...
              unserialize($DATA);
          - pattern: |
              $DATA = $_POST[$KEY];
              ...
              unserialize($DATA);
          - pattern: |
              $DATA = $_REQUEST[$KEY];
              ...
              unserialize($DATA);
          - pattern: |
              $DATA = $_COOKIE[$KEY];
              ...
              unserialize($DATA);
          - pattern: |
              $DATA = file_get_contents("php://input");
              ...
              unserialize($DATA);
    message: >
      Insecure deserialization via unserialize() with user-controlled
      input. An attacker can craft a malicious serialized payload to
      achieve remote code execution through PHP magic methods (__wakeup,
      __destruct, __toString). Use json_decode() for data interchange,
      or if unserialize is required, use the allowed_classes option
      (PHP 7.0+) to restrict instantiable classes.
    metadata:
      cwe: CWE-502
      owasp: "A08:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [php]
