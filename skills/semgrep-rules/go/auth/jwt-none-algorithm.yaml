rules:
  - id: go-auth-jwt-none-algorithm
    patterns:
      - pattern-either:
          - pattern: jwt.SigningMethodNone
          - pattern: jwt.UnsafeAllowNoneSignatureType
          - pattern: |
              jwt.NewWithClaims(jwt.SigningMethodNone, ...)
          - pattern: |
              $TOKEN.Method = jwt.SigningMethodNone
    message: >
      JWT "none" algorithm detected. Using the "none" signing method
      means the JWT is not signed and can be trivially forged by any
      attacker. Always use a strong signing algorithm such as HS256,
      RS256, or ES256, and validate the algorithm on the server side.
    metadata:
      cwe: CWE-347
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [go]
