rules:
  - id: go-auth-insecure-tls
    patterns:
      - pattern-either:
          - pattern: |
              &tls.Config{..., InsecureSkipVerify: true, ...}
          - pattern: |
              $CFG.InsecureSkipVerify = true
          - pattern: |
              tls.Config{InsecureSkipVerify: true}
    message: >
      TLS certificate verification is disabled. Setting InsecureSkipVerify
      to true makes the connection vulnerable to man-in-the-middle attacks
      because the server's certificate is not validated. Remove this
      setting or set it to false in production code.
    metadata:
      cwe: CWE-295
      owasp: "A07:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [go]
