rules:
  - id: go-crypto-hardcoded-credentials
    patterns:
      - pattern-either:
          - pattern: |
              $PASSWORD := "..."
          - pattern: |
              $SECRET := "..."
          - pattern: |
              $TOKEN := "..."
          - pattern: |
              $APIKEY := "..."
          - pattern: |
              $API_KEY := "..."
          - pattern: |
              $PRIVATE_KEY := "..."
          - pattern: |
              var $PASSWORD = "..."
          - pattern: |
              var $SECRET = "..."
          - pattern: |
              var $TOKEN = "..."
      - metavariable-regex:
          metavariable: $PASSWORD
          regex: (?i).*(password|passwd|pwd|secret|api_key|apikey|token|private_key|credential).*
    message: >
      Hardcoded credential detected. A string literal is assigned to a
      variable whose name suggests it is a secret. Store secrets in
      environment variables, a secrets manager, or configuration files
      that are not committed to version control.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [go]
