rules:
  - id: go-crypto-weak-hash
    patterns:
      - pattern-either:
          - pattern: md5.New()
          - pattern: md5.Sum(...)
          - pattern: sha1.New()
          - pattern: sha1.Sum(...)
    message: >
      Weak hash algorithm detected. MD5 and SHA-1 are cryptographically
      broken and should not be used for security-sensitive operations
      such as password hashing, digital signatures, or integrity
      verification. Use SHA-256 (crypto/sha256) or stronger.
    metadata:
      cwe: CWE-328
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [go]
