rules:
  - id: go-hardcoded-jwt-secret
    message: >
      Hardcoded JWT secret detected. Secrets used to sign or verify tokens
      should not be embedded in source code; load them from secure
      configuration or a secret manager.
    metadata:
      cwe: CWE-798
      owasp:
        - A07:2021 - Identification and Authentication Failures
        - A07:2025 - Authentication Failures
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: $TOKEN.SignedString([]byte("..."))
          - pattern: jwt.Parse($TOKENSTR, func($TOKEN *jwt.Token) (interface{}, error) { return []byte("..."), nil })
