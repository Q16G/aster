rules:
  - id: go-cors-wildcard-credentials
    message: >
      Insecure CORS configuration: wildcard origins are combined with
      credentials in Go CORS middleware. Use an explicit allowlist of trusted
      origins and avoid credentialed cross-origin requests from arbitrary
      sites.
    metadata:
      cwe: CWE-942
      owasp:
        - A05:2021 - Security Misconfiguration
        - A02:2025 - Security Misconfiguration
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: 'cors.Config{..., AllowAllOrigins: true, AllowCredentials: true, ...}'
          - pattern: 'cors.Config{..., AllowOrigins: []string{"*"}, AllowCredentials: true, ...}'
          - pattern: |
              $CFG := cors.DefaultConfig()
              ...
              $CFG.AllowAllOrigins = true
              ...
              $CFG.AllowCredentials = true
