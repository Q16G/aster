rules:
  - id: python-auth-django-debug-true
    patterns:
      - pattern: DEBUG = True
    message: >
      Django DEBUG mode is enabled. When DEBUG=True, Django displays detailed
      error pages with stack traces, local variables, and settings, which can
      leak sensitive information. Ensure DEBUG=False in production deployments
      and use environment variables to control this setting.
    metadata:
      cwe: CWE-489
      owasp: "A05:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [python]
