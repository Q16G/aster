rules:
  - id: python-crypto-weak-hash
    patterns:
      - pattern-either:
          - pattern: hashlib.md5(...)
          - pattern: hashlib.sha1(...)
          - pattern: hashlib.new("md5", ...)
          - pattern: hashlib.new("sha1", ...)
    message: >
      Use of weak hash algorithm (MD5 or SHA-1). These algorithms are
      cryptographically broken and should not be used for security purposes
      such as password hashing or integrity verification. Use hashlib.sha256()
      or hashlib.sha3_256() instead. For passwords, use bcrypt or argon2.
    metadata:
      cwe: CWE-328
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [python]
