rules:
  - id: python-crypto-weak-cipher
    patterns:
      - pattern-either:
          - pattern: DES.new(...)
          - pattern: DES3.new(...)
          - pattern: Blowfish.new(...)
          - pattern: ARC4.new(...)
          - pattern: RC2.new(...)
          - pattern: algorithms.TripleDES(...)
          - pattern: algorithms.Blowfish(...)
          - pattern: algorithms.ARC4(...)
          - pattern: algorithms.IDEA(...)
          - pattern: Cipher(algorithms.TripleDES(...), ...)
          - pattern: Cipher(algorithms.Blowfish(...), ...)
    message: >
      Use of weak or deprecated cipher algorithm (DES, 3DES, Blowfish, RC4, RC2).
      These ciphers have known vulnerabilities and insufficient key lengths for
      modern security requirements. Use AES-256-GCM or ChaCha20-Poly1305 instead.
    metadata:
      cwe: CWE-327
      owasp: "A02:2021"
      confidence: HIGH
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [python]
