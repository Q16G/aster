rules:
  - id: python-crypto-hardcoded-credentials
    pattern-either:
      - pattern: password = "..."
      - pattern: passwd = "..."
      - pattern: secret = "..."
      - pattern: api_key = "..."
      - pattern: apikey = "..."
      - pattern: token = "..."
      - pattern: auth_token = "..."
      - pattern: private_key = "..."
      - pattern: access_key = "..."
      - pattern: secret_key = "..."
      - pattern: PASSWORD = "..."
      - pattern: SECRET = "..."
      - pattern: API_KEY = "..."
      - pattern: TOKEN = "..."
      - pattern: PRIVATE_KEY = "..."
      - pattern: ACCESS_KEY = "..."
      - pattern: SECRET_KEY = "..."
    message: >
      Hardcoded credential detected. A string literal is assigned to a variable
      whose name suggests it is a secret (password, secret, token, api_key, etc.).
      Store secrets in environment variables, a secrets manager, or a configuration
      file excluded from version control.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: false
    severity: WARNING
    languages: [python]
