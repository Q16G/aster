rules:
  - id: python-injection-command-injection-subprocess
    patterns:
      - pattern-either:
          - pattern: subprocess.call($CMD, ..., shell=True, ...)
          - pattern: subprocess.run($CMD, ..., shell=True, ...)
          - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
          - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
          - pattern: subprocess.check_call($CMD, ..., shell=True, ...)
    message: >
      Command injection via subprocess with shell=True. When shell=True is used,
      the command string is passed to the system shell, enabling injection attacks
      if user input is included. Use shell=False with a list of arguments instead.
    metadata:
      cwe: CWE-78
      owasp: "A03:2021"
      confidence: MEDIUM
      needs_dataflow_confirmation: true
    severity: ERROR
    languages: [python]
